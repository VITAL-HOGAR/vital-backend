<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:12px;display:flex;justify-content:center;align-items:flex-start}
#app{width:100%;max-width:1200px}
.login-container{width:100%;max-width:420px;margin:40px auto;padding:20px}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;border:none;font-size:0.85rem;transition:all 0.3s}

.btn-clear-signature:hover{background:#dc2626}
.signature-area{background:#0f172a;border-radius:10px;padding:12px;border:1px solid #334155;margin-bottom:12px}
.signature-area .signature-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.signature-area .signature-header label{font-size:0.7rem;text-transform:uppercase;color:#94a3b8;font-weight:600}

.signature-status.saved{background:#22c55e30;color:#22c55e}

.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-preview img{width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid #334155}
.item-list{display:flex;flex-direction:column;gap:8px}
.item{background:#0f172a;padding:12px 16px;border-radius:10px;border-left:3px solid #22c55e}
.item .title{font-weight:600;font-size:0.9rem}
.item .meta{color:#94a3b8;font-size:0.75rem;margin-top:4px}
.alert-box{padding:10px 14px;border-radius:8px;margin-top:10px;font-size:0.85rem;font-weight:500}
.alert-success{background:#22c55e20;border:1px solid #22c55e;color:#22c55e}
.alert-warning{background:#f9731620;border:1px solid #f97316;color:#f97316}
.alert-danger{background:#ef444420;border:1px solid #ef4444;color:#ef4444}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;padding:14px 28px;border-radius:30px;display:none;z-index:9999;font-size:0.9rem;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:90%;text-align:center}
.toast.show{display:block}
.toast.success{border-left:4px solid #22c55e}
.toast.error{border-left:4px solid #ef4444}

@media(max-width:1024px){.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:768px){body{padding:8px}.header{flex-direction:column;text-align:center;padding:12px 16px}.header-logo{justify-content:center}.header-logo h1{font-size:0.95rem}.header-user{justify-content:center}.grid-2{grid-template-columns:1fr;gap:10px}.grid-3{grid-template-columns:1fr;gap:10px}.tabs{flex-direction:column;gap:4px}.tab{text-align:center;padding:12px 16px;font-size:0.9rem;border-radius:10px}.card{padding:16px}.card-title{font-size:1rem}.signature-canvas{height:80px}.btn{padding:14px 20px;font-size:0.95rem}.login-card{padding:30px 20px}.login-logo img{width:80px;height:80px}.login-logo h1{font-size:1.2rem}.photo-preview img{width:60px;height:60px}.toast{font-size:0.8rem;padding:12px 20px}}
@media(max-width:400px){body{padding:4px}.tab{padding:10px 12px;font-size:0.8rem}.signature-canvas{height:70px}.btn{padding:12px 16px;font-size:0.85rem}.login-card{padding:20px 16px}.login-logo img{width:60px;height:60px}.login-logo h1{font-size:1rem}.card{padding:12px}}

<body>
<div id="app">

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://i.imgur.com/01YZxey.jpeg" alt="Vital Hogar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%2322c55e%22/%3E%3Ctext x=%2250%22 y=%2260%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2232%22 font-weight=%22bold%22%3EVH%3C/text%3E%3C/svg%3E'">
      <h1>VITAL HOGAR PRO IPS</h1>

<!-- MAIN -->
<div id="mainScreen" class="hidden">
  <header class="header">
    <div class="header-logo">
      <img src="https://i.imgur.com/01YZxey.jpeg" alt="Vital Hogar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Crect width=%2240%22 height=%2240%22 fill=%22%2322c55e%22/%3E%3Ctext x=%2220%22 y=%2228%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2220%22 font-weight=%22bold%22%3EVH%3C/text%3E%3C/svg%3E'">
      <div>
        <h1>VITAL HOGAR PRO IPS</h1>

      </div>

  <div id="pacienteInfo" class="card" style="padding:12px 20px;margin-bottom:12px;">

      <span>👤 <strong id="pacienteNombre">Sin paciente</strong></span>
      <span id="turnoInfo" style="color:#94a3b8;">🕐 Entrada: --:-- | Salida: --:-- | ⏱️ --</span>
      <button class="btn btn-secondary btn-sm" onclick="seleccionarPaciente()">👤 Seleccionar paciente</button>
    </div>
  </div>

  <div class="tabs" id="tabsContainer"></div>
  <div id="dynamicContent"></div>
</div>

<div id="toast" class="toast"></div>

</div>

<script>
// ============================================================
//  CONFIGURACIÓN
// ============================================================
const API_URL = 'https://vital-backend-1-y4kt.onrender.com';
let TOKEN = localStorage.getItem('vital_token') || null;
let USER = null;
let pacienteActual = null;
let horaEntrada = null;
let firmaGuardada = {};

// ============================================================
//  UTILIDADES
// ============================================================
function $(id) { return document.getElementById(id); }

function showToast(msg, type = 'success') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 4000);
}

function togglePassword() {
  const input = $('loginPassword');
  const btn = document.querySelector('.password-toggle');
  if (!input || !btn) {
    console.warn('⚠️ togglePassword: Elementos no encontrados');
    return;
  }
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
    btn.setAttribute('aria-label', 'Ocultar contraseña');
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
    btn.setAttribute('aria-label', 'Mostrar contraseña');
  }
}

function getCurrentDate() { return new Date().toISOString().split('T')[0]; }
function getCurrentTime() { return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }); }
function formatDate(date) { return new Date(date).toLocaleDateString('es-CO', { year: 'numeric', month: '2-digit', day: '2-digit' }); }
function formatTime(date) { return new Date(date).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }); }

// ============================================================
//  DICTADO POR VOZ
// ============================================================
let recognitionActive = false;

function iniciarDictado(targetId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('Voz no soportada en este navegador', 'error');
    return;
  }
  if (recognitionActive) {
    showToast('Ya hay una grabación en curso', 'warning');
    return;
  }
  const recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => {
    recognitionActive = true;
    showToast('🎙️ Habla ahora...', 'success');
  };
  recognition.onend = () => {
    recognitionActive = false;
  };
  recognition.onresult = (event) => {
    const target = $(targetId);
    if (!target) return;
    const result = event.results[0];
    if (result && result.isFinal) {
      const texto = result[0].transcript.trim();
      if (texto) {
        target.value += (target.value ? ' ' : '') + texto;
        target.dispatchEvent(new Event('input'));
        showToast('Dictado completado ✅', 'success');
      }
    }
  };
  recognition.onerror = (event) => {
    recognitionActive = false;
    const mensajes = {
      'not-allowed': 'Permiso denegado',
      'no-speech': 'No se detectó voz',
      'audio-capture': 'Sin micrófono',
      'network': 'Error de red'
    };
    showToast(mensajes[event.error] || 'Error: ' + event.error, 'error');
  };
  try { recognition.start(); } catch (e) { showToast('Error al iniciar dictado', 'error'); }
}

// ============================================================
//  LOGIN
// ============================================================
async function login() {
  const email = $('loginEmail').value.trim();
  const password = $('loginPassword').value;
  const errorDiv = $('loginError');
  const btn = $('loginBtn');

  errorDiv.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  console.log('📤 Intentando login con:', email);

  try {
    const res = await fetch(API_URL + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    console.log('📥 Respuesta login:', data);

    if (!data.success) {
      errorDiv.textContent = data.message || 'Credenciales inválidas';
      errorDiv.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
      return;
    }

    TOKEN = data.data.token;
    USER = data.data.user;
    localStorage.setItem('vital_token', TOKEN);
    localStorage.setItem('vital_user', JSON.stringify(USER));

    $('loginScreen').style.display = 'none';
    $('mainScreen').classList.remove('hidden');
    $('userName').textContent = USER.name;
    $('userRole').textContent = USER.role;

    showToast('Bienvenido ' + USER.name);
    cargarPacienteActual();
    construirTabs();

  } catch (e) {
    console.error('❌ Error en login:', e);
    errorDiv.textContent = 'Error de conexión con el servidor';
    errorDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

function logout() {
  localStorage.removeItem('vital_token');
  localStorage.removeItem('vital_user');
  localStorage.removeItem('vital_paciente');
  TOKEN = null;
  USER = null;
  pacienteActual = null;
  $('loginScreen').style.display = 'flex';
  $('mainScreen').classList.add('hidden');
  showToast('Sesión cerrada');
}

function checkSession() {
  const token = localStorage.getItem('vital_token');
  const userData = localStorage.getItem('vital_user');
  if (token && userData) {
    TOKEN = token;
    USER = JSON.parse(userData);
    $('loginScreen').style.display = 'none';
    $('mainScreen').classList.remove('hidden');
    $('userName').textContent = USER.name;
    $('userRole').textContent = USER.role;
    cargarPacienteActual();
    construirTabs();
    return true;
  }
  return false;
}

// ============================================================
//  PACIENTE ACTUAL
// ============================================================
function cargarPacienteActual() {
  const saved = localStorage.getItem('vital_paciente');
  if (saved) {
    try {
      pacienteActual = JSON.parse(saved);
      actualizarPacienteUI();
    } catch (e) { pacienteActual = null; }
  }
}

function actualizarPacienteUI() {
  if (pacienteActual) {
    $('pacienteNombre').textContent = pacienteActual.name;
  } else {
    $('pacienteNombre').textContent = 'Sin paciente';
  }
}

async function seleccionarPaciente() {
  try {
    const res = await fetch(API_URL + '/api/patients', {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    const data = await res.json();
    if (!data.success || !data.data || data.data.length === 0) {
      showToast('No hay pacientes registrados', 'warning');
      return;
    }
    let options = '<option value="">-- Seleccionar --</option>';
    data.data.forEach(p => {
      const selected = pacienteActual && pacienteActual.id === p.id ? 'selected' : '';
      options += `<option value="${p.id}" ${selected}>${p.name}</option>`;
    });
    const html = `
      <div class="modal-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;">
        <div style="background:#1e293b;border-radius:16px;padding:24px;max-width:400px;width:90%;border:1px solid #334155;">
          <h3 style="color:#22c55e;margin-bottom:16px;">👤 Seleccionar Paciente</h3>
          <select id="selectPaciente" style="width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:1rem;margin-bottom:12px;">${options}</select>
          <button class="btn btn-primary btn-block" onclick="confirmarPaciente()">✅ Confirmar</button>
          <button class="btn btn-secondary btn-block" style="margin-top:8px;" onclick="cerrarModalPaciente()">❌ Cancelar</button>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', html);
  } catch (e) {
    showToast('Error al cargar pacientes', 'error');
  }
}

function confirmarPaciente() {
  const select = $('selectPaciente');
  if (!select) return;
  const pacientes = JSON.parse(localStorage.getItem('vital_pacientes_cache') || '[]');
  const paciente = pacientes.find(p => p.id === select.value);
  pacienteActual = paciente || null;
  if (paciente) {
    localStorage.setItem('vital_paciente', JSON.stringify(paciente));
    actualizarPacienteUI();
    showToast('Paciente: ' + paciente.name);
  }
  cerrarModalPaciente();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) cargarTab(activeTab.dataset.tab);
}

function cerrarModalPaciente() {
  const modal = document.querySelector('.modal-overlay');
  if (modal) modal.remove();
}

// ============================================================
//  API REQUEST
// ============================================================
async function apiRequest(endpoint, options = {}) {
  const res = await fetch(API_URL + endpoint, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN,
      ...(options.headers || {})
    }
  });
  return await res.json();
}

// ============================================================
//  FIRMAS
// ============================================================
function initSignature(canvasId) {
  const canvas = $(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width || 300;
  canvas.height = rect.height || 100;
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
  let drawing = false;
  const startDraw = (e) => {
    e.preventDefault();
    drawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  };
  const draw = (e) => {
    e.preventDefault();
    if (!drawing) return;
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };
  const endDraw = () => {
    if (drawing) {
      drawing = false;
      firmaGuardada[canvasId] = canvas.toDataURL('image/png');
      updateSignatureStatus(canvasId, true);
    }
  };
  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;
    return { x, y };
  };
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw);
}

function updateSignatureStatus(canvasId, saved) {
  const status = document.getElementById('status_' + canvasId);
  if (!status) return;
  if (saved) {
    status.textContent = '✅ Firmado';
    status.className = 'signature-status saved';
  } else {
    status.textContent = '⏳ Sin firmar';
    status.className = 'signature-status empty';
  }
}

function clearSignature(canvasId) {
  const canvas = $(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
  delete firmaGuardada[canvasId];
  updateSignatureStatus(canvasId, false);
}

function getSignature(canvasId) {
  return firmaGuardada[canvasId] || null;
}

function capturarFoto(inputId, previewId) {
  const input = $(inputId);
  if (!input || !input.files || input.files.length === 0) {
    showToast('Seleccione una imagen', 'warning');
    return;
  }
  const preview = $(previewId);
  if (!preview) return;
  preview.innerHTML = '';
  const maxFotos = Math.min(input.files.length, 3);
  for (let i = 0; i < maxFotos; i++) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement('img');
      img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(input.files[i]);
  }
  showToast('Fotos capturadas ✅', 'success');
}

function getFotos(previewId) {
  const preview = $(previewId);
  if (!preview) return [];
  const fotos = [];
  for (let img of preview.children) {
    if (img.tagName === 'IMG') {
      fotos.push(img.src);
    }
  }
  return fotos;
}

function calcularBraden() {

  const actividad = parseInt($('bradenActividad')?.value) || 0;
  const movilidad = parseInt($('bradenMovilidad')?.value) || 0;

function calcularIMC() {
  const peso = parseFloat($('pesoNutri')?.value);
  const tallaCm = parseFloat($('tallaNutri')?.value);
  const imcDisplay = $('imcDisplay');
  const clasificacion = $('imcClasificacion');
  if (!imcDisplay) return;
  if (peso && tallaCm && tallaCm > 0) {
    const tallaM = tallaCm / 100;
    const imc = peso / (tallaM * tallaM);
    let cat = '', color = '';
    if (imc < 18.5) { cat = 'Bajo peso'; color = '#f97316'; }
    else if (imc < 25) { cat = 'Normal'; color = '#22c55e'; }
    else if (imc < 30) { cat = 'Sobrepeso'; color = '#f97316'; }
    else { cat = 'Obesidad'; color = '#ef4444'; }
    imcDisplay.textContent = `IMC: ${imc.toFixed(1)} kg/m²`;
    imcDisplay.style.color = color;
    if (clasificacion) clasificacion.textContent = cat;
  } else {
    imcDisplay.textContent = 'IMC: --';
    imcDisplay.style.color = '#94a3b8';
    if (clasificacion) clasificacion.textContent = '';
  }
}

function getEdadGrupo(edad) {
  if (edad < 0.08) return 'neonato';
  if (edad < 1) return 'lactante';
  if (edad < 10) return 'niño';
  if (edad < 18) return 'adolescente';
  if (edad < 60) return 'adulto';
  return 'adulto_mayor';
}

function getCiudadInfo(ciudad) {
  return CIUDADES[ciudad] || CIUDADES['Bogotá'];
}

function evaluarSignos(spo2, fc, fr, temp, ta, glucosa, edad, ciudad) {
  const grupo = getEdadGrupo(edad);
  const rangos = RANGOS_EDAD[grupo];
  const ciudadInfo = getCiudadInfo(ciudad);
  const alertas = [];
  let nivel = 'success';

  // SpO2 con ajuste por altitud
  const spo2Min = ciudadInfo.spo2.min;
  const spo2Max = ciudadInfo.spo2.max;
  if (spo2 > 0) {
    if (spo2 < spo2Min - 5) {
      alertas.push({ signo: 'SpO2', valor: spo2 + '%', mensaje: '🚨 CRÍTICO - Hipoxemia grave', nivel: 'danger' });
      nivel = 'danger';
    } else if (spo2 < spo2Min) {
      alertas.push({ signo: 'SpO2', valor: spo2 + '%', mensaje: '⚠️ Bajo - Requiere evaluación', nivel: 'warning' });
      if (nivel !== 'danger') nivel = 'warning';
    } else {
      alertas.push({ signo: 'SpO2', valor: spo2 + '%', mensaje: '✅ Normal', nivel: 'success' });
    }
  }

  // FC
  if (fc > 0) {
    if (fc < rangos.fc.min - 10 || fc > rangos.fc.max + 20) {
      alertas.push({ signo: 'FC', valor: fc + ' lpm', mensaje: '🚨 CRÍTICO', nivel: 'danger' });
      nivel = 'danger';
    } else if (fc < rangos.fc.min || fc > rangos.fc.max) {
      alertas.push({ signo: 'FC', valor: fc + ' lpm', mensaje: '⚠️ Anormal', nivel: 'warning' });
      if (nivel !== 'danger') nivel = 'warning';
    } else {
      alertas.push({ signo: 'FC', valor: fc + ' lpm', mensaje: '✅ Normal', nivel: 'success' });
    }
  }

  // FR
  if (fr > 0) {
    if (fr < rangos.fr.min - 5 || fr > rangos.fr.max + 10) {
      alertas.push({ signo: 'FR', valor: fr + ' rpm', mensaje: '🚨 CRÍTICO', nivel: 'danger' });
      nivel = 'danger';
    } else if (fr < rangos.fr.min || fr > rangos.fr.max) {
      alertas.push({ signo: 'FR', valor: fr + ' rpm', mensaje: '⚠️ Anormal', nivel: 'warning' });
      if (nivel !== 'danger') nivel = 'warning';
    } else {
      alertas.push({ signo: 'FR', valor: fr + ' rpm', mensaje: '✅ Normal', nivel: 'success' });
    }
  }

  // Temp
  if (temp > 0) {
    if (temp < rangos.temp.min - 1 || temp > rangos.temp.max + 1) {
      alertas.push({ signo: 'Temp', valor: temp + '°C', mensaje: '🚨 CRÍTICO', nivel: 'danger' });
      nivel = 'danger';
    } else if (temp < rangos.temp.min || temp > rangos.temp.max) {
      alertas.push({ signo: 'Temp', valor: temp + '°C', mensaje: '⚠️ Anormal', nivel: 'warning' });
      if (nivel !== 'danger') nivel = 'warning';
    } else {
      alertas.push({ signo: 'Temp', valor: temp + '°C', mensaje: '✅ Normal', nivel: 'success' });
    }
  }

  // TA
  if (ta) {
    const parts = ta.split('/');
    if (parts.length === 2) {
      const sist = parseInt(parts[0]);
      const diast = parseInt(parts[1]);
      if (sist > 0 && diast > 0) {
        if (sist > rangos.ta.max + 20 || diast > (rangos.ta.max - 20) + 20 || sist < rangos.ta.min - 20) {
          alertas.push({ signo: 'TA', valor: ta, mensaje: '🚨 CRÍTICO', nivel: 'danger' });
          nivel = 'danger';
        } else if (sist > rangos.ta.max || diast > (rangos.ta.max - 20) || sist < rangos.ta.min) {
          alertas.push({ signo: 'TA', valor: ta, mensaje: '⚠️ Anormal', nivel: 'warning' });
          if (nivel !== 'danger') nivel = 'warning';
        } else {
          alertas.push({ signo: 'TA', valor: ta, mensaje: '✅ Normal', nivel: 'success' });
        }
      }
    }
  }

  // Glucosa - RANGOS CORREGIDOS
  if (glucosa > 0) {
    if (glucosa < 50 || glucosa > 180) {
      alertas.push({ signo: 'Glucosa', valor: glucosa + ' mg/dL', mensaje: '🚨 CRÍTICO', nivel: 'danger' });
      nivel = 'danger';
    } else if (glucosa < 70 || glucosa > 140) {
      alertas.push({ signo: 'Glucosa', valor: glucosa + ' mg/dL', mensaje: '⚠️ Anormal', nivel: 'warning' });
      if (nivel !== 'danger') nivel = 'warning';
    } else if (glucosa >= 70 && glucosa <= 100) {
      alertas.push({ signo: 'Glucosa', valor: glucosa + ' mg/dL', mensaje: '✅ Normal', nivel: 'success' });
    } else {
      alertas.push({ signo: 'Glucosa', valor: glucosa + ' mg/dL', mensaje: '🟡 Leve', nivel: 'warning' });
      if (nivel !== 'danger') nivel = 'warning';
    }
  }

  return { alertas, nivel };
}

function evaluarSignosUI() {
  const spo2 = parseInt($('spo2')?.value) || 0;
  const fc = parseInt($('fc')?.value) || 0;
  const fr = parseInt($('fr')?.value) || 0;
  const temp = parseFloat($('temp')?.value) || 0;
  const bp = $('bp')?.value || '';
  const glucosa = parseInt($('glucosa')?.value) || 0;
  const edad = pacienteActual?.edad || 45;
  const ciudad = pacienteActual?.ciudad || 'Bogotá';

  const resultado = evaluarSignos(spo2, fc, fr, temp, bp, glucosa, edad, ciudad);
  const div = $('alertasSignos');
  if (!div) return;

  let html = '';
  resultado.alertas.forEach(a => {
    const cls = a.nivel === 'danger' ? 'alert-danger' : a.nivel === 'warning' ? 'alert-warning' : 'alert-success';
    html += `<div class="alert-box ${cls}">${a.mensaje}: ${a.signo} = ${a.valor}</div>`;
  });
  div.innerHTML = html || '<div class="alert-box alert-success">✅ Todos los signos dentro de rangos normales</div>';
}

function construirTabs() {
  const container = $('tabsContainer');
  let tabs = [];

  switch (USER.role) {
    case 'ADMIN':
      tabs = [
        { id: 'usuarios', name: '👥 Usuarios' },
        { id: 'pacientes', name: '🏥 Pacientes' },
        { id: 'educacion_admin', name: '📚 Educación' },
        { id: 'reportes_admin', name: '📊 Reportes' }
      ];
      break;
    case 'AUXILIAR':
      tabs = [
        { id: 'recibo', name: '📋 Recibo' },
        { id: 'actividades', name: '✅ Actividades' },
        { id: 'signos', name: '🩺 Signos' },
        { id: 'medicamentos', name: '💊 Medicamentos' },
        { id: 'educacion', name: '📚 Educación' },
        { id: 'entrega', name: '🔄 Entrega' },
        { id: 'reportes', name: '📄 Reporte' }
      ];
      break;
    default:
      tabs = [{ id: 'inicio', name: '🏠 Inicio' }];
  }

  container.innerHTML = tabs.map(t =>
    `<div class="tab" data-tab="${t.id}" onclick="cargarTab('${t.id}')">${t.name}</div>`
  ).join('');

  if (tabs.length > 0) {
    const firstTab = document.querySelector('.tab');
    if (firstTab) firstTab.classList.add('active');
    cargarTab(tabs[0].id);
  }
}

function cargarTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.dataset.tab === tabId) {
      t.classList.add('active');
    }
  });

  const content = $('dynamicContent');

  const requierePaciente = ['recibo', 'actividades', 'signos', 'medicamentos', 'educacion', 'entrega', 'reportes'];
  if (requierePaciente.includes(tabId) && !pacienteActual) {
    content.innerHTML = `
      <div class="card" style="text-align:center;padding:40px;">
        <p style="color:#f97316;font-size:1.1rem;">⚠️ Seleccione un paciente primero</p>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="seleccionarPaciente()">👤 Seleccionar paciente</button>
      </div>
    `;
    return;
  }

  switch (tabId) {
    case 'usuarios': content.innerHTML = renderUsuarios(); break;
    case 'pacientes': content.innerHTML = renderPacientes(); break;
    case 'educacion_admin': content.innerHTML = renderEducacionAdmin(); break;
    case 'reportes_admin': content.innerHTML = renderReportesAdmin(); break;
    case 'recibo': content.innerHTML = renderRecibo(); break;
    case 'actividades': content.innerHTML = renderActividades(); break;
    case 'signos': content.innerHTML = renderSignos(); break;
    case 'medicamentos': content.innerHTML = renderMedicamentos(); break;
    case 'educacion': content.innerHTML = renderEducacion(); break;
    case 'entrega': content.innerHTML = renderEntrega(); break;
    case 'reportes': content.innerHTML = renderReportes(); break;
    default: content.innerHTML = '<div class="card"><p>Módulo en construcción</p></div>';
  }

  setTimeout(() => {
    ['sigEntrega', 'sigRecibe', 'sigProfesional', 'sigPaciente', 'sigFamiliar'].forEach(id => {
      if ($(id)) initSignature(id);
    });
  }, 200);

  setTimeout(() => {
    if (tabId === 'usuarios') cargarUsuarios();
    if (tabId === 'pacientes') cargarPacientesLista();
    if (tabId === 'recibo') cargarRecibos();
    if (tabId === 'actividades') cargarActividadesLista();
    if (tabId === 'signos') cargarSignosLista();
    if (tabId === 'medicamentos') cargarMedicamentosLista();
    if (tabId === 'educacion') cargarEducacionPendiente();
    if (tabId === 'entrega') cargarEntregasLista();
    if (tabId === 'reportes') generarReporte();
  }, 300);
}

function actualizarTurnoInfo() {
  const info = $('turnoInfo');
  if (!info) return;
  let texto = '';
  if (horaEntrada) {
    texto += `🕐 Entrada: ${formatTime(horaEntrada)}`;
    const ahora = new Date();
    const diff = Math.floor((ahora - horaEntrada) / 60000);
    const h = Math.floor(diff / 60);
    const m = diff % 60;
    texto += ` | ⏱️ ${h}h ${m}min`;
  } else {
    texto += '🕐 Entrada: --:-- | ⏱️ --';
  }
  info.textContent = texto;
}
