<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>Vital Hogar Pro - IPS Domiciliaria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        #logoPreview { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .logo-placeholder { width: 40px; height: 40px; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header h1 { font-size: 1rem; color: #22c55e; }
        .subtitle { color: #94a3b8; font-size: 0.6rem; }
        .user-info { display: flex; align-items: center; gap: 8px; background: #1e293b; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; flex-wrap: wrap; }
        .role-badge { background: #22c55e20; color: #22c55e; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; }
        .logout-btn { background: #ef4444; border: none; color: white; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
        .card { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #334155; }
        .card-title { font-size: 1rem; font-weight: 600; color: #22c55e; margin-bottom: 12px; border-left: 3px solid #22c55e; padding-left: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #0f172a !important; border: 1px solid #334155; border-radius: 10px; padding: 10px; color: white !important; font-size: 0.9rem;
        }
        .form-group select option { background: #1e293b; color: white; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 10px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-size: 0.9rem; }
        .btn-primary { background: #22c55e; color: white; width: 100%; }
        .btn-secondary { background: #334155; color: white; }
        .btn-warning { background: #f97316; color: white; }
        .btn-voice { background: #8b5cf6; color: white; padding: 6px 12px; font-size: 0.75rem; width: auto; margin-top: 4px; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; width: auto; }
        .btn-danger { background: #ef4444; color: white; padding: 4px 10px; font-size: 0.7rem; border-radius: 8px; cursor: pointer; border: none; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; overflow-x: auto; padding-bottom: 4px; }
        .tab { padding: 8px 14px; background: #1e293b; border-radius: 30px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; transition: all 0.2s; }
        .tab:hover { background: #334155; }
        .tab.active { background: #22c55e; color: white; }
        .hidden { display: none; }
        .activity-item { background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 6px; border-left: 3px solid #22c55e; font-size: 0.85rem; }
        .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .photo-preview img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid #334155; }
        .signature-canvas {
            background: white; border-radius: 10px; width: 100%; height: 120px; border: 2px solid #22c55e; touch-action: none; cursor: crosshair;
        }
        .sbar-card { background: #0f172a; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 3px solid #8b5cf6; }
        .sbar-field { margin-bottom: 8px; }
        .sbar-field label { font-size: 0.7rem; color: #8b5cf6; font-weight: 600; }
        .tip-box { background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #f97316; font-size: 0.8rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border-radius: 30px; padding: 10px 20px; display: none; z-index: 1000; font-size: 0.8rem; max-width: 90%; text-align: center; }
        .toast.show { display: block; }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-size: 0.65rem; text-transform: uppercase; }
        .education-topic { background: #1e293b; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid #8b5cf6; }
        .education-topic strong { color: #8b5cf6; }
        @media (max-width: 480px) {

        }

    // ==================== TOAST ====================
    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ==================== DICTADO ====================
    function iniciarDictado(targetId) {
        if (!('webkitSpeechRecognition' in window)) {
            showToast('Voz no soportada en este navegador', 'error');
            return;
        }
        if (recognitionActive) {
            showToast('Ya hay una grabación en curso', 'warning');
            return;
        }
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.onstart = function() { recognitionActive = true; showToast('🎙️ Habla ahora...', 'success'); };
        recognition.onend = function() { recognitionActive = false; showToast('✅ Grabación finalizada', 'success'); };
        recognition.onresult = function(event) {
            const target = document.getElementById(targetId);
            if (!target) return;
            const result = event.results[0];
            if (result && result.isFinal) {
                const texto = result[0].transcript.trim();
                if (texto) {
                    target.value += (target.value ? ' ' : '') + texto;
                    showToast('✅ Dictado completado', 'success');
                }
            }
        };
        recognition.onerror = function(event) {
            recognitionActive = false;
            if (event.error === 'not-allowed') showToast('Permiso de micrófono denegado', 'error');
            else if (event.error === 'no-speech') showToast('No se detectó voz', 'error');
            else showToast('Error: ' + event.error, 'error');
        };
        recognition.start();
    }

    function cargarDatosUsuario() {
        const val = document.getElementById('loginUserSelect').value;

    // ==================== LOGIN ====================

        const roleNames = { ADMIN:'Administrador', AUXILIAR:'Auxiliar Enfermería', ENFERMERO:'Enfermero Jefe', FISIOTERAPEUTA:'Fisioterapeuta', TERAPEUTA_OCUPACIONAL:'Terapeuta Ocupacional', FONOAUDIOLOGO:'Fonoaudiólogo', PSICOLOGO:'Psicólogo', NUTRICIONISTA:'Nutricionista', TRABAJADOR_SOCIAL:'Trabajador Social', TERAPEUTA_RESPIRATORIO:'Terapeuta Respiratorio', MEDICO:'Médico', COORDINADOR:'Coordinador' };
        const storageKeys = { AUXILIAR:'vital_auxiliar', ENFERMERO:'vital_enfermero', FISIOTERAPEUTA:'vital_fisio', TERAPEUTA_OCUPACIONAL:'vital_to', FONOAUDIOLOGO:'vital_fono', PSICOLOGO:'vital_psico', NUTRICIONISTA:'vital_nutri', TRABAJADOR_SOCIAL:'vital_ts', TERAPEUTA_RESPIRATORIO:'vital_tr', MEDICO:'vital_medico', COORDINADOR:'vital_coordinador', ADMIN:'vital_admin' };
        
        currentUser = { id: user.id, name: user.name, email: user.email, role: user.role, roleName: roleNames[user.role] };
        currentRole = user.role;
        storageKey = storageKeys[user.role];
        
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('userName').innerHTML = currentUser.name;
        document.getElementById('userRoleDisplay').innerHTML = currentUser.roleName;
        
        buildTabs();
        showToast(`✅ Bienvenido ${currentUser.name}`, 'success');
    }

    function logout() {
        currentUser = null;
        document.getElementById('mainScreen').classList.add('hidden');

    // ==================== FUNCIONES AUXILIARES ====================
    function saveToLocal(key, data) {
        const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
        all[key] = all[key] || [];
        all[key].push({ ...data, timestamp: new Date().toISOString(), user: currentUser?.name });
        localStorage.setItem(storageKey, JSON.stringify(all));
        showToast(`✅ ${key} guardado`, 'success');
    }

    function getFromLocal(key) {
        const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
        return all[key] || [];
    }

    function cargarLista(key, elementId) {
        const items = getFromLocal(key);
        const div = document.getElementById(elementId);
        if(div) {
            if(items.length === 0) div.innerHTML = '<p style="color:#64748b; font-size:0.85rem;">No hay registros</p>';
            else div.innerHTML = items.slice(-10).reverse().map(i => `<div class="activity-item"><strong>${new Date(i.timestamp).toLocaleString()}</strong><br>${i.resumen || i.actividad || i.nombre || JSON.stringify(i)}</div>`).join('');
        }
    }

    // ==================== CARGAR TEMAS DE EDUCACIÓN ====================
    async function loadEducationTopics() {
        try {
            const res = await fetch(`${API_URL}/api/education`);
            const data = await res.json();
            if(data.success && data.data) {
                educationTopics = data.data;
                localStorage.setItem('vital_education_topics', JSON.stringify(educationTopics));
            }
        } catch(e) {
            const saved = localStorage.getItem('vital_education_topics');
            if(saved) educationTopics = JSON.parse(saved);
        }
    }

    function getEducationTopicsForSelect() {
        if(educationTopics.length === 0) {
            return '<option value="">-- Sin temas disponibles --</option>';
        }
        return educationTopics.map(t => `<option value="${t.title}">${t.title}</option>`).join('');
    }

    window.capturarFoto = () => {
        const input = document.getElementById('photoInput');
        if(input.files.length > 0) {
            const preview = document.getElementById('photoPreview');
            for(let file of input.files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                    capturedPhotos.push(e.target.result);
                };
                reader.readAsDataURL(file);
            }
            showToast('📸 Fotos capturadas', 'success');
        } else {
            showToast('Seleccione una imagen o use la cámara', 'error');
        }
    };

    window.agregarActividad = () => {

        const actividad = document.getElementById('tipoActividad').value;
        const observacion = document.getElementById('obsActividad').value;
        const educacion = document.getElementById('educacionTipo').value;
        const educacionDesc = document.getElementById('educacionDesc').value;
        const novedad = document.getElementById('novedadTipo').value;
        const novedadDesc = document.getElementById('novedadDesc').value;
        
        const data = {
            actividad,
            hora,
            observacion,
            educacion: educacion ? `${educacion}: ${educacionDesc}` : '',
            novedad: novedad ? `${novedad}: ${novedadDesc}` : '',
            fotos: capturedPhotos.length
        };
        
        saveToLocal('actividades', data);
        document.getElementById('obsActividad').value = '';
        document.getElementById('horaActividad').value = '';
        document.getElementById('educacionDesc').value = '';
        document.getElementById('novedadDesc').value = '';
        document.getElementById('photoInput').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        capturedPhotos = [];

    // ==================== GENERAR PDF ====================
    window.generarReportePDF = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 25;
        const marginY = 270;
        
        function checkPage() {
            if (y > marginY) {
                doc.addPage();
                y = 20;
            }
        }
        
        function cleanText(text) {
            if (!text) return '';
            return String(text)
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\x00-\x7F]/g, '')
                .trim();
        }
        
        const logoImg = document.getElementById('logoPreview').src;
        if(logoImg) { try { doc.addImage(logoImg, 'PNG', 20, 10, 30, 30); } catch(e) {} }

        doc.setFont('helvetica');
        doc.setFontSize(16);
        doc.text('VITAL HOGAR PRO IPS', 60, 25);
        y = 45;
        doc.setFontSize(10);
        doc.text('Reporte Completo del Turno', 60, y);
        y += 10;
        doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, y);
        y += 8;
        doc.text(`Profesional: ${cleanText(currentUser?.name)} (${cleanText(currentUser?.roleName)})`, 20, y);
        y += 8;
        doc.text(`Paciente: ${cleanText(document.getElementById('reportePaciente')?.value) || 'Maria Gonzalez'}`, 20, y);
        y += 15;

        // ACTIVIDADES
        const actividades = getFromLocal('actividades');
        if(actividades.length > 0) {
            checkPage();
            doc.text('ACTIVIDADES REALIZADAS:', 20, y);
            y += 8;
            actividades.slice(-10).forEach((d, i) => {
                checkPage();
                const actividad = cleanText(d.actividad || 'Actividad');
                const hora = cleanText(d.hora || 'Sin hora');
                const observacion = cleanText(d.observacion || '');
                const educacion = cleanText(d.educacion || '');
                const novedad = cleanText(d.novedad || '');
                
                doc.text(`${i+1}. ${actividad} - ${hora}`, 25, y);
                if(observacion) doc.text(`   Obs: ${observacion.substring(0, 60)}`, 30, y+5);
                if(educacion) doc.text(`   Educ: ${educacion.substring(0, 50)}`, 30, y+10);
                if(novedad) doc.text(`   Nov: ${novedad.substring(0, 50)}`, 30, y+15);
                if(d.fotos) doc.text(`   Fotos: ${d.fotos}`, 30, y+20);
                y += (educacion || novedad || d.fotos) ? 28 : 14;
            });
            y += 10;
        }

        // SIGNOS
        const signos = getFromLocal('signos');
        if(signos.length > 0) {
            checkPage();
            doc.text('SIGNOS VITALES:', 20, y);
            y += 8;
            signos.slice(-10).forEach((d, i) => {
                checkPage();
                doc.text(`${i+1}. SpO2:${cleanText(d.spo2) || '-'}% | FC:${cleanText(d.fc) || '-'} | FR:${cleanText(d.fr) || '-'} | Temp:${cleanText(d.temp) || '-'}°C | TA:${cleanText(d.bp) || '-'} | Glucosa:${cleanText(d.glucosa) || '-'}`, 25, y);
                if(d.braden) doc.text(`   Braden: ${cleanText(d.braden)}`, 30, y+5);
                doc.text(`   Hora: ${cleanText(d.hora) || '-'}`, 30, y+10);
                y += 16;
            });
            y += 10;
        }

        // MEDICAMENTOS
        const medicamentos = getFromLocal('medicamentos');
        if(medicamentos.length > 0) {
            checkPage();
            doc.text('MEDICAMENTOS ADMINISTRADOS:', 20, y);
            y += 8;
            medicamentos.slice(-10).forEach((d, i) => {
                checkPage();
                const nombre = cleanText(d.nombre || 'Medicamento');
                doc.text(`${i+1}. ${nombre} - ${cleanText(d.dosis) || 'Sin dosis'} - ${cleanText(d.hora) || 'Sin hora'}`, 25, y);
                if(d.obs) doc.text(`   Obs: ${cleanText(d.obs).substring(0, 50)}`, 30, y+5);
                y += 14;
            });
            y += 10;
        }

        // ENTREGAS
        const entregas = getFromLocal('entregas');
        if(entregas.length > 0) {
            checkPage();
            doc.text('ENTREGAS DE TURNO:', 20, y);
            y += 8;
            const ultima = entregas[entregas.length - 1];
            if(ultima) {
                doc.text(`Hora de entrega: ${cleanText(ultima.horaEntrega) || 'No registrada'}`, 25, y);
                y += 8;
                doc.text(`Resumen: ${cleanText(ultima.resumen).substring(0, 80) || 'Sin resumen'}`, 25, y);
                if(ultima.pendientes) { 
                    y += 8; 
                    doc.text(`Pendientes: ${cleanText(ultima.pendientes).substring(0, 80)}`, 25, y); 
                }
                if(ultima.sbar) {
                    const s = ultima.sbar;
                    y += 10;
                    doc.text('SBAR:', 25, y);
                    y += 6;
                    if(s.situacion) { doc.text(`S - ${cleanText(s.situacion).substring(0, 40)}`, 30, y); y += 6; }
                    if(s.antecedentes) { doc.text(`A - ${cleanText(s.antecedentes).substring(0, 40)}`, 30, y); y += 6; }
                    if(s.evaluacion) { doc.text(`B - ${cleanText(s.evaluacion).substring(0, 40)}`, 30, y); y += 6; }
                    if(s.recomendacion) { doc.text(`R - ${cleanText(s.recomendacion).substring(0, 40)}`, 30, y); y += 6; }
                }
                y += 10;
            }
        }

        // FIRMAS
        y += 10;
        checkPage();
        doc.setFontSize(12);
        doc.text('FIRMAS:', 20, y);
        y += 12;
        doc.setFontSize(10);

        function obtenerFirmaCanvas(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return null;
            try {
                const dataUrl = canvas.toDataURL('image/png');
                if (dataUrl && dataUrl !== 'data:image/png;base64,') {
                    return dataUrl;
                }
            } catch(e) { return null; }
            return null;
        }

        const firmaProf = obtenerFirmaCanvas('sigEntrega');
        if (firmaProf) {
            doc.text('Firma del Profesional:', 20, y);
            try { doc.addImage(firmaProf, 'PNG', 100, y-5, 60, 25); } catch(e) { doc.text('___________________', 100, y+5); }
            y += 30;
        } else {
            doc.text('Firma del Profesional: ___________________', 20, y);
            y += 10;
        }

        const firmaAcu = obtenerFirmaCanvas('sigRecibe');
        if (firmaAcu) {
            doc.text('Firma del Acudiente/Familiar:', 20, y);
            try { doc.addImage(firmaAcu, 'PNG', 100, y-5, 60, 25); } catch(e) { doc.text('___________________', 100, y+5); }
            y += 30;
        } else {
            doc.text('Firma del Acudiente/Familiar: _____________', 20, y);
            y += 10;
        }

        doc.save(`reporte_completo_${Date.now()}.pdf`);
        showToast('📄 Reporte completo generado con firmas', 'success');
    };

    async function crearTemaEducacion() {
        const title = document.getElementById('newTopicTitle').value;
        const description = document.getElementById('newTopicDesc').value;
        if(!title || !description) { showToast('Complete título y descripción', 'error'); return; }
        try {
            const res = await fetch(`${API_URL}/api/education`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, created_by: currentUser.id })
            });
            const data = await res.json();
            if(data.success) {
                showToast('✅ Tema creado', 'success');
                document.getElementById('newTopicTitle').value = '';
                document.getElementById('newTopicDesc').value = '';
                loadEducationTopics();
                cargarLista('educationTopics', 'listaTemasEducacion');

        } catch(e) { showToast('Error de conexión', 'error'); }
    }

    // ==================== FIRMAS ====================
    function initSignatures() {
        ['sigRecibo', 'sigEntrega', 'sigRecibe', 'sigProfesional', 'sigPaciente', 'sigFamiliar'].forEach(id => {
            const canvas = document.getElementById(id);
            if(!canvas) return;
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            let drawing = false;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✍️ Firme aquí', canvas.width/2, canvas.height/2);
            
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            
            canvas.addEventListener('mousedown', (e) => {
                drawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f172a';
            });
            canvas.addEventListener('mousemove', (e) => {
                if(drawing) {
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                    ctx.stroke();
                }
            });
            canvas.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mouseleave', () => drawing = false);
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                drawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                ctx.beginPath();
                ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f172a';
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(drawing) {
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
                    ctx.stroke();
                }
            });
            canvas.addEventListener('touchend', () => drawing = false);
        });
    }

    window.clearCanvas = (id) => {
        const canvas = document.getElementById(id);
        if(canvas) {
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✍️ Firme aquí', canvas.width/2, canvas.height/2);
        }
    };
