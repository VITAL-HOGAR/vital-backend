<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>Vital Hogar Pro - IPS Domiciliaria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        #logoPreview { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .logo-placeholder { width: 40px; height: 40px; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header h1 { font-size: 1rem; color: #22c55e; }
        .subtitle { color: #94a3b8; font-size: 0.6rem; }
        .user-info { display: flex; align-items: center; gap: 8px; background: #1e293b; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; flex-wrap: wrap; }
        .role-badge { background: #22c55e20; color: #22c55e; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; }
        .logout-btn { background: #ef4444; border: none; color: white; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
        .card { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #334155; }
        .card-title { font-size: 1rem; font-weight: 600; color: #22c55e; margin-bottom: 12px; border-left: 3px solid #22c55e; padding-left: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px; color: white; font-size: 0.9rem;
        }
        .btn { padding: 10px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-size: 0.9rem; }
        .btn-primary { background: #22c55e; color: white; width: 100%; }
        .btn-secondary { background: #334155; color: white; }
        .btn-warning { background: #f97316; color: white; }
        .btn-voice { background: #8b5cf6; color: white; padding: 6px 12px; font-size: 0.75rem; width: auto; margin-top: 4px; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; width: auto; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; overflow-x: auto; padding-bottom: 4px; }
        .tab { padding: 8px 14px; background: #1e293b; border-radius: 30px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; transition: all 0.2s; }
        .tab:hover { background: #334155; }
        .tab.active { background: #22c55e; color: white; }
        .hidden { display: none; }
        .activity-item { background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 6px; border-left: 3px solid #22c55e; font-size: 0.85rem; }
        .signature-canvas { background: white; border-radius: 10px; width: 100%; height: 100px; border: 1px solid #334155; touch-action: none; }
        .tip-box { background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #f97316; font-size: 0.8rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border-radius: 30px; padding: 10px 20px; display: none; z-index: 1000; font-size: 0.8rem; max-width: 90%; text-align: center; }
        .toast.show { display: block; }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-size: 0.65rem; text-transform: uppercase; }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .header { padding: 10px 12px; flex-direction: column; text-align: center; }
            .logo-area { justify-content: center; }
            .user-info { justify-content: center; width: 100%; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 8px; }
            .tab { font-size: 0.7rem; padding: 6px 12px; }
            .card { padding: 12px; }
            .card-title { font-size: 0.9rem; }
            .signature-canvas { height: 80px; }
            .btn { font-size: 0.85rem; padding: 10px 14px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <img id="logoPreview" src="" style="display:none">
        <div id="logoPlaceholder" class="logo-placeholder">🏥</div>
        <div>
            <h1>VITAL HOGAR PRO IPS</h1>
            <div class="subtitle">Cuidados Domiciliarios</div>
        </div>
    </div>
    <div><input type="file" id="logoUpload" accept="image/*" style="display:none"><button class="btn-secondary btn-sm" onclick="document.getElementById('logoUpload').click()">📷 Logo</button></div>
    <div id="userInfo" class="user-info hidden">
        <span id="userName"></span>
        <span id="userRoleDisplay" class="role-badge"></span>
        <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="card">
        <div class="card-title">🔐 Acceso al Sistema</div>
        <div class="form-group">
            <label>Selecciona tu Usuario</label>
            <select id="loginUserSelect"></select>
        </div>
        <div id="userInfoLogin" style="background:#0f172a; padding:10px; border-radius:10px; margin:10px 0; display:none; font-size:0.85rem;">
            <p><strong>Nombre:</strong> <span id="loginUserName"></span></p>
            <p><strong>Rol:</strong> <span id="loginUserRole"></span></p>
        </div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword" placeholder="123456" value="123456"></div>
        <button class="btn btn-primary" onclick="login()">Ingresar</button>
        <hr style="margin: 12px 0; border-color:#334155">
        <p style="font-size:0.7rem; text-align:center; color:#94a3b8;">👤 Admin, Auxiliar, Enfermero, Medico, Coordinador<br>🔑 Contraseña: 123456</p>
    </div>
</div>

<!-- MAIN -->
<div id="mainScreen" class="hidden">
    <div id="tabsContainer" class="tabs"></div>
    <div id="dynamicContent"></div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ==================== CONFIG ====================
    const API_URL = 'https://vital-backend.onrender.com';
    let currentUser = null;
    let currentRole = null;
    let storageKey = null;
    let currentPatient = "Maria Gonzalez";
    let recognitionActive = false;

    // ==================== LOGO ====================
    const savedLogo = localStorage.getItem('vital_logo');
    if(savedLogo) {
        document.getElementById('logoPreview').src = savedLogo;
        document.getElementById('logoPreview').style.display = 'block';
        document.getElementById('logoPlaceholder').style.display = 'none';
    }
    document.getElementById('logoUpload').addEventListener('change', function(e) {
        if(e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                localStorage.setItem('vital_logo', ev.target.result);
                document.getElementById('logoPreview').src = ev.target.result;
                document.getElementById('logoPreview').style.display = 'block';
                document.getElementById('logoPlaceholder').style.display = 'none';
                showToast('✅ Logo guardado', 'success');
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    // ==================== DICTADO CORREGIDO ====================
    function iniciarDictado(targetId) {
        if (!('webkitSpeechRecognition' in window)) {
            showToast('Voz no soportada en este navegador', 'error');
            return;
        }
        
        if (recognitionActive) {
            showToast('Ya hay una grabación en curso', 'warning');
            return;
        }
        
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = false; // SOLO resultado final
        recognition.maxAlternatives = 1;
        
        recognition.onstart = function() {
            recognitionActive = true;
            showToast('🎙️ Habla ahora...', 'success');
        };
        
        recognition.onend = function() {
            recognitionActive = false;
            showToast('✅ Grabación finalizada', 'success');
        };
        
        recognition.onresult = function(event) {
            const target = document.getElementById(targetId);
            if (!target) return;
            
            const result = event.results[0];
            if (result && result.isFinal) {
                const texto = result[0].transcript.trim();
                if (texto) {
                    target.value += (target.value ? ' ' : '') + texto;
                    showToast('✅ Dictado completado', 'success');
                }
            }
        };
        
        recognition.onerror = function(event) {
            recognitionActive = false;
            if (event.error === 'not-allowed') {
                showToast('Permiso de micrófono denegado', 'error');
            } else if (event.error === 'no-speech') {
                showToast('No se detectó voz', 'error');
            } else {
                showToast('Error: ' + event.error, 'error');
            }
        };
        
        recognition.start();
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ==================== LOAD DATA ====================
    async function loadMasterData() {
        try {
            const res = await fetch(`${API_URL}/api/users`);
            const data = await res.json();
            if(data.success && data.data) {
                localStorage.setItem('vital_usuarios', JSON.stringify(data.data));
            }
        } catch(e) { console.warn('API no disponible, usando datos locales'); }
        
        let users = JSON.parse(localStorage.getItem('vital_usuarios') || '[]');
        if(users.length === 0) {
            users = [
                { id: 'u1', name: 'Admin', email: 'admin@vitalhogar.com', role: 'ADMIN', password: '123456' },
                { id: 'u2', name: 'Auxiliar Perez', email: 'auxiliar@vitalhogar.com', role: 'AUXILIAR', password: '123456' },
                { id: 'u3', name: 'Dr. Gomez', email: 'medico@vitalhogar.com', role: 'MEDICO', password: '123456' },
                { id: 'u4', name: 'Lic. Martinez', email: 'fisio@vitalhogar.com', role: 'FISIOTERAPEUTA', password: '123456' },
                { id: 'u5', name: 'T.S. Rodriguez', email: 'ts@vitalhogar.com', role: 'TRABAJADOR_SOCIAL', password: '123456' },
                { id: 'u6', name: 'Psic. Lopez', email: 'psico@vitalhogar.com', role: 'PSICOLOGO', password: '123456' },
                { id: 'u7', name: 'Nut. Fernandez', email: 'nutri@vitalhogar.com', role: 'NUTRICIONISTA', password: '123456' },
                { id: 'u8', name: 'Fono. Sanchez', email: 'fono@vitalhogar.com', role: 'FONOAUDIOLOGO', password: '123456' },
                { id: 'u9', name: 'TO. Ramirez', email: 'to@vitalhogar.com', role: 'TERAPEUTA_OCUPACIONAL', password: '123456' },
                { id: 'u10', name: 'TR. Vargas', email: 'tr@vitalhogar.com', role: 'TERAPEUTA_RESPIRATORIO', password: '123456' },
                { id: 'u11', name: 'Enf. Castro', email: 'enfermero@vitalhogar.com', role: 'ENFERMERO', password: '123456' },
                { id: 'u12', name: 'Coord. Diaz', email: 'coordinador@vitalhogar.com', role: 'COORDINADOR', password: '123456' }
            ];
            localStorage.setItem('vital_usuarios', JSON.stringify(users));
        }
        
        // Pacientes
        try {
            const res = await fetch(`${API_URL}/api/patients`);
            const data = await res.json();
            if(data.success && data.data) {
                localStorage.setItem('vital_pacientes', JSON.stringify(data.data));
            }
        } catch(e) {}
        
        let patients = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
        if(patients.length === 0) {
            patients = [
                { id: 'p1', name: 'Maria Gonzalez', document: '12345678', diagnosis: 'Hipertension', doctor: 'Dr. Gomez' },
                { id: 'p2', name: 'Pedro Ramirez', document: '87654321', diagnosis: 'Diabetes', doctor: 'Dr. Gomez' }
            ];
            localStorage.setItem('vital_pacientes', JSON.stringify(patients));
        }
        
        const select = document.getElementById('loginUserSelect');
        const roleNames = { ADMIN:'Admin', AUXILIAR:'Auxiliar', ENFERMERO:'Enfermero', FISIOTERAPEUTA:'Fisioterapeuta', TERAPEUTA_OCUPACIONAL:'Terapeuta Ocupacional', FONOAUDIOLOGO:'Fonoaudiologo', PSICOLOGO:'Psicologo', NUTRICIONISTA:'Nutricionista', TRABAJADOR_SOCIAL:'Trabajador Social', TERAPEUTA_RESPIRATORIO:'Terapeuta Respiratorio', MEDICO:'Medico', COORDINADOR:'Coordinador' };
        select.innerHTML = '<option value="">-- Seleccionar usuario --</option>';
        users.forEach(u => { select.innerHTML += `<option value='${JSON.stringify(u)}'>${u.name} - ${roleNames[u.role] || u.role}</option>`; });
    }

    function cargarDatosUsuario() {
        const val = document.getElementById('loginUserSelect').value;
        if(val) {
            const user = JSON.parse(val);
            const roleNames = { ADMIN:'Admin', AUXILIAR:'Auxiliar', ENFERMERO:'Enfermero', FISIOTERAPEUTA:'Fisioterapeuta', TERAPEUTA_OCUPACIONAL:'Terapeuta Ocupacional', FONOAUDIOLOGO:'Fonoaudiologo', PSICOLOGO:'Psicologo', NUTRICIONISTA:'Nutricionista', TRABAJADOR_SOCIAL:'Trabajador Social', TERAPEUTA_RESPIRATORIO:'Terapeuta Respiratorio', MEDICO:'Medico', COORDINADOR:'Coordinador' };
            document.getElementById('userInfoLogin').style.display = 'block';
            document.getElementById('loginUserName').innerText = user.name;
            document.getElementById('loginUserRole').innerText = roleNames[user.role] || user.role;
        } else {
            document.getElementById('userInfoLogin').style.display = 'none';
        }
    }

    // ==================== LOGIN ====================
    function login() {
        const val = document.getElementById('loginUserSelect').value;
        if(!val) { showToast('Seleccione un usuario', 'error'); return; }
        const user = JSON.parse(val);
        const password = document.getElementById('loginPassword').value;
        if(password !== user.password) { showToast('Contraseña incorrecta', 'error'); return; }
        
        const roleNames = { ADMIN:'Administrador', AUXILIAR:'Auxiliar Enfermería', ENFERMERO:'Enfermero Jefe', FISIOTERAPEUTA:'Fisioterapeuta', TERAPEUTA_OCUPACIONAL:'Terapeuta Ocupacional', FONOAUDIOLOGO:'Fonoaudiólogo', PSICOLOGO:'Psicólogo', NUTRICIONISTA:'Nutricionista', TRABAJADOR_SOCIAL:'Trabajador Social', TERAPEUTA_RESPIRATORIO:'Terapeuta Respiratorio', MEDICO:'Médico', COORDINADOR:'Coordinador' };
        const storageKeys = { AUXILIAR:'vital_auxiliar', ENFERMERO:'vital_enfermero', FISIOTERAPEUTA:'vital_fisio', TERAPEUTA_OCUPACIONAL:'vital_to', FONOAUDIOLOGO:'vital_fono', PSICOLOGO:'vital_psico', NUTRICIONISTA:'vital_nutri', TRABAJADOR_SOCIAL:'vital_ts', TERAPEUTA_RESPIRATORIO:'vital_tr', MEDICO:'vital_medico', COORDINADOR:'vital_coordinador', ADMIN:'vital_admin' };
        
        currentUser = { id: user.id, name: user.name, email: user.email, role: user.role, roleName: roleNames[user.role] };
        currentRole = user.role;
        storageKey = storageKeys[user.role];
        
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('userName').innerHTML = currentUser.name;
        document.getElementById('userRoleDisplay').innerHTML = currentUser.roleName;
        
        buildTabs();
        showToast(`✅ Bienvenido ${currentUser.name}`, 'success');
    }

    function logout() {
        currentUser = null;
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('userInfo').classList.add('hidden');
        showToast('Sesión cerrada', 'success');
    }

    // ==================== TABS ====================
    function buildTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        let tabs = [];
        if(currentRole === 'AUXILIAR') {
            tabs = [
                { id: 'recibo', name: '📋 Recibo' }, { id: 'turno', name: '📅 Turno' },
                { id: 'actividades', name: '✅ Actividades' }, { id: 'signos', name: '🩺 Signos' },
                { id: 'medicamentos', name: '💊 Medicamentos' }, { id: 'entrega', name: '🔄 Entrega' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'TRABAJADOR_SOCIAL') {
            tabs = [
                { id: 'recursos', name: '📦 Recursos' },
                { id: 'beneficiarios', name: '👥 Beneficiarios' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'ADMIN') {
            tabs = [
                { id: 'usuarios', name: '👥 Usuarios' },
                { id: 'pacientes', name: '🏥 Pacientes' },
                { id: 'reportesGlobales', name: '📊 Reportes' }
            ];
        } else if(currentRole === 'ENFERMERO') {
            tabs = [
                { id: 'supervision', name: '📋 Supervisión' },
                { id: 'evolucion', name: '📝 Evolución' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'MEDICO') {
            tabs = [
                { id: 'prescripciones', name: '📋 Prescripciones' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'FISIOTERAPEUTA') {
            tabs = [
                { id: 'evaluacionFisio', name: '🦵 Evaluación' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'PSICOLOGO') {
            tabs = [
                { id: 'evaluacionPsico', name: '🧠 Evaluación' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'NUTRICIONISTA') {
            tabs = [
                { id: 'evaluacionNutri', name: '🥗 Evaluación' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else if(currentRole === 'COORDINADOR') {
            tabs = [
                { id: 'turnosCoord', name: '📅 Turnos' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        } else {
            tabs = [
                { id: 'evaluacion', name: '📝 Evaluación' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
        }
        tabsContainer.innerHTML = tabs.map(t => `<div class="tab" data-tab="${t.id}">${t.name}</div>`).join('');
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTab(tab.dataset.tab);
            });
        });
        if(tabs[0]) loadTab(tabs[0].id);
    }

    function saveToLocal(key, data) {
        const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
        all[key] = all[key] || [];
        all[key].push({ ...data, timestamp: new Date().toISOString(), user: currentUser?.name });
        localStorage.setItem(storageKey, JSON.stringify(all));
        showToast(`✅ ${key} guardado`, 'success');
    }

    function getFromLocal(key) {
        const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
        return all[key] || [];
    }

    function cargarLista(key, elementId) {
        const items = getFromLocal(key);
        const div = document.getElementById(elementId);
        if(div) {
            if(items.length === 0) div.innerHTML = '<p style="color:#64748b; font-size:0.85rem;">No hay registros</p>';
            else div.innerHTML = items.slice(-10).reverse().map(i => `<div class="activity-item"><strong>${new Date(i.timestamp).toLocaleString()}</strong><br>${i.resumen || i.actividad || i.nombre || JSON.stringify(i)}</div>`).join('');
        }
    }

    async function loadTab(tabId) {
        const contentDiv = document.getElementById('dynamicContent');
        if(tabId === 'recibo') contentDiv.innerHTML = getReciboContent();
        else if(tabId === 'turno') contentDiv.innerHTML = getTurnoContent();
        else if(tabId === 'actividades') contentDiv.innerHTML = getActividadesContent();
        else if(tabId === 'signos') contentDiv.innerHTML = getSignosContent();
        else if(tabId === 'medicamentos') contentDiv.innerHTML = getMedicamentosContent();
        else if(tabId === 'entrega') contentDiv.innerHTML = getEntregaContent();
        else if(tabId === 'reportes') contentDiv.innerHTML = getReportesContent();
        else if(tabId === 'recursos') contentDiv.innerHTML = getRecursosContent();
        else if(tabId === 'beneficiarios') contentDiv.innerHTML = getBeneficiariosContent();
        else if(tabId === 'usuarios') contentDiv.innerHTML = getUsuariosContent();
        else if(tabId === 'pacientes') contentDiv.innerHTML = getPacientesContent();
        else if(tabId === 'reportesGlobales') contentDiv.innerHTML = getReportesGlobalesContent();
        else if(tabId === 'supervision') contentDiv.innerHTML = getSupervisionContent();
        else if(tabId === 'evolucion') contentDiv.innerHTML = getEvolucionContent();
        else if(tabId === 'evaluacion') contentDiv.innerHTML = getEvaluacionGenerica();
        else if(tabId === 'evaluacionFisio') contentDiv.innerHTML = getEvaluacionGenerica('Fisioterapia');
        else if(tabId === 'evaluacionPsico') contentDiv.innerHTML = getEvaluacionGenerica('Psicología');
        else if(tabId === 'evaluacionNutri') contentDiv.innerHTML = getEvaluacionGenerica('Nutrición');
        else if(tabId === 'prescripciones') contentDiv.innerHTML = getPrescripcionesContent();
        else if(tabId === 'turnosCoord') contentDiv.innerHTML = getTurnosCoordContent();
        
        if(tabId === 'recibo' || tabId === 'entrega') setTimeout(initSignatures, 100);
        if(tabId === 'signos') cargarLista('signos', 'historialSignos');
        if(tabId === 'actividades') cargarLista('actividades', 'listaActividades');
        if(tabId === 'medicamentos') cargarLista('medicamentos', 'historialMedicamentos');
        if(tabId === 'entrega') cargarLista('entregas', 'historialEntregas');
        if(tabId === 'recibo') cargarLista('recibos', 'historialRecibos');
    }

    // ==================== RECIBO ====================

    // ==================== GENERAR PDF COMPLETO CON FIRMAS ====================
    window.generarReportePDF = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Logo
        const logoImg = document.getElementById('logoPreview').src;
        if(logoImg && logoImg !== 'data:image/png;base64,') {
            try { doc.addImage(logoImg, 'PNG', 20, 10, 30, 30); } catch(e) {}
        }

        // Encabezado
        doc.setFontSize(16);
        doc.text('VITAL HOGAR PRO IPS', 60, 25);
        doc.setFontSize(10);
        doc.text(`Reporte Completo del Turno`, 60, 35);
        doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 55);
        doc.text(`Profesional: ${currentUser?.name} (${currentUser?.roleName || 'No registrado'})`, 20, 65);
        doc.text(`Paciente: ${document.getElementById('reportePaciente')?.value || 'Maria Gonzalez'}`, 20, 75);

        let y = 95;

        // ========== 1. ACTIVIDADES ==========
        const actividades = getFromLocal('actividades');
        if(actividades.length > 0) {
            doc.text('ACTIVIDADES REALIZADAS:', 20, y);
            y += 10;
            actividades.slice(-10).forEach((d, i) => {
                if(y > 270) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${d.actividad || 'Actividad'} - ${d.hora || 'Sin hora'}`, 25, y);
                if(d.observacion) doc.text(`   Obs: ${d.observacion.substring(0, 60)}`, 30, y+5);
                y += 12;
            });
            y += 10;
        }

        // ========== 2. SIGNOS VITALES ==========
        const signos = getFromLocal('signos');
        if(signos.length > 0) {
            doc.text('SIGNOS VITALES:', 20, y);
            y += 10;
            signos.slice(-10).forEach((d, i) => {
                if(y > 270) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. SpO2:${d.spo2 || '-'}% | FC:${d.fc || '-'} | FR:${d.fr || '-'} | Temp:${d.temp || '-'}°C | TA:${d.bp || '-'} | Glucosa:${d.glucosa || '-'}`, 25, y);
                doc.text(`   Hora: ${d.hora || '-'}`, 30, y+5);
                y += 12;
            });
            y += 10;
        }

        // ========== 3. MEDICAMENTOS ==========
        const medicamentos = getFromLocal('medicamentos');
        if(medicamentos.length > 0) {
            doc.text('MEDICAMENTOS ADMINISTRADOS:', 20, y);
            y += 10;
            medicamentos.slice(-10).forEach((d, i) => {
                if(y > 270) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${d.nombre || 'Medicamento'} - ${d.dosis || 'Sin dosis'} - ${d.hora || 'Sin hora'}`, 25, y);
                if(d.obs) doc.text(`   Obs: ${d.obs.substring(0, 50)}`, 30, y+5);
                y += 12;
            });
            y += 10;
        }

        // ========== 4. ENTREGAS ==========
        const entregas = getFromLocal('entregas');
        if(entregas.length > 0) {
            doc.text('ENTREGAS DE TURNO:', 20, y);
            y += 10;
            const ultimaEntrega = entregas[entregas.length - 1];
            if(ultimaEntrega) {
                doc.text(`Resumen: ${ultimaEntrega.resumen?.substring(0, 80) || 'Sin resumen'}`, 25, y);
                if(ultimaEntrega.pendientes) doc.text(`Pendientes: ${ultimaEntrega.pendientes.substring(0, 80)}`, 25, y+8);
                y += 20;
            }
        }

        // ========== 5. FIRMAS ==========
        y += 15;
        doc.setFontSize(12);
        doc.text('FIRMAS:', 20, y);
        y += 15;
        doc.setFontSize(10);

        function obtenerFirmaCanvas(id) {
            const canvas = document.getElementById(id);
            if(!canvas) return null;
            try {
                const dataUrl = canvas.toDataURL('image/png');
                if(dataUrl && dataUrl !== 'data:image/png;base64,') {
                    return dataUrl;
                }
            } catch(e) {}
            return null;
        }

        // Firma profesional (sigEntrega)
        const firmaProfesional = obtenerFirmaCanvas('sigEntrega');
        if(firmaProfesional) {
            doc.text('Firma del Profesional:', 20, y);
            try { doc.addImage(firmaProfesional, 'PNG', 100, y-5, 60, 25); } catch(e) { doc.text('___________________', 100, y+5); }
            y += 35;
        } else {
            doc.text('Firma del Profesional: ___________________', 20, y);
            y += 12;
        }

        // Firma acudiente (sigRecibe)
        const firmaAcudiente = obtenerFirmaCanvas('sigRecibe');
        if(firmaAcudiente) {
            doc.text('Firma del Acudiente/Familiar:', 20, y);
            try { doc.addImage(firmaAcudiente, 'PNG', 100, y-5, 60, 25); } catch(e) { doc.text('___________________', 100, y+5); }
            y += 35;
        } else {
            doc.text('Firma del Acudiente/Familiar: _____________', 20, y);
            y += 12;
        }

        // Firma recibo (sigRecibo) - opcional
        const firmaRecibo = obtenerFirmaCanvas('sigRecibo');
        if(firmaRecibo) {
            doc.text('Firma de Recibo:', 20, y);
            try { doc.addImage(firmaRecibo, 'PNG', 100, y-5, 60, 25); } catch(e) { doc.text('___________________', 100, y+5); }
            y += 35;
        }

        doc.save(`reporte_completo_${Date.now()}.pdf`);
        showToast('📄 Reporte completo generado con firmas', 'success');
    };

        const roles = ['vital_auxiliar', 'vital_enfermero', 'vital_fisio', 'vital_fono', 'vital_psico', 'vital_nutri', 'vital_to', 'vital_ts', 'vital_tr', 'vital_medico'];
        let totalActividades = 0, totalSignos = 0, totalMedicamentos = 0;
        roles.forEach(r => { const data = JSON.parse(localStorage.getItem(r) || '{}'); totalActividades += (data.actividades?.length || 0); totalSignos += (data.signos?.length || 0); totalMedicamentos += (data.medicamentos?.length || 0); });
        return `<div class="card"><div class="card-title">📊 REPORTES GLOBALES</div>
            <div class="grid-3"><div class="card" style="background:#0f172a; text-align:center;"><strong>📝 Actividades</strong><br>${totalActividades}</div>
            <div class="card" style="background:#0f172a; text-align:center;"><strong>🩺 Signos</strong><br>${totalSignos}</div>
            <div class="card" style="background:#0f172a; text-align:center;"><strong>💊 Medicamentos</strong><br>${totalMedicamentos}</div></div>
            <button class="btn btn-primary" onclick="showToast('📄 Reporte global generado')">📥 PDF Global</button>
        </div>`;
    }

    // ==================== ENFERMERO ====================
    function getSupervisionContent() {
        return `<div class="card"><div class="card-title">📋 Supervisión de Auxiliares</div>
            <p style="color:#94a3b8; font-size:0.9rem;">Total auxiliares activos: 3</p>
            <p style="color:#94a3b8; font-size:0.9rem;">Turnos asignados hoy: 5</p>
            <button class="btn btn-primary" onclick="showToast('Reporte de supervisión generado')">📄 Ver reporte</button>
        </div>`;
    }

    function getEvolucionContent() {
        return `<div class="card"><div class="card-title">📝 Evolución de Enfermería</div>
            <div class="form-group"><label>👤 Paciente</label><select><option>Maria Gonzalez</option><option>Pedro Ramirez</option></select></div>
            <div class="form-group"><label>📝 Notas clínicas</label><textarea rows="5"></textarea></div>
            <button class="btn-voice" onclick="iniciarDictado('notasEvolucion')">🎙️ Dictar</button>
            <button class="btn btn-primary" style="margin-top:10px;" onclick="showToast('✅ Evolución guardada')">💾 Guardar</button>
        </div>`;

    // ==================== EVALUACIÓN GENÉRICA ====================
    function getEvaluacionGenerica(titulo = 'Evaluación') {
        return `<div class="card"><div class="card-title">📝 ${titulo}</div>
            <div class="form-group"><label>👤 Paciente</label><select><option>Maria Gonzalez</option><option>Pedro Ramirez</option></select></div>
            <div class="form-group"><label>📝 Notas clínicas</label><textarea id="evalText" rows="5"></textarea></div>
            <button class="btn-voice" onclick="iniciarDictado('evalText')">🎙️ Dictar</button>
            <button class="btn btn-primary" onclick="guardarEvaluacion()">💾 Guardar</button>
        </div><div class="card"><div class="card-title">📋 Historial</div><div id="historialEvaluacion"></div></div>`;
    }

    window.guardarEvaluacion = () => {
        const texto = document.getElementById('evalText')?.value;
        if(!texto) { showToast('Ingrese texto', 'error'); return; }
        saveToLocal('evaluaciones', { texto });
        document.getElementById('evalText').value = '';
        cargarLista('evaluaciones', 'historialEvaluacion');
        showToast('✅ Evaluación guardada', 'success');
    };

    // ==================== FIRMAS ====================
    function initSignatures() {
        ['sigRecibo', 'sigEntrega', 'sigRecibe'].forEach(id => {
            const canvas = document.getElementById(id);
            if(!canvas) return;
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            let drawing = false;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 2;
            canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
            canvas.addEventListener('mousemove', (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
            canvas.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(drawing) { const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); ctx.stroke(); } });
            canvas.addEventListener('touchend', () => drawing = false);
        });
        cargarLista('recibos', 'historialRecibos');
        cargarLista('entregas', 'historialEntregas');
        cargarLista('signos', 'historialSignos');
        cargarLista('actividades', 'listaActividades');
        cargarLista('medicamentos', 'historialMedicamentos');
        cargarLista('recursos', 'listaRecursos');
        cargarLista('beneficiarios', 'listaBeneficiarios');
    }

    window.clearCanvas = (id) => { const canvas = document.getElementById(id); if(canvas) { const ctx = canvas.getContext('2d'); ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); } };
    
    // ==================== CAPTURAR FIRMAS ====================
    function capturarFirmas() {
        const firmas = {
            sigRecibo: document.getElementById('sigRecibo'),
            sigEntrega: document.getElementById('sigEntrega'),
            sigRecibe: document.getElementById('sigRecibe')
        };
        let todasFirmas = true;
        let mensaje = '';
        for (const [nombre, canvas] of Object.entries(firmas)) {
            if (canvas) {
                try {
                    const dataUrl = canvas.toDataURL('image/png');
                    const img = new Image();
                    img.src = dataUrl;
                    const canvasAux = document.createElement('canvas');
                    canvasAux.width = canvas.width;
                    canvasAux.height = canvas.height;
                    const ctx = canvasAux.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvasAux.width, canvasAux.height);
                    const data = imageData.data;
                    let hasDraw = false;
                    for (let i = 0; i < data.length; i += 4) {
                        if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) {
                            hasDraw = true;
                            break;
                        }
                    }
                    if (!hasDraw) {
                        todasFirmas = false;
                        mensaje += `Firma de ${nombre.replace('sig', '')} está vacía. `;
                    }
                } catch(e) {
                    todasFirmas = false;
                    mensaje += `Error en ${nombre}. `;
                }
            } else {
                todasFirmas = false;
                mensaje += `Canvas ${nombre} no encontrado. `;
            }
        }
        if (!todasFirmas) {
            showToast('⚠️ ' + mensaje + 'Las firmas no se incluirán en el PDF.', 'warning');
        } else {
            showToast('✅ Firmas capturadas correctamente', 'success');
        }
        return todasFirmas;
    }

    // ==================== INICIALIZAR ====================
    loadMasterData();
    document.getElementById('loginUserSelect').addEventListener('change', cargarDatosUsuario);
</script>
