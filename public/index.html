<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vital Hogar Pro IPS</title>
<style>
/* ========== ESTILOS BÁSICOS ========== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card-title{font-size:1.1rem;font-weight:600;color:#22c55e;margin-bottom:12px}
input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;margin-bottom:10px}
.btn{background:#22c55e;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
.btn:hover{background:#16a34a}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hidden{display:none}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:8px 16px;background:#1e293b;border-radius:20px;cursor:pointer;border:1px solid transparent}
.tab.active{background:#22c55e;color:white}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;padding:12px 24px;border-radius:30px;display:none;z-index:999}
.toast.show{display:block}
.login-container{max-width:400px;margin:40px auto}
</style>
</head>
<body>

<!-- ========== LOGIN ========== -->
<div id="loginScreen">
  <div class="login-container card">
    <h2 class="card-title">🔐 Vital Hogar Pro IPS</h2>
    <input type="email" id="loginEmail" placeholder="Email" value="admin@vitalhogar.com">
    <input type="password" id="loginPassword" placeholder="Contraseña" value="admin123">
    <button class="btn" onclick="login()">Ingresar</button>
    <div id="loginError" style="color:#ef4444;margin-top:8px;"></div>
  </div>
</div>

<!-- ========== MAIN ========== -->
<div id="mainScreen" class="hidden">
  <div class="tabs" id="tabsContainer">
    <div class="tab active" onclick="loadTab('turnos')">📅 Turnos</div>
    <div class="tab" onclick="loadTab('pacientes')">🏥 Pacientes</div>
    <div class="tab" onclick="loadTab('actividades')">✅ Actividades</div>
    <div class="tab" onclick="loadTab('signos')">🩺 Signos</div>
  </div>
  <div id="dynamicContent"></div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
//  CONFIGURACIÓN
// ============================================================
const API_URL = 'https://vital-backend-1-y4kt.onrender.com';
let TOKEN = localStorage.getItem('vital_token') || null;
let USER = null;

// ============================================================
//  UTILIDADES
// ============================================================
function $(id) { return document.getElementById(id); }
function showToast(msg, type = 'success') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
//  LOGIN
// ============================================================
async function login() {
  const email = $('loginEmail').value.trim();
  const password = $('loginPassword').value;
  const errorDiv = $('loginError');

  try {
    const res = await fetch(API_URL + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!data.success) {
      errorDiv.textContent = data.message || 'Credenciales inválidas';
      return;
    }

    TOKEN = data.data.token;
    USER = data.data.user;
    localStorage.setItem('vital_token', TOKEN);
    localStorage.setItem('vital_user', JSON.stringify(USER));

    $('loginScreen').classList.add('hidden');
    $('mainScreen').classList.remove('hidden');
    showToast('Bienvenido ' + USER.name);
    loadTab('turnos');
  } catch (e) {
    errorDiv.textContent = 'Error de conexión';
  }
}

// ============================================================
//  VERIFICAR SESIÓN
// ============================================================
function checkSession() {
  const token = localStorage.getItem('vital_token');
  if (token) {
    TOKEN = token;
    USER = JSON.parse(localStorage.getItem('vital_user') || '{}');
    $('loginScreen').classList.add('hidden');
    $('mainScreen').classList.remove('hidden');
    loadTab('turnos');
    return true;
  }
  return false;
}

// ============================================================
//  PETICIONES AUTENTICADAS
// ============================================================
async function apiRequest(endpoint, options = {}) {
  const res = await fetch(API_URL + endpoint, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN,
      ...(options.headers || {})
    }
  });
  return await res.json();
}

// ============================================================
//  CARGAR TABS
// ============================================================
function loadTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes(tabName) || t.dataset.tab === tabName) {
      t.classList.add('active');
    }
  });

  const content = $('dynamicContent');
  switch(tabName) {
    case 'turnos': content.innerHTML = renderTurnos(); break;
    case 'pacientes': content.innerHTML = renderPacientes(); break;
    case 'actividades': content.innerHTML = renderActividades(); break;
    case 'signos': content.innerHTML = renderSignos(); break;
    default: content.innerHTML = '<div class="card"><p>Contenido no disponible</p></div>';
  }
}

// ============================================================
//  RENDER TURNOS
// ============================================================
function renderTurnos() {
  return `
    <div class="card">
      <div class="card-title">📅 Turnos</div>
      <button class="btn" onclick="cargarTurnos()">🔄 Cargar turnos</button>
      <div id="listaTurnos" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <div class="card-title">➕ Crear Turno</div>
      <input type="text" id="pacienteId" placeholder="ID del paciente">
      <input type="text" id="profesionalId" placeholder="ID del profesional">
      <input type="date" id="fechaTurno">
      <select id="tipoTurno">
        <option value="6h">6 horas</option>
        <option value="8h">8 horas</option>
        <option value="12h">12 horas</option>
        <option value="24h">24 horas</option>
      </select>
      <button class="btn" onclick="crearTurno()">📅 Crear turno</button>
    </div>
  `;
}

async function cargarTurnos() {
  const data = await apiRequest('/api/shifts');
  const div = $('listaTurnos');
  if (data.success && data.data.length > 0) {
    div.innerHTML = data.data.map(t => `
      <div style="background:#0f172a;padding:10px;border-radius:8px;margin-bottom:6px;">
        <strong>Paciente:</strong> ${t.patient_id} <br>
        <strong>Fecha:</strong> ${t.shift_date} <br>
        <strong>Tipo:</strong> ${t.shift_type} <br>
        <strong>Estado:</strong> ${t.estado || 'PENDIENTE'}
      </div>
    `).join('');
  } else {
    div.innerHTML = '<p style="color:#94a3b8;">No hay turnos registrados</p>';
  }
}

async function crearTurno() {
  const data = await apiRequest('/api/shifts', {
    method: 'POST',
    body: JSON.stringify({
      patient_id: $('pacienteId').value,
      professional_id: $('profesionalId').value,
      shift_date: $('fechaTurno').value,
      shift_type: $('tipoTurno').value
    })
  });
  if (data.success) {
    showToast('✅ Turno creado');
    cargarTurnos();
  } else {
    showToast('❌ Error: ' + (data.message || 'Desconocido'), 'error');
  }
}

// ============================================================
//  RENDER PACIENTES
// ============================================================
function renderPacientes() {
  return `
    <div class="card">
      <div class="card-title">🏥 Pacientes</div>
      <button class="btn" onclick="cargarPacientes()">🔄 Cargar pacientes</button>
      <div id="listaPacientes" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <div class="card-title">➕ Crear Paciente</div>
      <input type="text" id="nombrePaciente" placeholder="Nombre completo">
      <input type="text" id="documentoPaciente" placeholder="Documento">
      <input type="text" id="diagnosticoPaciente" placeholder="Diagnóstico">
      <button class="btn" onclick="crearPaciente()">➕ Crear paciente</button>
    </div>
  `;
}

async function cargarPacientes() {
  const data = await apiRequest('/api/patients');
  const div = $('listaPacientes');
  if (data.success && data.data.length > 0) {
    div.innerHTML = data.data.map(p => `
      <div style="background:#0f172a;padding:10px;border-radius:8px;margin-bottom:6px;">
        <strong>${p.name}</strong> - ${p.document} <br>
        <span style="color:#94a3b8;">${p.diagnosis || 'Sin diagnóstico'}</span>
      </div>
    `).join('');
  } else {
    div.innerHTML = '<p style="color:#94a3b8;">No hay pacientes registrados</p>';
  }
}

async function crearPaciente() {
  const data = await apiRequest('/api/patients', {
    method: 'POST',
    body: JSON.stringify({
      name: $('nombrePaciente').value,
      document: $('documentoPaciente').value,
      diagnosis: $('diagnosticoPaciente').value
    })
  });
  if (data.success) {
    showToast('✅ Paciente creado');
    cargarPacientes();
  } else {
    showToast('❌ Error: ' + (data.message || 'Desconocido'), 'error');
  }
}

// ============================================================
//  RENDER ACTIVIDADES
// ============================================================
function renderActividades() {
  return `
    <div class="card">
      <div class="card-title">✅ Actividades</div>
      <button class="btn" onclick="cargarActividades()">🔄 Cargar actividades</button>
      <div id="listaActividades" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <div class="card-title">➕ Crear Actividad</div>
      <input type="text" id="pacienteActividad" placeholder="ID del paciente">
      <input type="text" id="actividadNombre" placeholder="Nombre de la actividad">
      <input type="time" id="horaActividad">
      <textarea id="obsActividad" placeholder="Observaciones"></textarea>
      <button class="btn" onclick="crearActividad()">➕ Crear actividad</button>
    </div>
  `;
}

async function cargarActividades() {
  const data = await apiRequest('/api/actividades/' + USER.id);
  const div = $('listaActividades');
  if (data.success && data.data.length > 0) {
    div.innerHTML = data.data.map(a => `
      <div style="background:#0f172a;padding:10px;border-radius:8px;margin-bottom:6px;">
        <strong>${a.actividad}</strong> - ${a.hora} <br>
        <span style="color:#94a3b8;">${a.observacion || 'Sin observaciones'}</span>
      </div>
    `).join('');
  } else {
    div.innerHTML = '<p style="color:#94a3b8;">No hay actividades registradas</p>';
  }
}

async function crearActividad() {
  const data = await apiRequest('/api/actividades', {
    method: 'POST',
    body: JSON.stringify({
      patient_id: $('pacienteActividad').value,
      user_id: USER.id,
      actividad: $('actividadNombre').value,
      hora: $('horaActividad').value,
      observacion: $('obsActividad').value
    })
  });
  if (data.success) {
    showToast('✅ Actividad creada');
    cargarActividades();
  } else {
    showToast('❌ Error: ' + (data.message || 'Desconocido'), 'error');
  }
}

// ============================================================
//  RENDER SIGNOS
// ============================================================
function renderSignos() {
  return `
    <div class="card">
      <div class="card-title">🩺 Signos Vitales</div>
      <button class="btn" onclick="cargarSignos()">🔄 Cargar signos</button>
      <div id="listaSignos" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <div class="card-title">➕ Registrar Signos</div>
      <div class="grid-2">
        <input type="number" id="spo2" placeholder="SpO2 (%)">
        <input type="number" id="fc" placeholder="FC (lpm)">
        <input type="number" id="fr" placeholder="FR (rpm)">
        <input type="number" id="temp" placeholder="Temp (°C)" step="0.1">
      </div>
      <input type="text" id="bp" placeholder="TA (ej: 120/80)">
      <input type="time" id="horaSignos">
      <textarea id="obsSignos" placeholder="Observaciones"></textarea>
      <button class="btn" onclick="crearSignos()">💾 Guardar signos</button>
    </div>
  `;
}

async function cargarSignos() {
  const data = await apiRequest('/api/signos/' + USER.id);
  const div = $('listaSignos');
  if (data.success && data.data.length > 0) {
    div.innerHTML = data.data.map(s => `
      <div style="background:#0f172a;padding:10px;border-radius:8px;margin-bottom:6px;">
        <strong>SpO2:</strong> ${s.spo2 || '-'}% | <strong>FC:</strong> ${s.fc || '-'} | <strong>FR:</strong> ${s.fr || '-'} | <strong>Temp:</strong> ${s.temp || '-'}°C
        <br><span style="color:#94a3b8;">${s.obs || 'Sin observaciones'}</span>
      </div>
    `).join('');
  } else {
    div.innerHTML = '<p style="color:#94a3b8;">No hay signos registrados</p>';
  }
}

async function crearSignos() {
  const data = await apiRequest('/api/signos', {
    method: 'POST',
    body: JSON.stringify({
      patient_id: 'paciente-id-temp',
      user_id: USER.id,
      spo2: parseInt($('spo2').value) || 0,
      fc: parseInt($('fc').value) || 0,
      fr: parseInt($('fr').value) || 0,
      temp: parseFloat($('temp').value) || 0,
      bp: $('bp').value,
      hora: $('horaSignos').value,
      obs: $('obsSignos').value
    })
  });
  if (data.success) {
    showToast('✅ Signos guardados');
    cargarSignos();
  } else {
    showToast('❌ Error: ' + (data.message || 'Desconocido'), 'error');
  }
}

// ============================================================
//  INICIALIZACIÓN
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  if (!checkSession()) {
    $('loginScreen').classList.remove('hidden');
  }
});

// ============================================================
//  EXPONER FUNCIONES GLOBALES
// ============================================================
window.login = login;
window.loadTab = loadTab;
window.cargarTurnos = cargarTurnos;
window.crearTurno = crearTurno;
window.cargarPacientes = cargarPacientes;
window.crearPaciente = crearPaciente;
window.cargarActividades = cargarActividades;
window.crearActividad = crearActividad;
window.cargarSignos = cargarSignos;
window.crearSignos = crearSignos;

console.log('✅ Vital Hogar Pro - Conectado al backend:', API_URL);
</script>
</body>
</html>
