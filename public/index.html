<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>Vital Hogar Pro IPS - Domiciliaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #logoPreview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header h1 {
            font-size: 1rem;
            color: #22c55e;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.6rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            flex-wrap: wrap;
        }
        .role-badge {
            background: #22c55e20;
            color: #22c55e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
        }
        .logout-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #22c55e;
            margin-bottom: 12px;
            border-left: 3px solid #22c55e;
            padding-left: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #0f172a !important;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white !important;
            font-size: 0.9rem;
        }
        .form-group select option {
            background: #1e293b;
            color: white;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .btn-primary {
            background: #22c55e;
            color: white;
            width: 100%;
        }
        .btn-secondary {
            background: #334155;
            color: white;
        }
        .btn-warning {
            background: #f97316;
            color: white;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-voice {
            background: #8b5cf6;
            color: white;
            padding: 6px 12px;
            font-size: 0.75rem;
            width: auto;
            margin-top: 4px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
            width: auto;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab {
            padding: 8px 14px;
            background: #1e293b;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab:hover {
            background: #334155;
        }
        .tab.active {
            background: #22c55e;
            color: white;
        }
        .hidden {
            display: none !important;
        }
        .activity-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            border-left: 3px solid #22c55e;
            font-size: 0.85rem;
        }
        .photo-preview {

            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .photo-preview img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #334155;
        }
        .signature-canvas {
            background: white;
            border-radius: 10px;
            width: 100%;
            height: 120px;
            border: 2px solid #22c55e;
            touch-action: none;
            cursor: crosshair;
        }
        .sbar-card {
            background: #0f172a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #8b5cf6;
        }

        }

            color: #8b5cf6;
            font-weight: 600;
        }

            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid #f97316;
            font-size: 0.8rem;
        }
        .toast {

            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border-radius: 30px;
            padding: 10px 20px;
            display: none;
            z-index: 1000;
            font-size: 0.8rem;
            max-width: 90%;
            text-align: center;
            border: 1px solid #334155;
        }
        .toast.show {

        }
        .toast.success {

        }
        .toast.error {

        }
        .toast.warning {

        }

            text-align: left;
            border-bottom: 1px solid #334155;
        }

            margin-bottom: 6px;
            border-left: 3px solid #8b5cf6;

            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .alert-critical {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .alert-warning {
            background: #f9731620;
            border: 1px solid #f97316;
            color: #f97316;
        }

        // ============================================================
        //  TOAST NOTIFICATIONS
        // ============================================================
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        //  DICTADO POR VOZ
        // ============================================================
        function iniciarDictado(targetId) {
            if (!('webkitSpeechRecognition' in window)) {
                showToast('Voz no soportada en este navegador', 'error');
                return;
            }
            if (recognitionActive) {
                showToast('Ya hay una grabación en curso', 'warning');
                return;
            }
            
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                recognitionActive = true;
                showToast('🎙️ Habla ahora...', 'success');
            };

            recognition.onend = function() {
                recognitionActive = false;
                showToast('✅ Grabación finalizada', 'success');
            };

            recognition.onresult = function(event) {
                const target = document.getElementById(targetId);
                if (!target) return;
                const result = event.results[0];
                if (result && result.isFinal) {
                    const texto = result[0].transcript.trim();
                    if (texto) {
                        target.value += (target.value ? ' ' : '') + texto;
                        showToast('✅ Dictado completado', 'success');
                    }
                }
            };

            recognition.onerror = function(event) {
                recognitionActive = false;
                if (event.error === 'not-allowed') showToast('Permiso de micrófono denegado', 'error');
                else if (event.error === 'no-speech') showToast('No se detectó voz', 'error');
                else showToast('Error: ' + event.error, 'error');
            };

            recognition.start();
        }

        // ============================================================
        //  FUNCIONES DE ALMACENAMIENTO LOCAL
        // ============================================================
        function saveToLocal(key, data) {
            if (!storageKey) {
                showToast('Error: No hay sesión activa', 'error');
                return;
            }
            
            const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
            all[key] = all[key] || [];
            all[key].push({
                ...data,
                timestamp: new Date().toISOString(),
                user: currentUser?.name || 'Anónimo'
            });
            localStorage.setItem(storageKey, JSON.stringify(all));
            showToast(`✅ ${key} guardado`, 'success');
        }

        function getFromLocal(key) {
            if (!storageKey) return [];
            const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
            return all[key] || [];
        }

        function cargarLista(key, elementId) {
            const items = getFromLocal(key);
            const div = document.getElementById(elementId);
            if (!div) return;
            
            if (items.length === 0) {
                div.innerHTML = '<p style="color:#64748b; font-size:0.85rem;">No hay registros</p>';
            } else {
                div.innerHTML = items.slice(-10).reverse().map(i => {
                    const timestamp = i.timestamp ? new Date(i.timestamp).toLocaleString() : 'Fecha no disponible';
                    const contenido = i.resumen || i.actividad || i.nombre || JSON.stringify(i);
                    return `<div class="activity-item"><strong>${timestamp}</strong><br>${contenido}</div>`;
                }).join('');
            }
        }

            document.getElementById('estadoTurno').innerHTML = `

                <p>🕐 Salida: ${salida.toLocaleTimeString()}</p>

                salida: salida.toISOString(),

        window.capturarFoto = function() {
            const input = document.getElementById('photoInput');
            if (input.files.length > 0) {
                const preview = document.getElementById('photoPreview');
                for (let file of input.files) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                }
                showToast('📸 Fotos capturadas', 'success');
            } else {
                showToast('Seleccione una imagen o use la cámara', 'error');
            }
        };

        window.agregarActividad = function() {
            const hora = document.getElementById('horaActividad').value;

            const actividad = document.getElementById('tipoActividad').value;

            const novedadDesc = document.getElementById('novedadDesc').value;

            const data = {

                hora,
                observacion,
                educacion: educacion ? `${educacion}: ${educacionDesc}` : '',
                novedad: novedad ? `${novedad}: ${novedadDesc}` : '',
                fotos: document.getElementById('photoPreview').children.length
            };

        window.guardarSignos = function() {
            const hora = document.getElementById('horaSignos').value;
            if (!hora) {
                showToast('Ingrese la hora', 'error');
                return;
            }

            const spo2 = parseInt(document.getElementById('spo2').value);
            const braden = parseInt(document.getElementById('braden').value);
            const temp = parseFloat(document.getElementById('temp').value);
            const glucosa = parseInt(document.getElementById('glucosa').value);

            let alertas = [];
            let tipoAlerta = 'success';

            if (spo2 < 88) {
                alertas.push('🚨 CRÍTICO: SpO2 muy baja (<88%)');
                tipoAlerta = 'critical';
            } else if (spo2 < 92) {
                alertas.push('⚠️ ADVERTENCIA: SpO2 límite bajo (<92%)');
                tipoAlerta = 'warning';
            }

            if (temp > 38.5) {
                alertas.push('🌡️ FIEBRE: Temperatura >38.5°C');
                tipoAlerta = 'warning';
            }

            if (glucosa > 180) {
                alertas.push('⚠️ HIPERGLUCEMIA: Glucosa >180 mg/dL');
                tipoAlerta = 'warning';
            } else if (glucosa < 70 && glucosa > 0) {
                alertas.push('⚠️ HIPOGLUCEMIA: Glucosa <70 mg/dL');
                tipoAlerta = 'warning';
            }

            if (braden < 12) {
                alertas.push('⚠️ ALTO RIESGO de úlceras (Braden <12)');
                tipoAlerta = 'warning';
            } else if (braden < 15) {
                alertas.push('⚠️ RIESGO MODERADO de úlceras (Braden <15)');
                tipoAlerta = 'warning';
            }

            let alertMsg = alertas.length > 0 ? alertas.join(' | ') : '✅ Signos dentro de parámetros normales';
            const alertDiv = document.getElementById('signosAlert');
            alertDiv.innerHTML = `<div class="alert-box alert-${tipoAlerta}">${alertMsg}</div>`;

            saveToLocal('signos', {
                spo2,
                fc: document.getElementById('fc').value,
                fr: document.getElementById('fr').value,
                temp,
                bp: document.getElementById('bp').value,
                glucosa,
                braden,
                hora,
                obs: document.getElementById('obsSignos').value,
                alertas: alertas
            });

            document.getElementById('spo2').value = '';
            document.getElementById('fc').value = '';
            document.getElementById('fr').value = '';
            document.getElementById('temp').value = '';
            document.getElementById('bp').value = '';
            document.getElementById('glucosa').value = '';
            document.getElementById('braden').value = '';
            document.getElementById('obsSignos').value = '';
            cargarLista('signos', 'historialSignos');
            showToast('✅ Signos guardados', 'success');
        };

        // ============================================================
        //  GENERAR PDF
        // ============================================================
        window.generarReportePDF = async function() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let y = 25;
                const marginY = 270;

                function checkPage() {
                    if (y > marginY) {
                        doc.addPage();
                        y = 20;
                    }
                }

                function cleanText(text) {
                    if (!text) return '';
                    return String(text).trim();
                }

                function obtenerFirmaCanvas(id) {
                    const canvas = document.getElementById(id);
                    if (!canvas) return null;
                    try {
                        const dataUrl = canvas.toDataURL('image/png');
                        if (dataUrl && dataUrl !== 'data:image/png;base64,') {
                            return dataUrl;
                        }
                    } catch (e) {
                        console.warn('Error capturando firma:', e);
                    }
                    return null;
                }

                // Logo
                const logoImg = document.getElementById('logoPreview').src;
                if (logoImg && logoImg !== '') {
                    try {
                        doc.addImage(logoImg, 'PNG', 20, 10, 30, 30);
                    } catch (e) {}
                }

                doc.setFont('helvetica');
                doc.setFontSize(16);
                doc.text('VITAL HOGAR PRO IPS', 60, 25);
                y = 45;
                doc.setFontSize(10);
                doc.text('Reporte Completo del Turno', 60, y);
                y += 10;
                doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, y);
                y += 8;
                doc.text(`Profesional: ${cleanText(currentUser?.name)} (${cleanText(currentUser?.roleName)})`, 20, y);
                y += 8;
                doc.text(`Paciente: ${cleanText(document.getElementById('reportePaciente')?.value) || 'Maria Gonzalez'}`, 20, y);
                y += 15;

                // ACTIVIDADES
                const actividades = getFromLocal('actividades');
                if (actividades.length > 0) {
                    checkPage();
                    doc.text('ACTIVIDADES REALIZADAS:', 20, y);
                    y += 8;
                    actividades.slice(-10).forEach((d, i) => {
                        checkPage();
                        const actividad = cleanText(d.actividad || 'Actividad');
                        const hora = cleanText(d.hora || 'Sin hora');
                        const observacion = cleanText(d.observacion || '');
                        const educacion = cleanText(d.educacion || '');
                        const novedad = cleanText(d.novedad || '');

                        doc.text(`${i+1}. ${actividad} - ${hora}`, 25, y);
                        y += 6;
                        if (observacion) {
                            doc.text(`   Obs: ${observacion.substring(0, 60)}`, 30, y);
                            y += 6;
                        }
                        if (educacion) {
                            doc.text(`   Educ: ${educacion.substring(0, 50)}`, 30, y);
                            y += 6;
                        }
                        if (novedad) {
                            doc.text(`   Nov: ${novedad.substring(0, 50)}`, 30, y);
                            y += 6;
                        }
                        if (d.fotos) {
                            doc.text(`   Fotos: ${d.fotos}`, 30, y);
                            y += 6;
                        }
                        y += 4;
                    });
                    y += 10;
                }

                // SIGNOS
                const signos = getFromLocal('signos');
                if (signos.length > 0) {
                    checkPage();
                    doc.text('SIGNOS VITALES:', 20, y);
                    y += 8;
                    signos.slice(-10).forEach((d, i) => {
                        checkPage();
                        doc.text(
                            `${i+1}. SpO2:${cleanText(d.spo2) || '-'}% | FC:${cleanText(d.fc) || '-'} | FR:${cleanText(d.fr) || '-'} | Temp:${cleanText(d.temp) || '-'}°C | TA:${cleanText(d.bp) || '-'}`,
                            25, y);
                        y += 6;
                        if (d.glucosa) {
                            doc.text(`   Glucosa: ${cleanText(d.glucosa)} mg/dL`, 30, y);
                            y += 6;
                        }
                        if (d.braden) {
                            doc.text(`   Braden: ${cleanText(d.braden)}`, 30, y);
                            y += 6;
                        }
                        if (d.alertas && d.alertas.length > 0) {
                            doc.text(`   Alertas: ${d.alertas.join('; ')}`, 30, y);
                            y += 6;
                        }
                        y += 4;
                    });
                    y += 10;
                }

                // MEDICAMENTOS
                const medicamentos = getFromLocal('medicamentos');
                if (medicamentos.length > 0) {
                    checkPage();
                    doc.text('MEDICAMENTOS ADMINISTRADOS:', 20, y);
                    y += 8;
                    medicamentos.slice(-10).forEach((d, i) => {
                        checkPage();
                        const nombre = cleanText(d.nombre || 'Medicamento');
                        doc.text(`${i+1}. ${nombre} - ${cleanText(d.dosis) || 'Sin dosis'} - ${cleanText(d.hora) || 'Sin hora'}`,
                            25, y);
                        y += 6;
                        if (d.obs) {
                            doc.text(`   Obs: ${cleanText(d.obs).substring(0, 50)}`, 30, y);
                            y += 6;
                        }
                        y += 4;
                    });
                    y += 10;
                }

                // ENTREGA
                const entregas = getFromLocal('entregas');
                if (entregas.length > 0) {
                    checkPage();
                    doc.text('ENTREGA DE TURNO:', 20, y);
                    y += 8;
                    const ultima = entregas[entregas.length - 1];
                    if (ultima) {
                        doc.text(`Hora: ${cleanText(ultima.horaEntrega) || 'No registrada'}`, 25, y);
                        y += 6;
                        doc.text(`Resumen: ${cleanText(ultima.resumen).substring(0, 80) || 'Sin resumen'}`, 25, y);
                        y += 6;
                        if (ultima.pendientes) {
                            doc.text(`Pendientes: ${cleanText(ultima.pendientes).substring(0, 80)}`, 25, y);
                            y += 6;
                        }
                        if (ultima.sbar) {
                            const s = ultima.sbar;
                            y += 4;
                            doc.text('SBAR:', 25, y);
                            y += 6;
                            if (s.situacion) { doc.text(`S - ${cleanText(s.situacion).substring(0, 40)}`, 30, y);
                                y += 6; }
                            if (s.antecedentes) { doc.text(`A - ${cleanText(s.antecedentes).substring(0, 40)}`, 30, y);
                                y += 6; }
                            if (s.evaluacion) { doc.text(`B - ${cleanText(s.evaluacion).substring(0, 40)}`, 30, y);
                                y += 6; }
                            if (s.recomendacion) { doc.text(`R - ${cleanText(s.recomendacion).substring(0, 40)}`, 30, y);
                                y += 6; }
                        }
                        y += 10;
                    }
                }

                // FIRMAS
                y += 10;
                checkPage();
                doc.setFontSize(12);
                doc.text('FIRMAS:', 20, y);
                y += 12;
                doc.setFontSize(10);

                const canvasIds = ['sigEntrega', 'sigRecibe', 'sigRecibo', 'sigProfesional', 'sigPaciente', 'sigFamiliar'];
                const nombresFirmas = {
                    'sigEntrega': 'Firma del Profesional (Entrega)',
                    'sigRecibe': 'Firma del Acudiente/Familiar (Recibe)',
                    'sigRecibo': 'Firma de Recibo',
                    'sigProfesional': 'Firma del Profesional (Evaluación)',
                    'sigPaciente': 'Firma del Paciente',
                    'sigFamiliar': 'Firma del Familiar'
                };

                let firmaEncontrada = false;
                for (const id of canvasIds) {
                    const firmaData = obtenerFirmaCanvas(id);
                    if (firmaData) {
                        firmaEncontrada = true;
                        doc.text(`${nombresFirmas[id] || id}:`, 20, y);
                        try {
                            doc.addImage(firmaData, 'PNG', 100, y - 5, 60, 25);
                        } catch (e) {
                            doc.text('___________________', 100, y + 5);
                        }
                        y += 30;
                        if (y > marginY) {
                            doc.addPage();
                            y = 20;
                        }
                    }
                }

                if (!firmaEncontrada) {
                    doc.text('No se registraron firmas en este turno', 20, y);
                    y += 10;
                }

                doc.save(`reporte_completo_${Date.now()}.pdf`);
                showToast('📄 Reporte completo generado con firmas', 'success');
            } catch (error) {
                console.error('Error generando PDF:', error);
                showToast('Error al generar el PDF', 'error');
            }
        };

        // ============================================================
        //  FIRMAS DIGITALES
        // ============================================================
        function initSignatures() {
            if (signatureInitialized) return;
            
            const canvasIds = ['sigRecibo', 'sigEntrega', 'sigRecibe', 'sigProfesional', 'sigPaciente', 'sigFamiliar'];
            canvasIds.forEach(id => {
                const canvas = document.getElementById(id);
                if (!canvas) return;
                
                canvas.width = canvas.offsetWidth || 300;
                canvas.height = canvas.offsetHeight || 120;
                
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#94a3b8';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
                
                let drawing = false;
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                
                const startDraw = (e) => {
                    drawing = true;
                    ctx.beginPath();
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                    ctx.moveTo(x, y);
                };
                
                const draw = (e) => {
                    if (!drawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                };
                
                const endDraw = () => { drawing = false; };
                
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
                canvas.addEventListener('touchend', endDraw);
            });
            
            signatureInitialized = true;
        }

        window.clearCanvas = function(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
        };
