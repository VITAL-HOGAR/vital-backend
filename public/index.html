    <script>
        // Verificar y asegurar que jsPDF esté disponible
        (function() {
            // Si jsPDF no está definido, intentar cargarlo manualmente
            if (typeof jsPDF === 'undefined') {
                console.warn('⚠️ jsPDF no está disponible, intentando cargar manualmente...');
                
                var script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                script.onload = function() {
                    console.log('✅ jsPDF cargado manualmente');
                    // Disparar evento para notificar que jsPDF está listo
                    document.dispatchEvent(new Event('jspdf-ready'));
                };
                script.onerror = function() {
                    console.error('❌ No se pudo cargar jsPDF');
                    document.addEventListener('DOMContentLoaded', function() {
                        var toast = document.getElementById('toast');
                        if (toast) {
                            toast.textContent = '⚠️ La librería PDF no está disponible. Verifica tu conexión a internet.';
                            toast.className = 'toast error show';
                            setTimeout(function() { toast.classList.remove('show'); }, 5000);
                        }
                    });
                };
                document.head.appendChild(script);
            } else {
                console.log('✅ jsPDF ya está cargado');
                document.dispatchEvent(new Event('jspdf-ready'));
            }
        })();
    </script>

    <script>
        // ============================================================
        //  CONFIGURACIÓN
        // ============================================================
        var API_URL = 'https://vital-backend-1-y4kt.onrender.com';
        var LOGO_URL = 'https://drive.google.com/thumbnail?id=1FA7SjXi_e8Xqd562_dgNJhd0NBMw4479&sz=w1000';
        var LOGO_SVG_FALLBACK = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 60%22%3E%3Crect width=%22200%22 height=%2260%22 rx=%2210%22 fill=%22%231e293b%22/%3E%3Ctext x=%2215%22 y=%2238%22 font-size=%2222%22 font-weight=%22bold%22 fill=%22%2322c55e%22%3EVITAL%3C/text%3E%3Ctext x=%2295%22 y=%2238%22 font-size=%2222%22 font-weight=%22bold%22 fill=%22%23ffffff%22%3EHOGAR%3C/text%3E%3Ctext x=%22175%22 y=%2238%22 font-size=%2210%22 fill=%22%2394a3b8%22%3E®%3C/text%3E%3C/svg%3E';
        var jspdfReady = false;
        
        // Estado global
        var currentUser = null;
        var currentRole = null;
        var storageKey = null;
        var capturedPhotos = [];
        var educationTopics = [];
        var recognitionActive = false;
        var horaEntrada = null;
        
        // ============================================================
        //  INICIALIZACIÓN
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Esperar a que jsPDF esté listo
            if (typeof jsPDF !== 'undefined') {
                jspdfReady = true;
                console.log('✅ jsPDF listo desde el inicio');
            }
            
            document.addEventListener('jspdf-ready', function() {
                jspdfReady = true;
                console.log('✅ jsPDF listo después de carga manual');
            });
            
            initPasswordToggle();
            loadMasterData();
            loadEducationTopics();
            
            document.getElementById('loginBtn').addEventListener('click', login);
            document.getElementById('loginPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') login();
            });
            document.getElementById('loginEmail').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') login();
            });
            
            if (!checkSession()) {
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        });

        // ============================================================
        //  VERIFICAR JSPDF (FUNCIÓN MEJORADA)
        // ============================================================
        function verificarJSPDF() {
            console.log('🔍 Verificando jsPDF...');
            
            // Si ya está disponible, devolver true
            if (typeof jsPDF !== 'undefined') {
                console.log('✅ jsPDF está disponible');
                return true;
            }
            
            // Si no está disponible, intentar cargarlo
            console.warn('⚠️ jsPDF no está disponible, intentando cargar...');
            
            // Intentar cargar desde múltiples fuentes
            var fuentes = [
                'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
                'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js',
                'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js'
            ];
            
            function intentarCargar(indice) {
                if (indice >= fuentes.length) {
                    console.error('❌ No se pudo cargar jsPDF desde ninguna fuente');
                    showToast('❌ Error: No se pudo cargar la librería PDF', 'error');
                    return false;
                }
                
                try {
                    var script = document.createElement('script');
                    script.src = fuentes[indice];
                    script.onload = function() {
                        console.log('✅ jsPDF cargado desde:', fuentes[indice]);
                        document.dispatchEvent(new Event('jspdf-ready'));
                        return true;
                    };
                    script.onerror = function() {
                        console.warn('⚠️ Falló carga desde:', fuentes[indice]);
                        intentarCargar(indice + 1);
                    };
                    document.head.appendChild(script);
                } catch (e) {
                    console.warn('⚠️ Error al cargar desde:', fuentes[indice], e);
                    intentarCargar(indice + 1);
                }
            }
            
            intentarCargar(0);
            return false;
        }

        // ============================================================
        //  FUNCIÓN PRINCIPAL DE REPORTES (CON VERIFICACIÓN)
        // ============================================================
        function generarReportePorRol() {
            console.log('📄 Generando reporte para rol:', currentRole);
            
            // Verificar jsPDF
            if (typeof jsPDF === 'undefined') {
                showToast('⏳ Cargando librería PDF, espere un momento...', 'warning');
                verificarJSPDF();
                
                // Esperar a que jsPDF se cargue
                var esperar = function(intentos) {
                    if (typeof jsPDF !== 'undefined') {
                        console.log('✅ jsPDF cargado, generando reporte...');
                        generarReportePorRol();
                        return;
                    }
                    if (intentos > 20) {
                        showToast('❌ Error: La librería PDF no se pudo cargar', 'error');
                        return;
                    }
                    setTimeout(function() { esperar(intentos + 1); }, 500);
                };
                esperar(0);
                return;
            }
            
            try {
                switch (currentRole) {
                    case 'AUXILIAR':
                        generarReporteAuxiliar();
                        break;
                    case 'ENFERMERO':
                        generarReporteEnfermero();
                        break;
                    case 'MEDICO':
                        generarReporteMedico();
                        break;
                    case 'FISIOTERAPEUTA':
                        generarReporteEspecialista('Fisioterapeuta');

        function getSignatureData(canvasId) {
            var canvas = document.getElementById(canvasId);
            if (!canvas) return null;
            
            try {
                var ctx = canvas.getContext('2d');
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var data = imageData.data;
                
                var hasDrawing = false;
                for (var i = 0; i < data.length; i += 4) {
                    if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) {
                        hasDrawing = true;
                        break;
                    }
                }
                
                if (!hasDrawing) return null;
                
                return canvas.toDataURL('image/png');
            } catch (e) {
                console.warn('Error capturando firma:', canvasId, e);
                return null;
            }
        }

        function iniciarDictado(targetId) {
            if (!('webkitSpeechRecognition' in window)) {
                showToast('Voz no soportada en este navegador', 'error');
                return;
            }
            
            if (recognitionActive) {
                showToast('Ya hay una grabación en curso', 'warning');
                return;
            }
            
            var recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = function() {
                recognitionActive = true;
                showToast('🎙️ Habla ahora...', 'success');
            };
            
            recognition.onend = function() {
                recognitionActive = false;
                showToast('✅ Grabación finalizada', 'success');
            };
            
            recognition.onresult = function(event) {
                var target = document.getElementById(targetId);
                if (!target) {
                    showToast('❌ No se encontró el campo de texto', 'error');
                    return;
                }
                
                var result = event.results[0];
                if (result && result.isFinal) {
                    var texto = result[0].transcript.trim();
                    if (texto) {
                        target.value += (target.value ? ' ' : '') + texto;
                        showToast('✅ Dictado completado', 'success');
                    }
                }
            };
            
            recognition.onerror = function(event) {
                recognitionActive = false;
                if (event.error === 'not-allowed') {
                    showToast('Permiso de micrófono denegado', 'error');
                } else if (event.error === 'no-speech') {
                    showToast('No se detectó voz', 'error');
                } else {
                    showToast('Error: ' + event.error, 'error');
                }
            };
            
            recognition.start();
        }

        function asignarEducacion(temaId, pacienteId, profesionalId) {
            var asignadas = loadEducacionAsignada();
            var tema = educationTopics.find(function(t) { return t.id === temaId; });
            var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
            var paciente = pacientes.find(function(p) { return p.id === pacienteId; });
            var usuarios = JSON.parse(localStorage.getItem('vital_usuarios') || '[]');
            var profesional = usuarios.find(function(u) { return u.id === profesionalId; });
            
            if (!tema || !paciente || !profesional) {
                showToast('❌ Datos incompletos para asignar', 'error');
                return false;
            }
            
            asignadas.push({
                id: 'ea' + Date.now(),
                tema_id: temaId,
                tema_titulo: tema.title,
                tema_descripcion: tema.description,
                paciente_id: pacienteId,
                paciente_nombre: paciente.name,
                profesional_id: profesionalId,
                profesional_nombre: profesional.name,
                asignado_por: currentUser ? currentUser.id : 'admin',
                asignado_por_nombre: currentUser ? currentUser.name : 'Administrador',
                fecha_asignacion: new Date().toISOString(),
                estado: 'PENDIENTE',
                fecha_completado: null,
                evidencia: null,
                evidencia_foto: null
            });
            
            saveEducacionAsignada(asignadas);
            showToast('✅ Educación asignada correctamente', 'success');
            return true;
        }

        function completarEducacion(id, evidencia, foto) {
            var asignadas = loadEducacionAsignada();
            var index = asignadas.findIndex(function(a) { return a.id === id; });
            if (index === -1) {
                showToast('❌ Educación no encontrada', 'error');
                return false;
            }
            
            asignadas[index].estado = 'COMPLETADO';
            asignadas[index].fecha_completado = new Date().toISOString();
            asignadas[index].evidencia = evidencia || 'Sin evidencia';
            asignadas[index].evidencia_foto = foto || null;
            
            saveEducacionAsignada(asignadas);
            showToast('✅ Educación completada', 'success');
            return true;
        }

        async function login() {
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            var errorDiv = document.getElementById('loginError');
            
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            if (!email || !password) {
                errorDiv.textContent = '⚠️ Email y contraseña son requeridos';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                showToast('🔄 Verificando credenciales...', 'success');
                
                var response = await fetch(API_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                var data = await response.json();
                
                if (!data.success) {
                    errorDiv.textContent = '❌ ' + (data.message || 'Credenciales inválidas');
                    errorDiv.style.display = 'block';
                    showToast('❌ Credenciales inválidas', 'error');
                    return;
                }
                
                var user = data.data.user;
                var token = data.data.token;
                
                localStorage.setItem('vital_token', token);
                localStorage.setItem('vital_user', JSON.stringify(user));
                
                currentUser = user;
                currentRole = user.role;
                storageKey = 'vital_' + user.role.toLowerCase();
                
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userRoleDisplay').textContent = user.role;
                
                buildTabs();
                showToast('✅ Bienvenido ' + user.name, 'success');
                
            } catch (error) {
                console.error('Error en login:', error);
                errorDiv.textContent = '❌ Error de conexión con el servidor';
                errorDiv.style.display = 'block';
                showToast('❌ Error de conexión', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('vital_token');
            localStorage.removeItem('vital_user');
            
            currentUser = null;
            currentRole = null;
            storageKey = null;
            
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
            
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginEmail').value = '';
            
            showToast('👋 Sesión cerrada', 'success');
        }

        function checkSession() {
            var token = localStorage.getItem('vital_token');
            var userData = localStorage.getItem('vital_user');
            
            if (token && userData) {
                try {
                    var user = JSON.parse(userData);
                    
                    currentUser = user;
                    currentRole = user.role;
                    storageKey = 'vital_' + user.role.toLowerCase();
                    
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainScreen').classList.remove('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userRoleDisplay').textContent = user.role;
                    
                    buildTabs();
                    showToast('✅ Bienvenido ' + user.name, 'success');
                    return true;
                    
                } catch (e) {
                    console.warn('Sesión inválida');
                    localStorage.removeItem('vital_token');
                    localStorage.removeItem('vital_user');
                }
            }
            return false;
        }

        // ============================================================
        //  FUNCIONES DE EDUCACIÓN Y TEMAS
        // ============================================================
        async function loadEducationTopics() {
            try {
                var token = localStorage.getItem('vital_token');
                var headers = {};
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                
                var res = await fetch(API_URL + '/api/education', { headers: headers });
                var data = await res.json();
                if (data.success && data.data) {
                    educationTopics = data.data;
                    localStorage.setItem('vital_education_topics', JSON.stringify(educationTopics));
                }
            } catch (e) {
                var saved = localStorage.getItem('vital_education_topics');
                if (saved) educationTopics = JSON.parse(saved);
            }
            
            var select = document.getElementById('educacionTipo');
            if (select) {
                select.innerHTML = getEducationTopicsForSelect();
            }
            
            var selectAsignar = document.getElementById('asignarTemaSelect');
            if (selectAsignar) {
                selectAsignar.innerHTML = getEducationTopicsForSelect();
            }
        }

        function getEducationTopicsForSelect() {
            if (educationTopics.length === 0) {
                return '<option value="">-- Sin temas disponibles --</option>';
            }
            return educationTopics.map(function(t) {
                return '<option value="' + t.id + '">' + t.title + '</option>';
            }).join('');
        }

        // ============================================================
        //  INICIALIZACIÓN FINAL
        // ============================================================
        console.log('✅ Vital Hogar Pro IPS - Sistema Cargado Correctamente');
        console.log('📋 Usuarios disponibles:', JSON.parse(localStorage.getItem('vital_usuarios') || '[]').length);
        console.log('🏥 Pacientes registrados:', JSON.parse(localStorage.getItem('vital_pacientes') || '[]').length);
        console.log('🔐 API URL:', API_URL);
        
        // Verificar jsPDF al inicio
        setTimeout(function() {
            if (typeof jsPDF === 'undefined') {
                console.warn('⚠️ jsPDF no está disponible, intentando cargar...');
                verificarJSPDF();
            } else {
                console.log('✅ jsPDF está disponible');
            }
        }, 1000);
    </script>
