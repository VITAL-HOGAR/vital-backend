<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>Vital Hogar Pro IPS - Domiciliaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #logoPreview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #1e293b;
        }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header h1 {
            font-size: 1rem;
            color: #22c55e;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.6rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            flex-wrap: wrap;
        }
        .role-badge {
            background: #22c55e20;
            color: #22c55e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
        }
        .logout-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #22c55e;
            margin-bottom: 12px;
            border-left: 3px solid #22c55e;
            padding-left: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 12px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #0f172a !important;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white !important;
            font-size: 0.9rem;
        }
        .form-group select option {
            background: #1e293b;
            color: white;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            z-index: 10;
        }
        .password-toggle:hover {
            color: #22c55e;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .btn-primary {
            background: #22c55e;
            color: white;
            width: 100%;
        }
        .btn-secondary {
            background: #334155;
            color: white;
        }
        .btn-warning {
            background: #f97316;
            color: white;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-voice {
            background: #8b5cf6;
            color: white;
            padding: 6px 12px;
            font-size: 0.75rem;
            width: auto;
            margin-top: 4px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
            width: auto;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab {
            padding: 8px 14px;
            background: #1e293b;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab:hover {
            background: #334155;
        }
        .tab.active {
            background: #22c55e;
            color: white;
        }
        .hidden {
            display: none !important;
        }
        .activity-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            border-left: 3px solid #22c55e;
            font-size: 0.85rem;
        }
        .photo-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .photo-preview img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #334155;
        }
        .signature-canvas {
            background: white;
            border-radius: 10px;
            width: 100%;
            height: 120px;
            border: 2px solid #22c55e;
            touch-action: none;
            cursor: crosshair;
        }
        .sbar-card {
            background: #0f172a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #8b5cf6;
        }
        .sbar-field {
            margin-bottom: 8px;
        }
        .sbar-field label {
            font-size: 0.7rem;
            color: #8b5cf6;
            font-weight: 600;
        }
        .tip-box {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid #f97316;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border-radius: 30px;
            padding: 10px 20px;
            display: none;
            z-index: 1000;
            font-size: 0.8rem;
            max-width: 90%;
            text-align: center;
            border: 1px solid #334155;
        }
        .toast.show {
            display: block;
        }
        .toast.success {
            border-left: 4px solid #22c55e;
        }
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        .toast.warning {
            border-left: 4px solid #f97316;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            color: #94a3b8;
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        .education-topic {
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border-left: 3px solid #8b5cf6;
        }
        .education-topic strong {
            color: #8b5cf6;
        }
        .alert-box {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .alert-critical {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .alert-warning {
            background: #f9731620;
            border: 1px solid #f97316;
            color: #f97316;
        }
        .alert-success {
            background: #22c55e20;
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .login-error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: none;
        }
        .login-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #64748b;
        }
        .imc-display {
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #22c55e;
            font-weight: 600;
            text-align: center;
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .header { padding: 10px 12px; flex-direction: column; text-align: center; }
            .logo-area { justify-content: center; }
            .user-info { justify-content: center; width: 100%; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 8px; }
            .tab { font-size: 0.7rem; padding: 6px 12px; }
            .card { padding: 12px; }
            .card-title { font-size: 0.9rem; }
            .signature-canvas { height: 100px; }
            .btn { font-size: 0.85rem; padding: 10px 14px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo-area">
            <img id="logoPreview" src="" style="display:block; background:#1e293b; border:1px solid #334155;" onerror="this.style.display='none'; document.getElementById('logoPlaceholder').style.display='flex';">
            <div id="logoPlaceholder" class="logo-placeholder" style="display:none;">🏥</div>
            <div>
                <h1>VITAL HOGAR PRO IPS</h1>
                <div class="subtitle">Cuidados Domiciliarios</div>
            </div>
        </div>
        <div id="userInfo" class="user-info hidden">
            <span id="userName"></span>
            <span id="userRoleDisplay" class="role-badge"></span>
            <button class="logout-btn" onclick="logout()">Salir</button>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="card">
            <div class="card-title">🔐 Acceso al Sistema</div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="loginEmail" placeholder="admin@vitalhogar.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>🔒 Contraseña</label>
                <div style="position: relative;">
                    <input type="password" id="loginPassword" placeholder="Ingrese su contraseña" autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword" title="Mostrar/Ocultar contraseña">👁️</button>
                </div>
            </div>
            <div id="loginError" class="login-error"></div>
            <button class="btn btn-primary" onclick="login()">Ingresar</button>
            <div class="login-hint">
                Primer acceso: <strong>admin@vitalhogar.com</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div id="mainScreen" class="hidden">
        <div id="tabsContainer" class="tabs"></div>
        <div id="dynamicContent"></div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <script>
        // ============================================================
        //  CONFIGURACIÓN Y VARIABLES GLOBALES
        // ============================================================
        const API_URL = 'https://vital-backend-1-y4kt.onrender.com';
        let currentUser = null;
        let currentRole = null;
        let storageKey = null;
        let capturedPhotos = [];
        let educationTopics = [];
        let recognitionActive = false;
        let signatureInitialized = false;
        let horaEntrada = null;

        // Logo base64 CORRECTO
        const DEFAULT_LOGO = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#22c55e"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="white">🏥</text></svg>');

        // ============================================================
        //  INICIALIZACIÓN
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            cargarLogo();
            initPasswordToggle();
            loadMasterData();
            loadEducationTopics();
            
            // Verificar si hay sesión activa
            if (!checkSession()) {
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        });

        function cargarLogo() {
            const savedLogo = localStorage.getItem('vital_logo');
            const img = document.getElementById('logoPreview');
            const placeholder = document.getElementById('logoPlaceholder');
            
            if (savedLogo) {
                img.src = savedLogo;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                img.src = DEFAULT_LOGO;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            }
            
            // Si la imagen falla, mostrar placeholder
            img.onerror = function() {
                img.style.display = 'none';
                placeholder.style.display = 'flex';
            };
        }

        // ============================================================
        //  TOGGLE PASSWORD
        // ============================================================
        function initPasswordToggle() {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('loginPassword');
            
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
                });
            }
        }

        // ============================================================
        //  TOAST NOTIFICATIONS
        // ============================================================
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        //  DICTADO POR VOZ
        // ============================================================
        function iniciarDictado(targetId) {
            if (!('webkitSpeechRecognition' in window)) {
                showToast('Voz no soportada en este navegador', 'error');
                return;
            }
            if (recognitionActive) {
                showToast('Ya hay una grabación en curso', 'warning');
                return;
            }
            
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                recognitionActive = true;
                showToast('🎙️ Habla ahora...', 'success');
            };

            recognition.onend = function() {
                recognitionActive = false;
                showToast('✅ Grabación finalizada', 'success');
            };

            recognition.onresult = function(event) {
                const target = document.getElementById(targetId);
                if (!target) {
                    console.warn('⚠️ Textarea con id "' + targetId + '" no encontrado');
                    showToast('❌ No se encontró el campo de texto', 'error');
                    return;
                }
                const result = event.results[0];
                if (result && result.isFinal) {
                    const texto = result[0].transcript.trim();
                    if (texto) {
                        target.value += (target.value ? ' ' : '') + texto;
                        showToast('✅ Dictado completado', 'success');
                    }
                }
            };

            recognition.onerror = function(event) {
                recognitionActive = false;
                if (event.error === 'not-allowed') showToast('Permiso de micrófono denegado', 'error');
                else if (event.error === 'no-speech') showToast('No se detectó voz', 'error');
                else showToast('Error: ' + event.error, 'error');
            };

            recognition.start();
        }

        // ============================================================
        //  API REQUEST CON TOKEN
        // ============================================================
        async function apiRequest(endpoint, options = {}) {
            const token = localStorage.getItem('vital_token');
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'Authorization': `Bearer ${token}` }),
                ...options.headers
            };

            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers
            });

            if (response.status === 401) {
                showToast('⏰ Sesión expirada, inicie sesión nuevamente', 'error');
                logout();
                throw new Error('Sesión expirada');
            }

            return response;
        }

        // ============================================================
        //  LOGIN
        // ============================================================
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            if (!email || !password) {
                errorDiv.textContent = '⚠️ Email y contraseña son requeridos';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                showToast('🔄 Verificando credenciales...', 'success');

                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!data.success) {
                    errorDiv.textContent = '❌ ' + (data.message || 'Credenciales inválidas');
                    errorDiv.style.display = 'block';
                    showToast('❌ Credenciales inválidas', 'error');
                    return;
                }

                const user = data.data.user;
                const token = data.data.token;

                localStorage.setItem('vital_token', token);
                localStorage.setItem('vital_user', JSON.stringify(user));

                currentUser = user;
                currentRole = user.role;
                storageKey = `vital_${user.role.toLowerCase()}`;

                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userRoleDisplay').textContent = user.role;

                buildTabs();
                showToast(`✅ Bienvenido ${user.name}`, 'success');

            } catch (error) {
                console.error('Error en login:', error);
                errorDiv.textContent = '❌ Error de conexión con el servidor';
                errorDiv.style.display = 'block';
                showToast('❌ Error de conexión', 'error');
            }
        }

        // ============================================================
        //  LOGOUT
        // ============================================================
        function logout() {
            localStorage.removeItem('vital_token');
            localStorage.removeItem('vital_user');
            currentUser = null;
            currentRole = null;
            storageKey = null;
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginEmail').value = '';
            showToast('👋 Sesión cerrada', 'success');
        }

        // ============================================================
        //  VERIFICAR SESIÓN
        // ============================================================
        function checkSession() {
            const token = localStorage.getItem('vital_token');
            const userData = localStorage.getItem('vital_user');

            if (token && userData) {
                try {
                    const user = JSON.parse(userData);
                    currentUser = user;
                    currentRole = user.role;
                    storageKey = `vital_${user.role.toLowerCase()}`;

                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainScreen').classList.remove('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userRoleDisplay').textContent = user.role;

                    buildTabs();
                    showToast(`✅ Bienvenido ${user.name}`, 'success');
                    return true;
                } catch (e) {
                    console.warn('Sesión inválida');
                    localStorage.removeItem('vital_token');
                    localStorage.removeItem('vital_user');
                }
            }
            return false;
        }

        // ============================================================
        //  CARGA DE DATOS MAESTROS
        // ============================================================
        async function loadMasterData() {
            try {
                const token = localStorage.getItem('vital_token');
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const res = await fetch(`${API_URL}/api/users`, { headers });
                const data = await res.json();
                if (data.success && data.data) {
                    localStorage.setItem('vital_usuarios', JSON.stringify(data.data));
                }
            } catch (e) {
                console.warn('API no disponible, usando datos locales');
            }

            try {
                const token = localStorage.getItem('vital_token');
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                const res = await fetch(`${API_URL}/api/patients`, { headers });
                const data = await res.json();
                if (data.success && data.data) {
                    localStorage.setItem('vital_pacientes', JSON.stringify(data.data));
                }
            } catch (e) {
                console.warn('API pacientes no disponible');
            }
        }

        // ============================================================
        //  FUNCIONES DE ALMACENAMIENTO LOCAL
        // ============================================================
        function saveToLocal(key, data) {
            if (!storageKey) {
                showToast('Error: No hay sesión activa', 'error');
                return;
            }
            
            const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
            all[key] = all[key] || [];
            all[key].push({
                ...data,
                timestamp: new Date().toISOString(),
                user: currentUser?.name || 'Anónimo'
            });
            localStorage.setItem(storageKey, JSON.stringify(all));
            showToast(`✅ ${key} guardado`, 'success');
        }

        function getFromLocal(key) {
            if (!storageKey) return [];
            const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
            return all[key] || [];
        }

        function cargarLista(key, elementId) {
            const items = getFromLocal(key);
            const div = document.getElementById(elementId);
            if (!div) return;
            
            if (items.length === 0) {
                div.innerHTML = '<p style="color:#64748b; font-size:0.85rem;">No hay registros</p>';
            } else {
                div.innerHTML = items.slice(-10).reverse().map(i => {
                    const timestamp = i.timestamp ? new Date(i.timestamp).toLocaleString() : 'Fecha no disponible';
                    const contenido = i.resumen || i.actividad || i.nombre || JSON.stringify(i);
                    return `<div class="activity-item"><strong>${timestamp}</strong><br>${contenido}</div>`;
                }).join('');
            }
        }

        // ============================================================
        //  TEMAS DE EDUCACIÓN
        // ============================================================
        async function loadEducationTopics() {
            try {
                const token = localStorage.getItem('vital_token');
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                const res = await fetch(`${API_URL}/api/education`, { headers });
                const data = await res.json();
                if (data.success && data.data) {
                    educationTopics = data.data;
                    localStorage.setItem('vital_education_topics', JSON.stringify(educationTopics));

            if (select) {

        // ============================================================
        //  FIRMAS DIGITALES (CORREGIDO)
        // ============================================================
        function initSignatures() {
            console.log('🖊️ Inicializando firmas...');
            
            const canvasIds = ['sigRecibo', 'sigEntrega', 'sigRecibe', 'sigProfesional', 'sigPaciente', 'sigFamiliar'];
            
            canvasIds.forEach(id => {
                const canvas = document.getElementById(id);
                if (!canvas) {
                    console.warn(`⚠️ Canvas ${id} no encontrado`);
                    return;
                }
                
                console.log(`✅ Canvas ${id} encontrado, inicializando...`);
                
                canvas.width = canvas.offsetWidth || 300;
                canvas.height = canvas.offsetHeight || 120;
                
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#94a3b8';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
                
                let drawing = false;
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                
                const startDraw = (e) => {
                    drawing = true;
                    ctx.beginPath();
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                    ctx.moveTo(x, y);
                    console.log('🖊️ Dibujando en', id);
                };
                
                const draw = (e) => {
                    if (!drawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                };
                
                const endDraw = () => { 
                    drawing = false; 
                };
                
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
                canvas.addEventListener('touchend', endDraw);
            });
            
            signatureInitialized = true;
            console.log('✅ Firmas inicializadas correctamente');
        }

        window.clearCanvas = function(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
        };

        // ============================================================
        window.calcularIMC = function() {
            const peso = parseFloat(document.getElementById('pesoNutri')?.value);
            const talla = parseFloat(document.getElementById('tallaNutri')?.value);
            const imcDisplay = document.getElementById('imcDisplay');
            
            if (peso && talla && talla > 0) {
                const imc = peso / (talla * talla);
                imcDisplay.textContent = 'IMC: ' + imc.toFixed(1) + ' kg/m²';
                
                // Clasificación
                let clasificacion = '';
                let color = '';
                if (imc < 18.5) { clasificacion = 'Bajo peso'; color = '#f97316'; }
                else if (imc < 25) { clasificacion = 'Normal'; color = '#22c55e'; }
                else if (imc < 30) { clasificacion = 'Sobrepeso'; color = '#f97316'; }
                else { clasificacion = 'Obesidad'; color = '#ef4444'; }
                
                imcDisplay.textContent += ' - ' + clasificacion;
                imcDisplay.style.color = color;
            } else {
                imcDisplay.textContent = 'IMC: --';
                imcDisplay.style.color = '#94a3b8';
            }
        };

        window.guardarSignos = function() {
            const hora = document.getElementById('horaSignos').value;
            if (!hora) {
                showToast('Ingrese la hora', 'error');
                return;
            }

            const spo2 = parseInt(document.getElementById('spo2').value);
            const braden = parseInt(document.getElementById('braden').value);
            const temp = parseFloat(document.getElementById('temp').value);
            const glucosa = parseInt(document.getElementById('glucosa').value);

            let alertas = [];
            let tipoAlerta = 'success';

            if (spo2 < 88) {
                alertas.push('🚨 CRÍTICO: SpO2 muy baja (<88%)');
                tipoAlerta = 'critical';
            } else if (spo2 < 92) {
                alertas.push('⚠️ ADVERTENCIA: SpO2 límite bajo (<92%)');
                tipoAlerta = 'warning';
            }

            if (temp > 38.5) {
                alertas.push('🌡️ FIEBRE: Temperatura >38.5°C');
                tipoAlerta = 'warning';
            }

            if (glucosa > 180) {
                alertas.push('⚠️ HIPERGLUCEMIA: Glucosa >180 mg/dL');
                tipoAlerta = 'warning';

        // ============================================================
        //  GENERAR PDF (CORREGIDO - CON FIRMAS)
        // ============================================================
        window.generarReportePDF = async function() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let y = 25;
                const marginY = 270;

                function checkPage() {
                    if (y > marginY) {
                        doc.addPage();
                        y = 20;
                    }
                }

                function cleanText(text) {
                    if (!text) return '';
                    return String(text).trim();
                }

                function obtenerFirmaCanvas(id) {
                    const canvas = document.getElementById(id);
                    if (!canvas) {
                        console.warn('⚠️ Canvas no encontrado:', id);
                        return null;
                    }
                    try {
                        // Verificar si el canvas tiene datos (no está vacío)
                        const ctx = canvas.getContext('2d');
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        // Verificar si hay algo dibujado (no solo blanco)
                        let hasDrawing = false;
                        for (let i = 0; i < data.length; i += 4) {
                            if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) {
                                hasDrawing = true;
                                break;
                            }
                        }
                        
                        if (!hasDrawing) {
                            console.warn('⚠️ Canvas ' + id + ' está vacío (solo blanco)');
                            return null;
                        }
                        
                        const dataUrl = canvas.toDataURL('image/png');
                        console.log('✅ Firma capturada:', id);
                        return dataUrl;
                    } catch (e) {
                        console.warn('Error capturando firma:', e);
                    }
                    return null;
                }

                // Logo
                const logoImg = document.getElementById('logoPreview').src;
                if (logoImg && logoImg !== '') {
                    try {
                        doc.addImage(logoImg, 'PNG', 20, 10, 30, 30);
                    } catch (e) {}
                }

                doc.setFont('helvetica');
                doc.setFontSize(16);
                doc.text('VITAL HOGAR PRO IPS', 60, 25);
                y = 45;
                doc.setFontSize(10);
                doc.text('Reporte Completo del Turno', 60, y);
                y += 10;
                doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, y);
                y += 8;
                doc.text(`Profesional: ${cleanText(currentUser?.name)} (${cleanText(currentUser?.roleName || currentUser?.role)})`, 20, y);
                y += 8;
                doc.text(`Paciente: ${cleanText(document.getElementById('reportePaciente')?.value) || 'Maria Gonzalez'}`, 20, y);
                y += 15;

                // ACTIVIDADES
                const actividades = getFromLocal('actividades');
                if (actividades.length > 0) {
                    checkPage();
                    doc.text('ACTIVIDADES REALIZADAS:', 20, y);
                    y += 8;
                    actividades.slice(-10).forEach((d, i) => {
                        checkPage();
                        const actividad = cleanText(d.actividad || 'Actividad');
                        const hora = cleanText(d.hora || 'Sin hora');
                        const observacion = cleanText(d.observacion || '');
                        const educacion = cleanText(d.educacion || '');
                        const novedad = cleanText(d.novedad || '');

                        doc.text(`${i+1}. ${actividad} - ${hora}`, 25, y);
                        y += 6;
                        if (observacion) {
                            doc.text(`   Obs: ${observacion.substring(0, 60)}`, 30, y);
                            y += 6;
                        }
                        if (educacion) {
                            doc.text(`   Educ: ${educacion.substring(0, 50)}`, 30, y);
                            y += 6;
                        }
                        if (novedad) {
                            doc.text(`   Nov: ${novedad.substring(0, 50)}`, 30, y);
                            y += 6;
                        }
                        if (d.fotos) {
                            doc.text(`   Fotos: ${d.fotos}`, 30, y);
                            y += 6;
                        }
                        y += 4;
                    });
                    y += 10;
                }

                // SIGNOS
                const signos = getFromLocal('signos');
                if (signos.length > 0) {
                    checkPage();
                    doc.text('SIGNOS VITALES:', 20, y);
                    y += 8;
                    signos.slice(-10).forEach((d, i) => {
                        checkPage();
                        doc.text(
                            `${i+1}. SpO2:${cleanText(d.spo2) || '-'}% | FC:${cleanText(d.fc) || '-'} | FR:${cleanText(d.fr) || '-'} | Temp:${cleanText(d.temp) || '-'}°C | TA:${cleanText(d.bp) || '-'}`,
                            25, y);
                        y += 6;
                        if (d.glucosa) {
                            doc.text(`   Glucosa: ${cleanText(d.glucosa)} mg/dL`, 30, y);
                            y += 6;
                        }
                        if (d.braden) {
                            doc.text(`   Braden: ${cleanText(d.braden)}`, 30, y);
                            y += 6;
                        }
                        if (d.alertas && d.alertas.length > 0) {
                            doc.text(`   Alertas: ${d.alertas.join('; ')}`, 30, y);
                            y += 6;
                        }
                        y += 4;
                    });
                    y += 10;
                }

                // MEDICAMENTOS
                const medicamentos = getFromLocal('medicamentos');
                if (medicamentos.length > 0) {
                    checkPage();
                    doc.text('MEDICAMENTOS ADMINISTRADOS:', 20, y);
                    y += 8;
                    medicamentos.slice(-10).forEach((d, i) => {
                        checkPage();
                        const nombre = cleanText(d.nombre || 'Medicamento');
                        doc.text(`${i+1}. ${nombre} - ${cleanText(d.dosis) || 'Sin dosis'} - ${cleanText(d.hora) || 'Sin hora'}`,
                            25, y);
                        y += 6;
                        if (d.obs) {
                            doc.text(`   Obs: ${cleanText(d.obs).substring(0, 50)}`, 30, y);
                            y += 6;
                        }
                        y += 4;
                    });
                    y += 10;
                }

                // ENTREGA
                const entregas = getFromLocal('entregas');
                if (entregas.length > 0) {
                    checkPage();
                    doc.text('ENTREGA DE TURNO:', 20, y);
                    y += 8;
                    const ultima = entregas[entregas.length - 1];
                    if (ultima) {
                        doc.text(`Hora: ${cleanText(ultima.horaEntrega) || 'No registrada'}`, 25, y);
                        y += 6;
                        doc.text(`Resumen: ${cleanText(ultima.resumen).substring(0, 80) || 'Sin resumen'}`, 25, y);
                        y += 6;
                        if (ultima.pendientes) {
                            doc.text(`Pendientes: ${cleanText(ultima.pendientes).substring(0, 80)}`, 25, y);
                            y += 6;
                        }
                        if (ultima.sbar) {
                            const s = ultima.sbar;
                            y += 4;
                            doc.text('SBAR:', 25, y);
                            y += 6;
                            if (s.situacion) { doc.text(`S - ${cleanText(s.situacion).substring(0, 40)}`, 30, y);
                                y += 6; }
                            if (s.antecedentes) { doc.text(`A - ${cleanText(s.antecedentes).substring(0, 40)}`, 30, y);
                                y += 6; }
                            if (s.evaluacion) { doc.text(`B - ${cleanText(s.evaluacion).substring(0, 40)}`, 30, y);
                                y += 6; }
                            if (s.recomendacion) { doc.text(`R - ${cleanText(s.recomendacion).substring(0, 40)}`, 30, y);
                                y += 6; }
                        }
                        y += 10;
                    }
                }

                // FIRMAS - CORREGIDO
                y += 10;
                checkPage();
                doc.setFontSize(12);
                doc.text('FIRMAS:', 20, y);
                y += 12;
                doc.setFontSize(10);

                // IDs de canvas que pueden tener firma
                const canvasIds = ['sigEntrega', 'sigRecibe', 'sigRecibo', 'sigProfesional', 'sigPaciente', 'sigFamiliar'];
                const nombresFirmas = {
                    'sigEntrega': 'Firma del Profesional (Entrega)',
                    'sigRecibe': 'Firma del Acudiente/Familiar (Recibe)',
                    'sigRecibo': 'Firma de Recibo',
                    'sigProfesional': 'Firma del Profesional (Evaluación)',
                    'sigPaciente': 'Firma del Paciente',
                    'sigFamiliar': 'Firma del Familiar'
                };

                let firmaEncontrada = false;
                for (const id of canvasIds) {
                    const canvas = document.getElementById(id);
                    if (!canvas) continue;
                    
                    // Verificar si hay algo dibujado en el canvas
                    const ctx = canvas.getContext('2d');
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    let hasDrawing = false;
                    for (let i = 0; i < data.length; i += 4) {
                        if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) {
                            hasDrawing = true;
                            break;
                        }
                    }
                    
                    if (hasDrawing) {
                        try {
                            const firmaData = canvas.toDataURL('image/png');
                            if (firmaData && firmaData !== 'data:image/png;base64,') {
                                firmaEncontrada = true;
                                doc.text(`${nombresFirmas[id] || id}:`, 20, y);
                                try {
                                    doc.addImage(firmaData, 'PNG', 100, y - 5, 60, 25);
                                } catch (e) {
                                    doc.text('___________________', 100, y + 5);
                                }
                                y += 30;
                                if (y > marginY) {
                                    doc.addPage();
                                    y = 20;
                                }
                            }
                        } catch (e) {
                            console.warn('Error al capturar firma:', id, e);
                        }
                    }
                }

                if (!firmaEncontrada) {
                    doc.text('No se registraron firmas en este turno', 20, y);
                    y += 10;
                }

                doc.save(`reporte_completo_${Date.now()}.pdf`);
                showToast('📄 Reporte completo generado con firmas', 'success');
            } catch (error) {
                console.error('Error generando PDF:', error);
                showToast('Error al generar el PDF', 'error');
            }
        };

        window.crearUsuario = async function() {
            const name = document.getElementById('newUserName').value.trim();
            const email = document.getElementById('newUserEmail').value.trim();
            const role = document.getElementById('newUserRole').value;
            const password = document.getElementById('newUserPass').value;

            if (!name || !email || !password) {
                showToast('Complete todos los campos', 'error');
                return;
            }

            try {
                const response = await apiRequest('/api/users', {
                    method: 'POST',
                    body: JSON.stringify({ name, email, role, password })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('newUserName').value = '';
                    document.getElementById('newUserEmail').value = '';
                    document.getElementById('newUserPass').value = '';
                    renderUsuarios();
                    loadMasterData();
                    showToast('✅ Usuario creado exitosamente', 'success');
                } else {
                    showToast('❌ ' + (data.message || 'Error al crear usuario'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Error al crear usuario', 'error');
            }
        };

        window.eliminarUsuario = async function(id) {

            try {
                const response = await apiRequest(`/api/users/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    renderUsuarios();
                    loadMasterData();
                    showToast('✅ Usuario eliminado', 'success');

                        <strong>✅ Con cobertura</strong><br>
                        <span style="font-size:1.5rem; color:#22c55e;">2</span>
                    </div>
                    <div class="card" style="background:#0f172a; text-align:center;">
                        <strong>⚠️ Sin cobertura</strong><br>
                        <span style="font-size:1.5rem; color:#ef4444;">1</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="showToast('📄 Reporte de cobertura generado')">📊 Ver detalle</button>
            </div>
            <div class="card">
                <div class="card-title">📋 Turnos Programados</div>
                <div id="listaTurnosCoord"></div>
            </div>`;
        }

        window.programarTurno = function() {
            const paciente = document.getElementById('coordPaciente')?.value;
            const profesional = document.getElementById('coordProfesional')?.value;
            const fecha = document.getElementById('coordFecha')?.value;
            const turno = document.getElementById('coordTurno')?.value;
            
            if (!fecha) {
                showToast('Seleccione una fecha', 'error');
                return;
            }
            
            saveToLocal('turnosCoord', {
                paciente,
                profesional,
                fecha,
                turno,
                estado: 'PENDIENTE'
            });
            
            document.getElementById('coordFecha').value = '';
            cargarLista('turnosCoord', 'listaTurnosCoord');
            showToast('✅ Turno programado', 'success');
        };

        // ============================================================
        //  INICIALIZACIÓN FINAL
        // ============================================================
        console.log('✅ Vital Hogar Pro IPS - Sistema Cargado Correctamente');
        console.log('📋 Usuarios disponibles:', JSON.parse(localStorage.getItem('vital_usuarios') || '[]').length);
        console.log('🏥 Pacientes registrados:', JSON.parse(localStorage.getItem('vital_pacientes') || '[]').length);
        console.log('🔐 API URL:', API_URL);
    </script>
</body>
