<script>
const API_URL = 'https://vital-backend-1-y4kt.onrender.com';
let currentUser = null;

let pacienteActual = null;

let recognitionActive = false;

// ==========================================

// ==========================================

  'Pereira': { altitud: 1410, spo2_min: 92, spo2_max: 98, spo2_alerta: 89, spo2_critico: 85 },
  'Manizales': { altitud: 2160, spo2_min: 90, spo2_max: 96, spo2_alerta: 87, spo2_critico: 83 },
  'Pasto': { altitud: 2527, spo2_min: 88, spo2_max: 94, spo2_alerta: 85, spo2_critico: 80 },

  'Villavicencio': { altitud: 440, spo2_min: 95, spo2_max: 100, spo2_alerta: 92, spo2_critico: 88 },
  'Armenia': { altitud: 1500, spo2_min: 92, spo2_max: 98, spo2_alerta: 89, spo2_critico: 85 },
  'Neiva': { altitud: 442, spo2_min: 95, spo2_max: 100, spo2_alerta: 92, spo2_critico: 88 },
  'Popayán': { altitud: 1760, spo2_min: 91, spo2_max: 97, spo2_alerta: 88, spo2_critico: 84 },
  'Tunja': { altitud: 2820, spo2_min: 87, spo2_max: 93, spo2_alerta: 84, spo2_critico: 79 },
  'Santa Marta': { altitud: 5, spo2_min: 95, spo2_max: 100, spo2_alerta: 92, spo2_critico: 88 },
  'Montería': { altitud: 18, spo2_min: 95, spo2_max: 100, spo2_alerta: 92, spo2_critico: 88 },
  'Sincelejo': { altitud: 220, spo2_min: 95, spo2_max: 100, spo2_alerta: 92, spo2_critico: 88 },
  'Valledupar': { altitud: 168, spo2_min: 95, spo2_max: 100, spo2_alerta: 92, spo2_critico: 88 },
  'Ipiales': { altitud: 2980, spo2_min: 85, spo2_max: 92, spo2_alerta: 82, spo2_critico: 77 }
};

const ROLES_CON_RETHUS = ['AUXILIAR','ENFERMERO','MEDICO','FISIOTERAPEUTA','PSICOLOGO','NUTRICIONISTA','FONOAUDIOLOGO','TERAPEUTA_OCUPACIONAL','TERAPEUTA_RESPIRATORIO'];
const ACTIVIDADES_CON_FOTO = ['Curación de heridas','Curación LPP','Lesión por presión','Otro'];

// ==========================================
// FUNCIONES UTILITARIAS
// ==========================================
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 3500);
}

function getCurrentTime() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function getCurrentTimeShort() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

function getCurrentDate() {
  return new Date().toISOString().split('T')[0];
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function requiereReTHUS(role) {
  return ROLES_CON_RETHUS.includes(role);
}

function getRangoSpO2(ciudad) {
  return CIUDADES_COLOMBIA[ciudad] || CIUDADES_COLOMBIA['Bogotá'];
}

function requiereFotoActividad(tipo) {
  return ACTIVIDADES_CON_FOTO.some(a => tipo.toLowerCase().includes(a.toLowerCase()));
}

function validarPacienteSeleccionado() {
  if (!pacienteActual) {
    showToast('⚠️ Seleccione un paciente primero', 'warning');
    abrirSelectorPaciente();
    return false;
  }
  return true;
}

// ==========================================
// API REQUEST
// ==========================================
async function apiRequest(endpoint, options = {}) {
  const token = localStorage.getItem('vital_token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  try {
    const response = await fetch(API_URL + endpoint, {
      method: options.method || 'GET',
      headers: headers,
      body: options.body || null
    });
    if (response.status === 401) {
      showToast('Sesión expirada', 'error');
      logout();
      throw new Error('Sesión expirada');
    }
    return response;
  } catch (error) {
    throw error;
  }
}

// ==========================================
// LOGIN / LOGOUT
// ==========================================
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  errorDiv.style.display = 'none';
  if (!email || !password) {
    errorDiv.textContent = 'Email y contraseña son requeridos';
    errorDiv.style.display = 'block';
    return;
  }
  const loginBtn = document.getElementById('loginBtn');
  loginBtn.disabled = true;
  loginBtn.innerHTML = 'Verificando...';
  try {
    const response = await fetch(API_URL + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await response.json();
    if (!data.success) {
      errorDiv.textContent = data.message || 'Credenciales inválidas';
      errorDiv.style.display = 'block';
      showToast('Credenciales inválidas', 'error');
      return;
    }
    const user = data.data.user;
    const token = data.data.token;
    localStorage.setItem('vital_token', token);
    localStorage.setItem('vital_user', JSON.stringify(user));
    currentUser = user;
    currentRole = user.role;
    await cargarDatosIniciales();
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRoleDisplay').textContent = user.role;
    actualizarDisplayPaciente();
    buildTabs();
    iniciarReloj();
    showToast('Bienvenido ' + user.name, 'success');
  } catch (error) {
    errorDiv.textContent = 'Error de conexión con el servidor';
    errorDiv.style.display = 'block';
    showToast('Error de conexión', 'error');
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerHTML = 'Ingresar';
  }
}

function logout() {
  localStorage.removeItem('vital_token');
  localStorage.removeItem('vital_user');
  localStorage.removeItem('vital_paciente_actual');
  currentUser = null;
  currentRole = null;
  pacienteActual = null;
  detenerReloj();
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('userInfo').classList.add('hidden');
  document.getElementById('loginPassword').value = '';
  showToast('Sesión cerrada', 'success');
}

async function cargarDatosIniciales() {
  await Promise.all([cargarPacientes(), cargarUsuarios()]);
  const saved = localStorage.getItem('vital_paciente_actual');
  if (saved) {
    try {
      pacienteActual = JSON.parse(saved);
      const pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
      const existe = pacientes.find(p => p.id === pacienteActual?.id);
      if (!existe) pacienteActual = null;
    } catch (e) {
      pacienteActual = null;
    }
  }
}

// ==========================================
// RELOJ
// ==========================================
function iniciarReloj() {
  if (relojInterval) clearInterval(relojInterval);
  relojInterval = setInterval(() => {
    const relojDiv = document.getElementById('relojTurno');
    if (!relojDiv) return;
    if (horaEntrada) {
      const ahora = new Date();
      const diff = Math.floor((ahora - horaEntrada) / 1000);
      const horas = Math.floor(diff / 3600);
      const minutos = Math.floor((diff % 3600) / 60);
      const segundos = diff % 60;
      relojDiv.innerHTML = `
        <div>🕐 <strong>Entrada:</strong> <span class="hora">${horaEntrada.toLocaleTimeString('es-CO')}</span></div>
        <div>🕐 <strong>Actual:</strong> <span class="hora">${getCurrentTime()}</span></div>
        <div>⏱️ <strong>Duración:</strong> <span class="hora">${horas}h ${minutos}min ${segundos}s</span></div>
      `;
    } else {
      relojDiv.innerHTML = `
        <div>🕐 <strong>Actual:</strong> <span class="hora">${getCurrentTime()}</span></div>
        <div style="color:#94a3b8;font-size:.8rem;">Registre la entrada para iniciar el turno</div>
      `;
    }
  }, 1000);
}

function detenerReloj() {
  if (relojInterval) { clearInterval(relojInterval); relojInterval = null; }
  horaEntrada = null;
}

// ==========================================
// DICTADO DE VOZ
// ==========================================
function iniciarDictado(targetId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('Voz no soportada', 'error'); return; }
  if (recognitionActive) { showToast('Ya hay grabación en curso', 'warning'); return; }
  const recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => { recognitionActive = true; showToast('🎙️ Habla ahora...', 'success'); };
  recognition.onend = () => { recognitionActive = false; };
  recognition.onresult = (event) => {
    const target = document.getElementById(targetId);
    if (!target) return;
    const result = event.results[0];
    if (result?.isFinal) {
      const texto = result[0].transcript.trim();
      if (texto) {
        target.value += (target.value ? ' ' : '') + texto;
        showToast('Dictado completado', 'success');
      }
    }
  };
  recognition.onerror = () => { recognitionActive = false; showToast('Error de reconocimiento', 'error'); };
  try { recognition.start(); } catch(e) { recognitionActive = false; showToast('Error al iniciar dictado', 'error'); }
}

// ==========================================
// DISPLAY PACIENTE
// ==========================================
function actualizarDisplayPaciente() {
  const container = document.getElementById('pacienteContainer');
  if (!container) return;
  const rolesSinPaciente = ['ADMIN', 'COORDINADOR'];
  if (rolesSinPaciente.includes(currentRole)) {
    container.innerHTML = '';
    return;
  }
  if (pacienteActual) {
    container.innerHTML = `
      <span class="paciente-badge">👤 ${pacienteActual.name}</span>
      <button class="btn-select-pac" onclick="abrirSelectorPaciente()">👤 Cambiar</button>
    `;
  } else {
    container.innerHTML = `
      <span class="paciente-badge sin-paciente" onclick="abrirSelectorPaciente()">⚠️ Sin paciente</span>
      <button class="btn-select-pac" onclick="abrirSelectorPaciente()">👤 Seleccionar</button>
    `;
  }
}

function abrirSelectorPaciente() {
  const pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  if (pacientes.length === 0) { showToast('No hay pacientes', 'warning'); return; }

    case 'ADMIN':

        { id: 'educationTopics', name: '📚 Temas' },

      ];
      break;
    default:

  }
  tabsContainer.innerHTML = tabs.map(t => `<div class="tab" data-tab="${t.id}">${t.name}</div>`).join('');

      this.classList.add('active');

    });

    case 'medicamentos': content = getMedicamentosContent(); break;

    case 'usuarios': content = getUsuariosContent(); break;
    case 'pacientes': content = getPacientesContent(); break;
    case 'educationTopics': content = getEducationTopicsContent(); break;
    case 'asignarEducacion': content = getAsignarEducacionContent(); break;

document.addEventListener('change', function(e) {
  if (e.target && e.target.id === 'photoInput') {
    const files = e.target.files;
    const preview = document.getElementById('photoPreview');
    if (files.length > 0 && preview) {
      preview.innerHTML = '';
      const maxFotos = Math.min(files.length, 3);
      for (let i = 0; i < maxFotos; i++) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          const img = document.createElement('img');
          img.src = evt.target.result;
          preview.appendChild(img);
        };
        reader.readAsDataURL(files[i]);
      }
    }
  }
});

function evaluarTA(bp) {
  if (!bp) return null;
  const match = bp.match(/^(\d{2,3})\/(\d{2,3})$/);
  if (!match) return null;
  const sistolica = parseInt(match[1]);
  const diastolica = parseInt(match[2]);
  if (sistolica >= 180 || diastolica >= 120) return { nivel: 'critical', mensaje: '🚨 CRISIS HIPERTENSIVA', accion: 'Atención médica inmediata' };
  if (sistolica >= 140 || diastolica >= 90) return { nivel: 'warning', mensaje: '⚠️ HIPERTENSIÓN', accion: 'Monitorear y notificar médico' };
  if (sistolica < 90 || diastolica < 60) return { nivel: 'warning', mensaje: '⚠️ HIPOTENSIÓN', accion: 'Evaluar síntomas' };
  if (sistolica >= 120 && sistolica <= 129 && diastolica < 80) return { nivel: 'info', mensaje: '📊 TA ELEVADA', accion: 'Medidas higiénico-dietéticas' };
  return { nivel: 'success', mensaje: '✅ TA NORMAL', accion: 'Continuar monitoreo' };
}

function evaluarSignosUI() {
  const spo2 = parseInt(document.getElementById('spo2')?.value) || 0;
  const fc = parseInt(document.getElementById('fc')?.value) || 0;
  const fr = parseInt(document.getElementById('fr')?.value) || 0;
  const temp = parseFloat(document.getElementById('temp')?.value) || 0;
  const glucosa = parseInt(document.getElementById('glucosa')?.value) || 0;
  const bp = document.getElementById('bp')?.value || '';
  const ciudad = pacienteActual?.ciudad || 'Bogotá';
  const rango = getRangoSpO2(ciudad);
  const alertas = [];
  let nivel = 'success';
  if (spo2 > 0) {
    if (spo2 < rango.spo2_critico) { alertas.push(`🚨 SpO2 CRÍTICA: ${spo2}% (${ciudad})`); nivel = 'critical'; }
    else if (spo2 < rango.spo2_alerta) { alertas.push(`⚠️ SpO2 baja: ${spo2}%`); if (nivel !== 'critical') nivel = 'warning'; }
    else if (spo2 >= rango.spo2_min && spo2 <= rango.spo2_max) alertas.push(`✅ SpO2 normal: ${spo2}%`);
    else alertas.push(`📊 SpO2: ${spo2}%`);
  }
  if (fc > 0) {
    if (fc < 50 || fc > 120) { alertas.push('🚨 FC CRÍTICA: ' + fc); nivel = 'critical'; }
    else if (fc < 60 || fc > 100) { alertas.push('⚠️ FC anormal: ' + fc); if (nivel !== 'critical') nivel = 'warning'; }
    else alertas.push('✅ FC normal: ' + fc);
  }
  if (fr > 0) {
    if (fr < 10 || fr > 30) { alertas.push('🚨 FR CRÍTICA: ' + fr); nivel = 'critical'; }
    else if (fr < 12 || fr > 20) { alertas.push('⚠️ FR anormal: ' + fr); if (nivel !== 'critical') nivel = 'warning'; }
    else alertas.push('✅ FR normal: ' + fr);
  }
  if (temp > 0) {
    if (temp > 39) { alertas.push('🚨 FIEBRE ALTA: ' + temp + '°C'); nivel = 'critical'; }
    else if (temp > 38) { alertas.push('⚠️ Fiebre: ' + temp + '°C'); if (nivel !== 'critical') nivel = 'warning'; }
    else if (temp < 35) { alertas.push('⚠️ Hipotermia: ' + temp + '°C'); if (nivel !== 'critical') nivel = 'warning'; }
    else alertas.push('✅ Temp normal: ' + temp + '°C');
  }
  if (glucosa > 0) {
    if (glucosa > 250 || glucosa < 50) { alertas.push('🚨 Glucosa CRÍTICA: ' + glucosa); nivel = 'critical'; }
    else if (glucosa > 180) { alertas.push('⚠️ Hiperglucemia: ' + glucosa); if (nivel !== 'critical') nivel = 'warning'; }
    else if (glucosa < 70) { alertas.push('⚠️ Hipoglucemia: ' + glucosa); if (nivel !== 'critical') nivel = 'warning'; }
    else alertas.push('✅ Glucosa normal: ' + glucosa);
  }
  if (bp) {
    const taEval = evaluarTA(bp);
    if (taEval) {
      alertas.push(`${taEval.mensaje} - ${taEval.accion}`);
      if (taEval.nivel === 'critical') nivel = 'critical';
      else if (taEval.nivel === 'warning' && nivel !== 'critical') nivel = 'warning';
    }
  }
  const div = document.getElementById('signosAlert');
  if (div && alertas.length > 0) {
    const cls = nivel === 'critical' ? 'alert-critical' : nivel === 'warning' ? 'alert-warning' : 'alert-success';
    div.innerHTML = `<div class="alert-box ${cls}">${alertas.join('<br>')}</div>`;
  } else if (div) div.innerHTML = '';
}

function initSignatures() {
  ['sigEntrega','sigRecibe'].forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas || canvas.dataset.initialized === 'true') return;
    const width = canvas.offsetWidth || 300;
    const height = canvas.offsetHeight || 120;
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✍️ Firme aquí', width / 2, height / 2);
    let drawing = false;
    ctx.strokeStyle = '#0f172a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    const startDraw = (e) => { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); };
    const draw = (e) => { if (!drawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
    const endDraw = () => { drawing = false; };
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.dataset.initialized = 'true';
  });
}

function clearCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const width = canvas.offsetWidth || 300;
  const height = canvas.offsetHeight || 120;
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✍️ Firme aquí', width / 2, height / 2);
}

function getSignatureData(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  try {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    let hasDrawing = false;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) { hasDrawing = true; break; }
    }
    if (!hasDrawing) return null;
    return canvas.toDataURL('image/png');
  } catch (e) { return null; }
}

async function cargarLogoBase64() {
  try {
    const response = await fetch('https://i.imgur.com/01YZxey.jpeg');
    const blob = await response.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch (e) { return null; }
}

async function generarReportePDF() {
  if (!validarPacienteSeleccionado()) return;

  if (!PDFClass) { showToast('Librería PDF no disponible', 'error'); return; }
  showToast('Generando PDF...', 'success');
  const doc = new PDFClass();
  let y = 20;
  const cleanText = (t) => t === null || t === undefined ? '' : String(t).trim();
  const logoBase64 = await cargarLogoBase64();

  }

  y += 10;
  doc.setFontSize(10);
  doc.text('(Reporte generado - datos completos en sistema)', 20, y);

async function crearPaciente() {
  const name = document.getElementById('newPacienteNombre')?.value?.trim();

  const ciudad = document.getElementById('newPacienteCiudad')?.value;
  const fecha_inicio_atencion = document.getElementById('newPacienteFechaInicio')?.value;
  const acudiente_nombre = document.getElementById('newAcudienteNombre')?.value?.trim();
  const acudiente_cedula = document.getElementById('newAcudienteCedula')?.value?.trim();
  const acudiente_parentesco = document.getElementById('newAcudienteParentesco')?.value;
  const acudiente_telefono = document.getElementById('newAcudienteTelefono')?.value?.trim();
  if (!name || !document_) { showToast('Complete nombre y documento', 'error'); return; }
  try {
    const response = await apiRequest('/api/patients', {
      method: 'POST',
      body: JSON.stringify({
        name: name,
        document: document_,
        ciudad: ciudad,
        fecha_inicio_atencion: fecha_inicio_atencion,
        diagnosis: document.getElementById('newPacienteDiagnostico')?.value || '',
        doctor: document.getElementById('newPacienteMedico')?.value || '',
        acudiente_nombre: acudiente_nombre,
        acudiente_cedula: acudiente_cedula,
        acudiente_parentesco: acudiente_parentesco,

      })
    });

      ['newPacienteNombre','newPacienteDocumento','newPacienteDiagnostico','newPacienteMedico',
       'newAcudienteNombre','newAcudienteCedula','newAcudienteTelefono'].forEach(id => {

function initSignaturesMensual() {
  ['sigMensualElabora','sigMensualFamiliar'].forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas || canvas.dataset.initialized === 'true') return;
    const width = canvas.offsetWidth || 300;
    const height = canvas.offsetHeight || 120;
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✍️ Firme aquí', width / 2, height / 2);
    let drawing = false;
    ctx.strokeStyle = '#0f172a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    const startDraw = (e) => { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); };
    const draw = (e) => { if (!drawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
    const endDraw = () => { drawing = false; };
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.dataset.initialized = 'true';
  });
}

function actualizarInfoPacienteReporte() {

  const ciudad = paciente.ciudad || 'Bogotá';
  const rango = getRangoSpO2(ciudad);
  // Auto-llenar datos del familiar si están en el paciente
  if (paciente.acudiente_nombre) {
    const fam = document.getElementById('familiarNombre');
    if (fam && !fam.value) fam.value = paciente.acudiente_nombre;

  if (paciente.acudiente_cedula) {

  }
  if (paciente.acudiente_parentesco) {

  }
  if (paciente.acudiente_telefono) {

    if (tel && !tel.value) tel.value = paciente.acudiente_telefono;
  }
  div.innerHTML = `
    <div class="paciente-info-card">
      <h3>${paciente.name}</h3>
      <p>📍 ${ciudad} (${rango.altitud}msnm)</p>
      <p>📅 Inicio atención: ${paciente.fecha_inicio_atencion || 'No registrada'}</p>
      <p>📊 Rango SpO2: ${rango.spo2_min}% - ${rango.spo2_max}%</p>
      ${paciente.acudiente_nombre ? `<p style="color:#8b5cf6;">👨‍👩‍👧 Acudiente: ${paciente.acudiente_nombre} (${paciente.acudiente_parentesco || 'N/A'})</p>` : ''}
    </div>
  `;
}

async function generarReporteMensualPDF() {
  const pacienteId = document.getElementById('reporteMensualPaciente')?.value;
  if (!pacienteId) { showToast('Seleccione un paciente', 'error'); return; }
  const familiarNombre = document.getElementById('familiarNombre')?.value?.trim();
  const familiarCedula = document.getElementById('familiarCedula')?.value?.trim();
  const familiarParentesco = document.getElementById('familiarParentesco')?.value;
  const familiarTelefono = document.getElementById('familiarTelefono')?.value?.trim();
  if (!familiarNombre || !familiarCedula || !familiarParentesco) {
    showToast('Complete los datos del familiar', 'error');
    return;
  }
  const firmaElabora = getSignatureData('sigMensualElabora');
  const firmaFamiliar = getSignatureData('sigMensualFamiliar');
  if (!firmaElabora || !firmaFamiliar) {
    showToast('⚠️ Ambas firmas son requeridas', 'warning');
    return;
  }
  const pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  const paciente = pacientes.find(p => p.id === pacienteId);
  if (!paciente) { showToast('Paciente no encontrado', 'error'); return; }
  const observaciones = document.getElementById('reporteObservaciones')?.value?.trim();
  showToast('Generando reporte...', 'success');
  const PDFClass = window.jspdf?.jsPDF;
  if (!PDFClass) { showToast('Librería PDF no disponible', 'error'); return; }
  const doc = new PDFClass();
  let y = 20;
  const cleanText = (t) => t === null || t === undefined ? '' : String(t).trim();
  const logoBase64 = await cargarLogoBase64();
  if (logoBase64) {
    try { doc.addImage(logoBase64, 'JPEG', 80, y - 10, 50, 20); y += 15; } catch(e) {}
  }
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(34, 197, 94);
  doc.text('VITAL HOGAR PRO IPS', 105, y, { align: 'center' });
  y += 10;
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(12);
  doc.text('REPORTE MENSUAL DE ATENCIÓN DOMICILIARIA', 105, y, { align: 'center' });
  y += 10;
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('DATOS DEL PACIENTE', 20, y);
  y += 7;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text('Paciente: ' + cleanText(paciente.name).toUpperCase(), 20, y); y += 6;
  doc.text('Documento: ' + (paciente.document || 'No registrado'), 20, y); y += 6;
  doc.text('Ciudad: ' + (paciente.ciudad || 'No especificada'), 20, y); y += 6;
  doc.text('Diagnóstico: ' + (paciente.diagnosis || 'No registrado'), 20, y); y += 6;
  doc.text('Médico tratante: ' + (paciente.doctor || 'No registrado'), 20, y); y += 6;
  doc.text('Período: ' + new Date().toLocaleDateString('es-CO'), 20, y); y += 10;
  if (y > 240) { doc.addPage(); y = 20; }
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(34, 197, 94);
  doc.text('OBSERVACIONES Y RECOMENDACIONES', 20, y);
  y += 7;
  doc.setTextColor(0, 0, 0);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  if (observaciones) {
    const lines = doc.splitTextToSize(observaciones, 170);
    doc.text(lines, 25, y);
    y += lines.length * 5 + 5;
  } else {
    doc.text('Sin observaciones adicionales', 25, y);
    y += 10;
  }
  if (y > 180) { doc.addPage(); y = 20; }
  y += 10;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('FIRMAS DE CONFORMIDAD', 20, y);
  y += 15;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  if (firmaElabora) {
    try { doc.addImage(firmaElabora, 'PNG', 25, y, 60, 25); } catch(e) {}
  }
  doc.text('_________________________', 25, y + 30);
  doc.text('Elaborado por:', 25, y + 35); y += 5;
  doc.text(`Nombre: ${currentUser.name}`, 25, y + 35);
  doc.text(`Rol: ${currentUser.role}`, 25, y + 40);
  if (currentUser.cedula) doc.text(`Cédula: ${currentUser.cedula}`, 25, y + 45);
  if (currentUser.rethus) doc.text(`ReTHUS: ${currentUser.rethus}`, 25, y + 50);
  if (firmaFamiliar) {
    try { doc.addImage(firmaFamiliar, 'PNG', 110, y, 60, 25); } catch(e) {}
  }
  doc.text('_________________________', 110, y + 30);
  doc.text('Recibido por (Familiar):', 110, y + 35);
  doc.text(`Nombre: ${familiarNombre}`, 110, y + 40);
  doc.text(`Parentesco: ${familiarParentesco}`, 110, y + 45);
  doc.text(`Cédula: ${familiarCedula}`, 110, y + 50);
  if (familiarTelefono) doc.text(`Teléfono: ${familiarTelefono}`, 110, y + 55);
  doc.text(`Fecha: ${new Date().toLocaleDateString('es-CO')}`, 110, y + 60);
  const nombreArchivo = 'reporte_mensual_' + cleanText(paciente.name).replace(/\s+/g, '_') + '_' + getCurrentDate() + '.pdf';
  doc.save(nombreArchivo);
  showToast('✅ Reporte mensual generado', 'success');
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
  document.getElementById('loginEmail').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
  document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('loginPassword');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
  });
  const token = localStorage.getItem('vital_token');
  const userData = localStorage.getItem('vital_user');
  if (token && userData) {
    try {
      const user = JSON.parse(userData);
      currentUser = user;
      currentRole = user.role;
      cargarDatosIniciales().then(() => {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userRoleDisplay').textContent = user.role;
        actualizarDisplayPaciente();
        buildTabs();
        iniciarReloj();
      });
    } catch (e) {
      localStorage.removeItem('vital_token');
      localStorage.removeItem('vital_user');
    }
  }
});
