<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
<title>Vital Hogar Pro IPS - v6.0 Fusionado</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:12px;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:20px;padding:12px 20px;margin-bottom:16px;border:1px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-area img{height:50px;width:auto;object-fit:contain;border-radius:8px}
.logo-area h1{font-size:1.1rem;font-weight:700;color:#22c55e;letter-spacing:.5px}
.logo-area .subtitle{font-size:.6rem;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
.user-info{display:flex;align-items:center;gap:10px;background:#0f172a;padding:6px 16px;border-radius:30px;border:1px solid #334155;font-size:.75rem;flex-wrap:wrap}
.user-info .user-name{color:#22c55e;font-weight:600}
.user-info .role-badge{background:#22c55e20;color:#22c55e;padding:2px 10px;border-radius:12px;font-size:.6rem;font-weight:600;text-transform:uppercase}
.user-info .paciente-badge{background:#8b5cf620;color:#8b5cf6;padding:2px 10px;border-radius:12px;font-size:.65rem;font-weight:600;cursor:pointer}
.user-info .paciente-badge:hover{background:#8b5cf640}
.user-info .turno-badge{background:#f9731620;color:#f97316;padding:2px 10px;border-radius:12px;font-size:.6rem;font-weight:600}
.logout-btn{background:#ef4444;border:none;color:white;padding:4px 14px;border-radius:20px;cursor:pointer;font-size:.65rem;font-weight:600}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card-title{font-size:1rem;font-weight:600;color:#22c55e;margin-bottom:16px;border-left:3px solid #22c55e;padding-left:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.form-group{margin-bottom:14px;position:relative}
.form-group label{display:block;font-size:.65rem;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;letter-spacing:.5px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0f172a!important;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:#e2e8f0!important;font-size:.9rem}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#22c55e;outline:none}
.form-group select option{background:#1e293b;color:#e2e8f0}
.form-group textarea{min-height:80px;resize:vertical}
.btn{padding:10px 20px;border-radius:12px;font-weight:600;cursor:pointer;border:none;font-size:.85rem;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn-primary{background:#22c55e;color:white;width:100%}
.btn-secondary{background:#334155;color:white}
.btn-warning{background:#f97316;color:white}
.btn-danger{background:#ef4444;color:white}
.btn-voice{background:#8b5cf6;color:white;padding:6px 14px;font-size:.75rem;width:auto;margin-top:4px}
.btn-sm{padding:4px 12px;font-size:.7rem;width:auto}
.btn-select-pac{background:#8b5cf6;color:white;padding:4px 14px;border-radius:20px;cursor:pointer;font-size:.65rem;font-weight:600;border:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 16px;background:#1e293b;border-radius:30px;cursor:pointer;font-size:.75rem;font-weight:500;white-space:nowrap;border:1px solid transparent}
.tab:hover{background:#334155}
.tab.active{background:#22c55e;color:white}
.hidden{display:none!important}
.text-muted{color:#94a3b8}
.signature-canvas{background:white;border-radius:10px;width:100%;height:120px;border:2px solid #22c55e;touch-action:none;cursor:crosshair}
.activity-item{background:#0f172a;padding:10px 14px;border-radius:10px;margin-bottom:6px;border-left:3px solid #22c55e;font-size:.85rem}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-preview img{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid #334155}
.sbar-card{background:#0f172a;border-radius:10px;padding:12px;margin-bottom:10px;border-left:3px solid #8b5cf6}
.sbar-field{margin-bottom:8px}
.sbar-field label{font-size:.7rem;color:#8b5cf6;font-weight:600;display:block;margin-bottom:2px}
.tip-box{background:#0f172a;padding:10px 14px;border-radius:10px;margin-bottom:12px;border-left:4px solid #f97316;font-size:.8rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border-radius:30px;padding:12px 24px;display:none;z-index:1000;font-size:.85rem;max-width:90%;text-align:center;border:1px solid #334155;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{display:block}
.toast.success{border-left:4px solid #22c55e}
.toast.error{border-left:4px solid #ef4444}
.toast.warning{border-left:4px solid #f97316}
.login-container{max-width:420px;margin:40px auto}
.login-container .card{padding:30px}
.login-container .card-title{font-size:1.2rem;text-align:center;border-left:none;padding-left:0;justify-content:center}
.login-error{color:#ef4444;font-size:.8rem;margin-bottom:10px;display:none;padding:8px 12px;background:#ef444420;border-radius:8px;border:1px solid #ef4444}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1.2rem;padding:0;z-index:10}
.reloj-turno{background:#0f172a;padding:12px;border-radius:10px;margin-bottom:12px;border:1px solid #22c55e;font-size:.9rem;text-align:center}
.reloj-turno .hora{color:#22c55e;font-weight:700;font-size:1.1rem}
.alert-box{padding:10px 14px;border-radius:8px;margin-top:10px;font-size:.85rem;font-weight:500}
.alert-critical{background:#ef444420;border:1px solid #ef4444;color:#ef4444}
.alert-warning{background:#f9731620;border:1px solid #f97316;color:#f97316}
.alert-success{background:#22c55e20;border:1px solid #22c55e;color:#22c55e}
.firma-guardada{color:#22c55e;font-size:.7rem;margin-top:4px;display:none}
.firma-guardada.visible{display:block}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;display:flex;align-items:center;justify-content:center}
.modal-content{background:#1e293b;border-radius:16px;padding:24px;max-width:500px;width:90%;border:1px solid #334155;max-height:90vh;overflow-y:auto}
@media(max-width:480px){
body{padding:8px}
.header{padding:10px 14px;flex-direction:column;text-align:center}
.logo-area{justify-content:center}
.logo-area img{height:40px}
.logo-area h1{font-size:.9rem}
.user-info{justify-content:center;width:100%}
.grid-2,.grid-3{grid-template-columns:1fr;gap:8px}
.tab{font-size:.7rem;padding:6px 12px}
.card{padding:14px}
.signature-canvas{height:100px}
.btn{font-size:.8rem;padding:8px 16px}
}
</style>
</head>
<body>
<header class="header">
<div class="logo-area">
<img src="https://i.imgur.com/01YZxey.jpeg" alt="Vital Hogar" onerror="this.style.display='none'">
<div>
<h1>VITAL HOGAR PRO IPS</h1>
<div class="subtitle">Cuidados Domiciliarios</div>
</div>
</div>
<div id="userInfo" class="user-info hidden">
<span class="user-name" id="userName"></span>
<span class="role-badge" id="userRoleDisplay"></span>
<span class="paciente-badge" id="pacienteBadge" onclick="seleccionarPacienteHeader()">⚠️ Sin paciente</span>
<span class="turno-badge" id="turnoBadge" style="display:none;"></span>
<button class="btn-select-pac" onclick="seleccionarPacienteHeader()">👤 Paciente</button>
<button class="logout-btn" onclick="logout()">Salir</button>
</div>
</header>

<div id="loginScreen">
<div class="login-container">
<div class="card">
<div class="card-title">🔐 Acceso al Sistema</div>
<div class="form-group">
<label>📧 Email</label>
<input type="email" id="loginEmail" placeholder="usuario@vitalhogar.com" autocomplete="email">
</div>
<div class="form-group">
<label>🔒 Contraseña</label>
<div style="position:relative;">
<input type="password" id="loginPassword" placeholder="Ingrese su contraseña" autocomplete="current-password">
<button type="button" class="password-toggle" id="togglePassword">👁️</button>
</div>
</div>
<div id="loginError" class="login-error"></div>
<button class="btn btn-primary" id="loginBtn">Ingresar</button>
</div>
</div>
</div>

<div id="mainScreen" class="hidden">
<div id="tabsContainer" class="tabs"></div>
<div id="dynamicContent"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN GLOBAL
// ============================================================
var API_URL = 'https://vital-backend-1-y4kt.onrender.com';
var currentUser = null;
var currentRole = null;
var pacienteActual = null;
var horaEntrada = null;
var relojInterval = null;
var recognitionActive = false;

// ============================================================
// UTILIDADES
// ============================================================
function showToast(msg, type) {
  type = type || 'success';
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

function getCurrentTime() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function getCurrentTimeShort() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

function validarPacienteSeleccionado() {
  if (!pacienteActual) {
    showToast('⚠️ Seleccione un paciente primero', 'warning');
    return false;
  }
  return true;
}

// ============================================================
// RELOJ EN TIEMPO REAL
// ============================================================
function iniciarReloj() {
  if (relojInterval) clearInterval(relojInterval);
  relojInterval = setInterval(function() {
    var relojDiv = document.getElementById('relojTurno');
    if (relojDiv && horaEntrada) {
      var ahora = new Date();
      var diff = Math.floor((ahora - horaEntrada) / 1000);
      var horas = Math.floor(diff / 3600);
      var minutos = Math.floor((diff % 3600) / 60);
      var segundos = diff % 60;
      var duracion = horas + 'h ' + minutos + 'min ' + segundos + 's';
      relojDiv.innerHTML = 
        '<div>🕐 <strong>Entrada:</strong> <span class="hora">' + horaEntrada.toLocaleTimeString('es-CO') + '</span></div>' +
        '<div>🕐 <strong>Actual:</strong> <span class="hora">' + getCurrentTime() + '</span></div>' +
        '<div>⏱️ <strong>Duración:</strong> <span class="hora">' + duracion + '</span></div>';
    } else if (relojDiv) {
      relojDiv.innerHTML = '<div>🕐 <strong>Actual:</strong> <span class="hora">' + getCurrentTime() + '</span></div><div style="color:#94a3b8;font-size:.8rem;">Registre la entrada para iniciar el turno</div>';
    }
  }, 1000);
}

function detenerReloj() {
  if (relojInterval) {
    clearInterval(relojInterval);
    relojInterval = null;
  }
}

// ============================================================
// DICTADO POR VOZ
// ============================================================
function iniciarDictado(targetId) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('Voz no soportada', 'error'); return; }
  if (recognitionActive) { showToast('Ya hay una grabación en curso', 'warning'); return; }
  var recognition;
  try { recognition = new SpeechRecognition(); } catch(e) { showToast('Error al iniciar dictado', 'error'); return; }
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = function() { recognitionActive = true; showToast('🎙️ Habla ahora...', 'success'); };
  recognition.onend = function() { recognitionActive = false; };
  recognition.onresult = function(event) {
    var target = document.getElementById(targetId);
    if (!target) return;
    var result = event.results[0];
    if (result && result.isFinal) {
      var texto = result[0].transcript.trim();
      if (texto) {
        target.value += (target.value ? ' ' : '') + texto;
        showToast('Dictado completado', 'success');
      }
    }
  };
  recognition.onerror = function(event) {
    recognitionActive = false;
    var mensajes = { 'not-allowed': 'Permiso denegado', 'no-speech': 'No se detectó voz', 'audio-capture': 'Sin micrófono', 'network': 'Error de red' };
    showToast(mensajes[event.error] || 'Error: ' + event.error, 'error');
  };
  try { recognition.start(); } catch(e) { recognitionActive = false; }
}

// ============================================================
// API REQUEST
// ============================================================
async function apiRequest(endpoint, options) {
  options = options || {};
  var token = localStorage.getItem('vital_token');
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  try {
    var response = await fetch(API_URL + endpoint, { method: options.method || 'GET', headers: headers, body: options.body || null });
    if (response.status === 401) { showToast('Sesión expirada', 'error'); logout(); throw new Error('Sesión expirada'); }
    return response;
  } catch (error) { throw error; }
}

// ============================================================
// LOGIN
// ============================================================
async function login() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errorDiv = document.getElementById('loginError');
  errorDiv.style.display = 'none';
  if (!email || !password) { errorDiv.textContent = 'Email y contraseña son requeridos'; errorDiv.style.display = 'block'; return; }
  var loginBtn = document.getElementById('loginBtn');
  loginBtn.disabled = true;
  loginBtn.innerHTML = 'Verificando...';
  try {
    var response = await fetch(API_URL + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password }) });
    var data = await response.json();
    if (!data.success) { errorDiv.textContent = data.message || 'Credenciales inválidas'; errorDiv.style.display = 'block'; showToast('Credenciales inválidas', 'error'); return; }
    var user = data.data.user;
    var token = data.data.token;
    localStorage.setItem('vital_token', token);
    localStorage.setItem('vital_user', JSON.stringify(user));
    currentUser = user;
    currentRole = user.role;
    cargarPacienteActual();
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRoleDisplay').textContent = user.role;
    actualizarDisplayPaciente();
    buildTabs();
    iniciarReloj();
    showToast('Bienvenido ' + user.name, 'success');
  } catch (error) {
    errorDiv.textContent = 'Error de conexión con el servidor';
    errorDiv.style.display = 'block';
    showToast('Error de conexión', 'error');
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerHTML = 'Ingresar';
  }
}

function logout() {
  localStorage.removeItem('vital_token');
  localStorage.removeItem('vital_user');
  localStorage.removeItem('vital_paciente_actual');
  currentUser = null; currentRole = null; pacienteActual = null;
  detenerReloj();
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('userInfo').classList.add('hidden');
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginEmail').value = '';
  showToast('Sesión cerrada', 'success');
}

function checkSession() {
  var token = localStorage.getItem('vital_token');
  var userData = localStorage.getItem('vital_user');
  if (token && userData) {
    try {
      var user = JSON.parse(userData);
      currentUser = user; currentRole = user.role;
      cargarPacienteActual();
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      document.getElementById('userInfo').classList.remove('hidden');
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userRoleDisplay').textContent = user.role;
      actualizarDisplayPaciente();
      buildTabs();
      iniciarReloj();
      return true;
    } catch (e) { localStorage.removeItem('vital_token'); localStorage.removeItem('vital_user'); }
  }
  return false;
}

// ============================================================
// PACIENTE
// ============================================================
function cargarPacienteActual() {
  var saved = localStorage.getItem('vital_paciente_actual');
  if (saved) { try { pacienteActual = JSON.parse(saved); } catch (e) { pacienteActual = null; } }
}

function guardarPacienteActual(paciente) {
  pacienteActual = paciente;
  if (paciente) localStorage.setItem('vital_paciente_actual', JSON.stringify(paciente));
  else localStorage.removeItem('vital_paciente_actual');
  actualizarDisplayPaciente();
}

function actualizarDisplayPaciente() {
  var display = document.getElementById('pacienteBadge');
  if (!display) return;
  if (pacienteActual) { display.textContent = '👤 ' + pacienteActual.name; }
  else { display.textContent = '⚠️ Sin paciente'; }
}

function seleccionarPacienteHeader() {
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  if (pacientes.length === 0) { showToast('No hay pacientes registrados', 'warning'); return; }
  var options = '<option value="">-- Sin paciente --</option>';
  pacientes.forEach(function(p) {
    var selected = pacienteActual && pacienteActual.id === p.id ? 'selected' : '';
    options += '<option value="' + p.id + '" ' + selected + '>' + p.name + '</option>';
  });
  var html = '<div class="modal-overlay" id="modalPaciente">' +
    '<div class="modal-content">' +
    '<div class="card-title">👤 Seleccionar Paciente</div>' +
    '<div class="form-group"><label>Paciente para este turno</label>' +
    '<select id="selectPacienteHeader">' + options + '</select></div>' +
    '<button class="btn btn-primary" onclick="confirmarSeleccionPaciente()">✅ Confirmar</button>' +
    '<button class="btn btn-secondary" style="margin-top:8px;" onclick="cerrarModalPaciente()">❌ Cancelar</button>' +
    '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

window.confirmarSeleccionPaciente = function() {
  var select = document.getElementById('selectPacienteHeader');
  if (!select) return;
  var pacienteId = select.value;
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var paciente = pacientes.find(function(p) { return p.id === pacienteId; });
  guardarPacienteActual(paciente || null);
  cerrarModalPaciente();
  showToast('Paciente: ' + (paciente ? paciente.name : 'Ninguno'), 'success');
};

window.cerrarModalPaciente = function() {
  var modal = document.getElementById('modalPaciente');
  if (modal) modal.remove();
};

// ============================================================
// ALMACENAMIENTO LOCAL
// ============================================================
function saveToLocal(key, data) {
  if (!pacienteActual) { showToast('Seleccione un paciente primero', 'warning'); return; }
  var storageKey = 'vital_' + currentRole.toLowerCase() + '_' + currentUser.id;
  var all;
  try { all = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch (e) { all = {}; }
  all[key] = all[key] || [];
  all[key].push(Object.assign({}, data, {
    timestamp: new Date().toISOString(),
    user_id: currentUser.id,
    user_name: currentUser.name,
    paciente_id: pacienteActual.id,
    paciente_nombre: pacienteActual.name
  }));
  localStorage.setItem(storageKey, JSON.stringify(all));
  showToast(key + ' guardado', 'success');
}

function getFromLocal(key) {
  var storageKey = 'vital_' + currentRole.toLowerCase() + '_' + currentUser.id;
  try { var all = JSON.parse(localStorage.getItem(storageKey) || '{}'); return all[key] || []; } catch (e) { return []; }
}

function getFromLocalHoy(key) {
  var items = getFromLocal(key);
  var hoy = new Date().toDateString();
  return items.filter(function(item) { return item.timestamp && new Date(item.timestamp).toDateString() === hoy; });
}

function cargarLista(key, elementId) {
  var items = getFromLocal(key);
  var div = document.getElementById(elementId);
  if (!div) return;
  if (items.length === 0) { div.innerHTML = '<p class="text-muted" style="font-size:0.85rem;">No hay registros</p>'; }
  else {
    div.innerHTML = items.slice(-10).reverse().map(function(i) {
      var timestamp = i.timestamp ? new Date(i.timestamp).toLocaleString() : 'Fecha no disponible';
      var contenido = i.resumen || i.actividad || i.nombre || JSON.stringify(i);
      return '<div class="activity-item"><strong>' + timestamp + '</strong><br>' + contenido + '</div>';
    }).join('');
  }
}

// ============================================================
// FIRMAS (SOLO PARA ENTREGA)
// ============================================================
function initSignatures() {
  var canvasIds = ['sigEntrega', 'sigRecibe'];
  canvasIds.forEach(function(id) {
    var canvas = document.getElementById(id);
    if (!canvas) return;
    var width = canvas.offsetWidth || 300;
    var height = canvas.offsetHeight || 120;
    canvas.width = width;
    canvas.height = height;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✍️ Firme aquí', width / 2, height / 2);
    if (canvas.dataset.initialized === 'true') return;
    var drawing = false;
    ctx.strokeStyle = '#0f172a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    var startDraw = function(e) { drawing = true; ctx.beginPath(); var pos = getPos(e); ctx.moveTo(pos.x, pos.y); };
    var draw = function(e) { if (!drawing) return; e.preventDefault(); var pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
    var endDraw = function() { drawing = false; };
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.dataset.initialized = 'true';
  });
}

window.clearCanvas = function(id) {
  var canvas = document.getElementById(id);
  if (!canvas) return;
  var width = canvas.offsetWidth || 300;
  var height = canvas.offsetHeight || 120;
  canvas.width = width;
  canvas.height = height;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✍️ Firme aquí', width / 2, height / 2);
};

function getSignatureData(canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  try {
    var ctx = canvas.getContext('2d');
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var data = imageData.data;
    var hasDrawing = false;
    for (var i = 0; i < data.length; i += 4) {
      if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) { hasDrawing = true; break; }
    }
    if (!hasDrawing) return null;
    return canvas.toDataURL('image/png');
  } catch (e) { return null; }
}

function buildTabs() {
  var tabsContainer = document.getElementById('tabsContainer');
  var tabs = [];
  switch (currentRole) {
    case 'AUXILIAR':
      tabs = [
        { id: 'recibo', name: '📋 Recibo' },
        { id: 'actividades', name: '✅ Actividades' },
        { id: 'signos', name: '🩺 Signos' },
        { id: 'medicamentos', name: '💊 Medicamentos' },
        { id: 'entrega', name: '🔄 Entrega' },
        { id: 'reportes', name: '📄 Reportes' }
      ];
      break;
    case 'ADMIN':
      tabs = [
        { id: 'usuarios', name: '👥 Usuarios' },
        { id: 'pacientes', name: '🏥 Pacientes' },
        { id: 'reportesGlobales', name: '📊 Reportes' }
      ];
      break;
    default:
      tabs = [{ id: 'inicio', name: '🏠 Inicio' }];
  }
  tabsContainer.innerHTML = tabs.map(function(t) { return '<div class="tab" data-tab="' + t.id + '">' + t.name + '</div>'; }).join('');
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      loadTab(this.dataset.tab);
    });
  });
  if (tabs.length > 0) { document.querySelector('.tab').classList.add('active'); loadTab(tabs[0].id); }
}

function loadTab(tabId) {
  var contentDiv = document.getElementById('dynamicContent');
  var content = '';
  switch (tabId) {
    case 'recibo': content = getReciboContent(); break;
    case 'actividades': content = getActividadesContent(); break;
    case 'signos': content = getSignosContent(); break;
    case 'medicamentos': content = getMedicamentosContent(); break;
    case 'entrega': content = getEntregaContent(); break;
    case 'reportes': content = getReportesContent(); break;
    case 'usuarios': content = getUsuariosContent(); break;
    case 'pacientes': content = getPacientesContent(); break;
    case 'reportesGlobales': content = getReportesGlobalesContent(); break;
    default: content = '<div class="card"><p>Contenido no disponible</p></div>';
  }
  contentDiv.innerHTML = content;
  setTimeout(function() {
    initSignatures();
    if (tabId === 'recibo') cargarLista('recibos', 'historialRecibos');
    if (tabId === 'actividades') cargarLista('actividades', 'listaActividades');
    if (tabId === 'signos') cargarLista('signos', 'historialSignos');
    if (tabId === 'medicamentos') cargarLista('medicamentos', 'historialMedicamentos');
    if (tabId === 'entrega') cargarLista('entregas', 'historialEntregas');
  }, 100);
}

window.capturarFoto = function() {
  var input = document.getElementById('photoInput');
  if (input && input.files.length > 0) {
    var preview = document.getElementById('photoPreview');
    preview.innerHTML = '';
    var maxFotos = Math.min(input.files.length, 3);
    for (var i = 0; i < maxFotos; i++) {
      var file = input.files[i];
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = document.createElement('img');
        img.src = e.target.result;
        preview.appendChild(img);
      };
      reader.readAsDataURL(file);
    }
    if (input.files.length > 3) showToast('Se tomaron solo las primeras 3 fotos', 'warning');
    else showToast('Fotos capturadas', 'success');
  } else { showToast('Seleccione una imagen', 'error'); }
};

window.guardarSignos = function() {
  if (!validarPacienteSeleccionado()) return;
  var hora = document.getElementById('horaSignos').value;
  if (!hora) { showToast('Ingrese la hora', 'error'); return; }
  var spo2 = parseInt(document.getElementById('spo2').value) || 0;
  var temp = parseFloat(document.getElementById('temp').value) || 0;
  var glucosa = parseInt(document.getElementById('glucosa').value) || 0;
  var alertas = [];
  var tipoAlerta = 'success';
  if (spo2 > 0 && spo2 < 88) { alertas.push('SpO2 crítica'); tipoAlerta = 'critical'; }
  else if (spo2 > 0 && spo2 < 92) { alertas.push('SpO2 baja'); tipoAlerta = 'warning'; }
  if (temp > 38.5) { alertas.push('FIEBRE'); tipoAlerta = 'warning'; }
  if (glucosa > 180) { alertas.push('HIPERGLUCEMIA'); tipoAlerta = 'warning'; }
  else if (glucosa > 0 && glucosa < 70) { alertas.push('HIPOGLUCEMIA'); tipoAlerta = 'warning'; }
  var alertMsg = alertas.length > 0 ? alertas.join(' | ') : 'Parámetros normales';
  document.getElementById('signosAlert').innerHTML = '<div class="alert-box alert-' + tipoAlerta + '">' + alertMsg + '</div>';
  saveToLocal('signos', {
    spo2: spo2, fc: document.getElementById('fc').value, fr: document.getElementById('fr').value,
    temp: temp, bp: document.getElementById('bp').value, glucosa: glucosa,
    hora: hora, obs: document.getElementById('obsSignos').value, alertas: alertas
  });
  ['spo2','fc','fr','temp','bp','glucosa','obsSignos'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.value = '';
  });
  cargarLista('signos', 'historialSignos');
};

function generarReportePDF() {
  if (!validarPacienteSeleccionado()) return;

  if (!PDFClass) { showToast('PDF no disponible', 'error'); return; }
  var doc = new PDFClass();
  var y = 20;
  function cleanText(t) { return t === null || t === undefined ? '' : String(t).trim(); }
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(34, 197, 94);
  doc.text('VITAL HOGAR PRO IPS', 20, y); y += 10;
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(12);
  doc.text('REPORTE DEL PACIENTE', 20, y); y += 8;
  doc.setFontSize(14);
  doc.text(pacienteActual.name.toUpperCase(), 20, y); y += 8;
  doc.setFontSize(9);
  doc.text('Fecha: ' + new Date().toLocaleString(), 20, y); y += 5;
  doc.text('Profesional: ' + cleanText(currentUser.name), 20, y); y += 10;
  var recibos = getFromLocalHoy('recibos');
  if (recibos.length > 0) {
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('1. RECIBO', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    recibos.forEach(function(r) {
      doc.text('🕐 ' + (r.hora || '') + ' - ' + cleanText(r.estado).substring(0, 80), 25, y); y += 5;
    });
    y += 5;
  }
  var actividades = getFromLocalHoy('actividades');
  if (actividades.length > 0) {
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('2. ACTIVIDADES', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    actividades.forEach(function(a) {
      doc.text('🕐 ' + (a.hora || '') + ' - ' + cleanText(a.actividad), 25, y); y += 5;
      if (a.observacion) doc.text('   Obs: ' + cleanText(a.observacion).substring(0, 70), 30, y); y += 5;
    });
    y += 5;
  }
  var signos = getFromLocalHoy('signos');
  if (signos.length > 0) {
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('3. SIGNOS VITALES', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    signos.forEach(function(s) {
      doc.text('🕐 ' + (s.hora || '') + ' - SpO2:' + (s.spo2 || '-') + '% FC:' + (s.fc || '-') + ' T:' + (s.temp || '-') + 'C', 25, y); y += 5;
    });
    y += 5;
  }
  var medicamentos = getFromLocalHoy('medicamentos');
  if (medicamentos.length > 0) {
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('4. MEDICAMENTOS', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    medicamentos.forEach(function(m) {
      doc.text('🕐 ' + (m.hora || '') + ' - ' + cleanText(m.nombre) + ' ' + cleanText(m.dosis), 25, y); y += 5;
    });
    y += 5;
  }
  var entregas = getFromLocalHoy('entregas');
  if (entregas.length > 0) {
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('5. ENTREGA', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    var ultima = entregas[entregas.length - 1];
    if (ultima) {
      doc.text('Hora: ' + cleanText(ultima.horaEntrega), 25, y); y += 5;
      doc.text('Resumen: ' + cleanText(ultima.resumen).substring(0, 80), 25, y); y += 5;
      if (ultima.firma_entrega) {
        try { doc.addImage(ultima.firma_entrega, 'PNG', 25, y, 60, 20); y += 25; } catch(e) {}
      }
      if (ultima.firma_recibe) {
        try { doc.addImage(ultima.firma_recibe, 'PNG', 25, y, 60, 20); y += 25; } catch(e) {}
      }
    }
  }
  var fechaStr = new Date().toISOString().split('T')[0];
  doc.save('reporte_' + pacienteActual.name.replace(/\s+/g, '') + '_' + fechaStr + '.pdf');
  showToast('Reporte generado', 'success');
}

window.crearUsuario = async function() {
  var name = document.getElementById('newUserName').value.trim();
  var email = document.getElementById('newUserEmail').value.trim();
  var role = document.getElementById('newUserRole').value;
  var password = document.getElementById('newUserPass').value;
  if (!name || !email || !password) { showToast('Complete todos los campos', 'error'); return; }
  try {
    var response = await apiRequest('/api/users', { method: 'POST', body: JSON.stringify({ name: name, email: email, role: role, password: password }) });
    var data = await response.json();
    if (data.success) {
      ['newUserName','newUserEmail','newUserPass'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
      cargarUsuarios();
      showToast('Usuario creado', 'success');
    } else showToast(data.message || 'Error', 'error');
  } catch (error) { showToast('Error al crear usuario', 'error'); }
};

async function cargarUsuarios() {
  try {
    var response = await apiRequest('/api/users');
    var data = await response.json();
    var div = document.getElementById('listaUsuarios');
    if (!div) return;
    if (data.success && data.data && data.data.length > 0) {
      div.innerHTML = data.data.map(function(u) {
        return '<div class="activity-item"><strong>' + u.name + '</strong> (' + u.role + ')<br>' + u.email + '</div>';
      }).join('');
    } else {
      div.innerHTML = '<p class="text-muted">Sin usuarios</p>';
    }
  } catch (e) {}
}

    '<div class="card"><div class="card-title">🏥 Pacientes</div><div id="listaPacientes"></div></div>';
}

window.crearPaciente = async function() {
  var name = document.getElementById('newPacienteNombre').value;
  var doc = document.getElementById('newPacienteDocumento').value;
  if (!name || !doc) { showToast('Complete nombre y documento', 'error'); return; }
  try {
    var response = await apiRequest('/api/patients', { method: 'POST', body: JSON.stringify({ name: name, document: doc, diagnosis: document.getElementById('newPacienteDiagnostico').value, doctor: document.getElementById('newPacienteMedico').value }) });
    var data = await response.json();
    if (data.success) {
      ['newPacienteNombre','newPacienteDocumento','newPacienteDiagnostico','newPacienteMedico'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
      cargarPacientes();
      showToast('Paciente creado', 'success');
    } else showToast(data.message || 'Error', 'error');
  } catch (error) { showToast('Error al crear paciente', 'error'); }
};

async function cargarPacientes() {
  try {
    var response = await apiRequest('/api/patients');
    var data = await response.json();
    var div = document.getElementById('listaPacientes');
    if (!div) return;
    if (data.success && data.data && data.data.length > 0) {
      localStorage.setItem('vital_pacientes', JSON.stringify(data.data));
      div.innerHTML = data.data.map(function(p) {
        return '<div class="activity-item"><strong>' + p.name + '</strong><br>' + (p.document || '-') + ' | ' + (p.diagnosis || '-') + '</div>';
      }).join('');
    } else {
      div.innerHTML = '<p class="text-muted">Sin pacientes</p>';
    }
  } catch (e) {}
}
