<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
<title>Vital Hogar Pro IPS - v2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:12px;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:20px;padding:12px 20px;margin-bottom:16px;border:1px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-area img{height:50px;width:auto;object-fit:contain;border-radius:8px}
.logo-area h1{font-size:1.1rem;font-weight:700;color:#22c55e;letter-spacing:.5px}
.logo-area .subtitle{font-size:.6rem;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
.user-info{display:flex;align-items:center;gap:10px;background:#0f172a;padding:6px 16px;border-radius:30px;border:1px solid #334155;font-size:.75rem;flex-wrap:wrap}
.user-info .user-name{color:#22c55e;font-weight:600}
.user-info .role-badge{background:#22c55e20;color:#22c55e;padding:2px 10px;border-radius:12px;font-size:.6rem;font-weight:600;text-transform:uppercase}
.user-info .paciente-badge{background:#8b5cf620;color:#8b5cf6;padding:2px 10px;border-radius:12px;font-size:.65rem;font-weight:600;cursor:pointer}
.user-info .paciente-badge:hover{background:#8b5cf640}
.user-info .turno-badge{background:#f9731620;color:#f97316;padding:2px 10px;border-radius:12px;font-size:.6rem;font-weight:600}
.logout-btn{background:#ef4444;border:none;color:white;padding:4px 14px;border-radius:20px;cursor:pointer;font-size:.65rem;font-weight:600}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card-title{font-size:1rem;font-weight:600;color:#22c55e;margin-bottom:16px;border-left:3px solid #22c55e;padding-left:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.form-group{margin-bottom:14px;position:relative}
.form-group label{display:block;font-size:.65rem;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;letter-spacing:.5px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0f172a!important;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:#e2e8f0!important;font-size:.9rem}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#22c55e;outline:none}
.form-group select option{background:#1e293b;color:#e2e8f0}
.form-group textarea{min-height:80px;resize:vertical}
.btn{padding:10px 20px;border-radius:12px;font-weight:600;cursor:pointer;border:none;font-size:.85rem;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn-primary{background:#22c55e;color:white;width:100%}
.btn-secondary{background:#334155;color:white}
.btn-warning{background:#f97316;color:white}
.btn-danger{background:#ef4444;color:white}
.btn-voice{background:#8b5cf6;color:white;padding:6px 14px;font-size:.75rem;width:auto;margin-top:4px}
.btn-sm{padding:4px 12px;font-size:.7rem;width:auto}
.btn-archive{background:#8b5cf6;color:white;width:100%;margin-top:12px;padding:14px;font-size:.9rem}
.btn-select-pac{background:#8b5cf6;color:white;padding:4px 14px;border-radius:20px;cursor:pointer;font-size:.65rem;font-weight:600;border:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 16px;background:#1e293b;border-radius:30px;cursor:pointer;font-size:.75rem;font-weight:500;white-space:nowrap;border:1px solid transparent}
.tab:hover{background:#334155}
.tab.active{background:#22c55e;color:white}
.hidden{display:none!important}
.text-muted{color:#94a3b8}
.signature-canvas{background:white;border-radius:10px;width:100%;height:120px;border:2px solid #22c55e;touch-action:none;cursor:crosshair}
.activity-item{background:#0f172a;padding:10px 14px;border-radius:10px;margin-bottom:6px;border-left:3px solid #22c55e;font-size:.85rem}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-preview img{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid #334155}
.sbar-card{background:#0f172a;border-radius:10px;padding:12px;margin-bottom:10px;border-left:3px solid #8b5cf6}
.sbar-field{margin-bottom:8px}
.sbar-field label{font-size:.7rem;color:#8b5cf6;font-weight:600;display:block;margin-bottom:2px}
.tip-box{background:#0f172a;padding:10px 14px;border-radius:10px;margin-bottom:12px;border-left:4px solid #f97316;font-size:.8rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border-radius:30px;padding:12px 24px;display:none;z-index:1000;font-size:.85rem;max-width:90%;text-align:center;border:1px solid #334155;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{display:block}
.toast.success{border-left:4px solid #22c55e}
.toast.error{border-left:4px solid #ef4444}
.toast.warning{border-left:4px solid #f97316}
.login-container{max-width:420px;margin:40px auto}
.login-container .card{padding:30px}
.login-container .card-title{font-size:1.2rem;text-align:center;border-left:none;padding-left:0;justify-content:center}
.login-error{color:#ef4444;font-size:.8rem;margin-bottom:10px;display:none;padding:8px 12px;background:#ef444420;border-radius:8px;border:1px solid #ef4444}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1.2rem;padding:0;z-index:10}
.imc-display{background:#0f172a;padding:10px 14px;border-radius:8px;font-size:.9rem;font-weight:600;text-align:center;border:1px solid #334155}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-size:.65rem;text-transform:uppercase;font-weight:600}
tr:hover td{background:#0f172a}
.education-topic{background:#1e293b;padding:10px 14px;border-radius:8px;margin-bottom:6px;border-left:3px solid #8b5cf6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.alert-box{padding:10px 14px;border-radius:8px;margin-top:10px;font-size:.85rem;font-weight:500}
.alert-critical{background:#ef444420;border:1px solid #ef4444;color:#ef4444}
.alert-warning{background:#f9731620;border:1px solid #f97316;color:#f97316}
.alert-success{background:#22c55e20;border:1px solid #22c55e;color:#22c55e}
.educacion-asignada{background:#0f172a;padding:10px 14px;border-radius:8px;margin-bottom:6px;border-left:3px solid #f97316}
.educacion-asignada .estado-pendiente{color:#f97316;font-weight:600}
.educacion-asignada .estado-completado{color:#22c55e;font-weight:600}
.firma-guardada{color:#22c55e;font-size:.7rem;margin-top:4px;display:none}
.firma-guardada.visible{display:block}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;display:flex;align-items:center;justify-content:center}
.modal-content{background:#1e293b;border-radius:16px;padding:24px;max-width:500px;width:90%;border:1px solid #334155;max-height:90vh;overflow-y:auto}
.historial-item{background:#0f172a;padding:12px;border-radius:10px;margin-bottom:8px;border-left:3px solid #8b5cf6}
.historial-item .fecha{color:#8b5cf6;font-weight:600;font-size:.85rem;margin-bottom:6px}
.resumen-turno{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:12px}
.paciente-requerido{background:#ef444420;border:1px solid #ef4444;color:#ef4444;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:.85rem;font-weight:600;display:none}
.paciente-requerido.visible{display:block}
.firma-box{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:10px;text-align:center}
.firma-box img{max-width:100%;height:auto;border-radius:8px;border:1px solid #334155}
.firma-box .firma-label{font-size:.7rem;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.foto-evidencia{background:#0f172a;border-radius:10px;padding:10px;margin-bottom:10px;text-align:center}
.foto-evidencia img{max-width:100%;height:auto;border-radius:8px;max-height:200px;object-fit:contain}
@media(max-width:480px){
body{padding:8px}
.header{padding:10px 14px;flex-direction:column;text-align:center}
.logo-area{justify-content:center}
.logo-area img{height:40px}
.logo-area h1{font-size:.9rem}
.user-info{justify-content:center;width:100%}
.grid-2,.grid-3{grid-template-columns:1fr;gap:8px}
.tab{font-size:.7rem;padding:6px 12px}
.card{padding:14px}
.signature-canvas{height:100px}
.btn{font-size:.8rem;padding:8px 16px}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
<header class="header">
<div class="logo-area">
<img src="https://i.imgur.com/nOJS04w.jpeg" alt="Vital Hogar" onerror="this.style.display='none'">
<div>
<h1>VITAL HOGAR PRO IPS</h1>
<div class="subtitle">Cuidados Domiciliarios</div>
</div>
</div>
<div id="userInfo" class="user-info hidden">
<span class="user-name" id="userName"></span>
<span class="role-badge" id="userRoleDisplay"></span>
<span class="paciente-badge" id="pacienteBadge" onclick="seleccionarPacienteHeader()">⚠️ Sin paciente</span>
<span class="turno-badge" id="turnoBadge" style="display:none;"></span>
<button class="btn-select-pac" onclick="seleccionarPacienteHeader()">👤 Paciente</button>
<button class="logout-btn" onclick="logout()">Salir</button>
</div>
</header>

<div id="loginScreen">
<div class="login-container">
<div class="card">
<div class="card-title">🔐 Acceso al Sistema</div>
<div class="form-group">
<label>📧 Email</label>
<input type="email" id="loginEmail" placeholder="usuario@vitalhogar.com" autocomplete="email">
</div>
<div class="form-group">
<label>🔒 Contraseña</label>
<div style="position:relative;">
<input type="password" id="loginPassword" placeholder="Ingrese su contraseña" autocomplete="current-password">
<button type="button" class="password-toggle" id="togglePassword">👁️</button>
</div>
</div>
<div id="loginError" class="login-error"></div>
<button class="btn btn-primary" id="loginBtn">Ingresar</button>
</div>
</div>
</div>

<div id="mainScreen" class="hidden">
<div id="pacienteRequerido" class="paciente-requerido">
⚠️ <strong>ATENCIÓN:</strong> Debe seleccionar un paciente antes de registrar cualquier información. Haga clic en "👤 Paciente" arriba.
</div>
<div id="tabsContainer" class="tabs"></div>
<div id="dynamicContent"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN GLOBAL
// ============================================================
var API_URL = 'https://vital-backend-1-y4kt.onrender.com';
var LOGO_URL = 'https://i.imgur.com/nOJS04w.jpeg';
var LOGO_BASE64 = null;
var currentUser = null;
var currentRole = null;
var storageKey = null;
var educationTopics = [];
var recognitionActive = false;
var horaEntrada = null;
var pacienteActual = null;

function getJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return window.jspdf.jsPDF;
  if (window.jsPDF) return window.jsPDF;
  return null;
}

function precargarLogo() {
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    try {
      LOGO_BASE64 = canvas.toDataURL('image/jpeg', 0.9);
      console.log('Logo precargado en Base64');
    } catch(e) {
      console.warn('No se pudo convertir logo (CORS)');
    }
  };
  img.onerror = function() {
    console.warn('No se pudo cargar logo desde URL');
  };
  img.src = LOGO_URL;
}

document.addEventListener('DOMContentLoaded', function() {
  precargarLogo();
  initPasswordToggle();
  loadMasterData();
  loadEducationTopics();
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
  document.getElementById('loginEmail').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
  if (!checkSession()) {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});

function initPasswordToggle() {
  var toggleBtn = document.getElementById('togglePassword');
  var passwordInput = document.getElementById('loginPassword');
  if (toggleBtn && passwordInput) {
    toggleBtn.addEventListener('click', function() {
      var type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.textContent = type === 'password' ? '👁️' : '🙈';
    });
  }
}

function showToast(msg, type) {
  type = type || 'success';
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

function validarPacienteSeleccionado() {
  if (!pacienteActual) {
    showToast('⚠️ Seleccione un paciente primero', 'warning');
    var alerta = document.getElementById('pacienteRequerido');
    if (alerta) {
      alerta.classList.add('visible');
      setTimeout(function() { alerta.classList.remove('visible'); }, 5000);
    }
    return false;
  }
  return true;
}

function actualizarAlertaPaciente() {
  var alerta = document.getElementById('pacienteRequerido');
  if (alerta) {
    if (!pacienteActual) alerta.classList.add('visible');
    else alerta.classList.remove('visible');
  }
}

function iniciarDictado(targetId) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('Voz no soportada', 'error'); return; }
  if (recognitionActive) { showToast('Ya hay una grabación en curso', 'warning'); return; }
  var recognition;
  try { recognition = new SpeechRecognition(); } catch(e) { showToast('Error al iniciar dictado', 'error'); return; }
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = function() { recognitionActive = true; showToast('🎙️ Habla ahora...', 'success'); };
  recognition.onend = function() { recognitionActive = false; };
  recognition.onresult = function(event) {
    var target = document.getElementById(targetId);
    if (!target) return;
    var result = event.results[0];
    if (result && result.isFinal) {
      var texto = result[0].transcript.trim();
      if (texto) {
        target.value += (target.value ? ' ' : '') + texto;
        showToast('Dictado completado', 'success');
      }
    }
  };
  recognition.onerror = function(event) {
    recognitionActive = false;
    var mensajes = { 'not-allowed': 'Permiso denegado', 'no-speech': 'No se detectó voz', 'audio-capture': 'Sin micrófono', 'network': 'Error de red' };
    showToast(mensajes[event.error] || 'Error: ' + event.error, 'error');
  };
  try { recognition.start(); } catch(e) { recognitionActive = false; }
}

async function apiRequest(endpoint, options) {
  options = options || {};
  var token = localStorage.getItem('vital_token');
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  try {
    var response = await fetch(API_URL + endpoint, { method: options.method || 'GET', headers: headers, body: options.body || null });
    if (response.status === 401) { showToast('Sesión expirada', 'error'); logout(); throw new Error('Sesión expirada'); }
    return response;
  } catch (error) { throw error; }
}

async function login() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errorDiv = document.getElementById('loginError');
  errorDiv.style.display = 'none';
  if (!email || !password) { errorDiv.textContent = 'Email y contraseña son requeridos'; errorDiv.style.display = 'block'; return; }
  var loginBtn = document.getElementById('loginBtn');
  loginBtn.disabled = true;
  loginBtn.innerHTML = 'Verificando...';
  try {
    var response = await fetch(API_URL + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password }) });
    var data = await response.json();
    if (!data.success) { errorDiv.textContent = data.message || 'Credenciales inválidas'; errorDiv.style.display = 'block'; showToast('Credenciales inválidas', 'error'); return; }
    var user = data.data.user;
    var token = data.data.token;
    localStorage.setItem('vital_token', token);
    localStorage.setItem('vital_user', JSON.stringify(user));
    currentUser = user;
    currentRole = user.role;
    storageKey = 'vital_' + user.role.toLowerCase() + '_' + user.id;
    cargarPacienteActual();
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRoleDisplay').textContent = user.role;
    actualizarDisplayPaciente();
    actualizarAlertaPaciente();
    verificarContinuidad();
    buildTabs();
    showToast('Bienvenido ' + user.name, 'success');
  } catch (error) {
    errorDiv.textContent = 'Error de conexión con el servidor';
    errorDiv.style.display = 'block';
    showToast('Error de conexión', 'error');
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerHTML = 'Ingresar';
  }
}

function logout() {
  localStorage.removeItem('vital_token');
  localStorage.removeItem('vital_user');
  localStorage.removeItem('vital_paciente_actual');
  sessionStorage.clear();
  currentUser = null; currentRole = null; storageKey = null; pacienteActual = null;
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('userInfo').classList.add('hidden');
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginEmail').value = '';
  showToast('Sesión cerrada', 'success');
}

function checkSession() {
  var token = localStorage.getItem('vital_token');
  var userData = localStorage.getItem('vital_user');
  if (token && userData) {
    try {
      var user = JSON.parse(userData);
      currentUser = user; currentRole = user.role;
      storageKey = 'vital_' + user.role.toLowerCase() + '_' + user.id;
      cargarPacienteActual();
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      document.getElementById('userInfo').classList.remove('hidden');
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userRoleDisplay').textContent = user.role;
      actualizarDisplayPaciente();
      actualizarAlertaPaciente();
      verificarContinuidad();
      buildTabs();
      return true;
    } catch (e) { localStorage.removeItem('vital_token'); localStorage.removeItem('vital_user'); }
  }
  return false;
}

function cargarPacienteActual() {
  var saved = localStorage.getItem('vital_paciente_actual');
  if (saved) { try { pacienteActual = JSON.parse(saved); } catch (e) { pacienteActual = null; } }
}

function guardarPacienteActual(paciente) {
  pacienteActual = paciente;
  if (paciente) localStorage.setItem('vital_paciente_actual', JSON.stringify(paciente));
  else localStorage.removeItem('vital_paciente_actual');
  actualizarDisplayPaciente();
  actualizarAlertaPaciente();
}

function actualizarDisplayPaciente() {
  var display = document.getElementById('pacienteBadge');
  if (!display) return;
  if (pacienteActual) { display.textContent = '👤 ' + pacienteActual.name; }
  else { display.textContent = '⚠️ Sin paciente'; }
}

function seleccionarPacienteHeader() {
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  if (pacientes.length === 0) { showToast('No hay pacientes registrados', 'warning'); return; }
  var options = '<option value="">-- Sin paciente --</option>';
  pacientes.forEach(function(p) {
    var selected = pacienteActual && pacienteActual.id === p.id ? 'selected' : '';
    options += '<option value="' + p.id + '" ' + selected + '>' + p.name + '</option>';
  });
  var html = '<div class="modal-overlay" id="modalPaciente">' +
    '<div class="modal-content">' +
    '<div class="card-title">👤 Seleccionar Paciente</div>' +
    '<div class="form-group"><label>Paciente para este turno</label>' +
    '<select id="selectPacienteHeader">' + options + '</select></div>' +
    '<div class="form-group"><label>Tipo de turno</label>' +
    '<select id="selectTipoTurno"><option value="TITULAR">🟢 Titular</option><option value="REEMPLAZO">🟡 Reemplazo (Turnero)</option></select></div>' +
    '<button class="btn btn-primary" onclick="confirmarSeleccionPaciente()">✅ Confirmar</button>' +
    '<button class="btn btn-secondary" style="margin-top:8px;" onclick="cerrarModalPaciente()">❌ Cancelar</button>' +
    '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

window.confirmarSeleccionPaciente = function() {
  var select = document.getElementById('selectPacienteHeader');
  var tipoTurno = document.getElementById('selectTipoTurno').value;
  if (!select) return;
  var pacienteId = select.value;
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var paciente = pacientes.find(function(p) { return p.id === pacienteId; });
  guardarPacienteActual(paciente || null);
  if (paciente) {
    localStorage.setItem('vital_tipo_turno', tipoTurno);
    var turnoBadge = document.getElementById('turnoBadge');
    if (turnoBadge) {
      turnoBadge.textContent = tipoTurno === 'TITULAR' ? '🟢 TITULAR' : '🟡 TURNO';
      turnoBadge.style.display = 'inline';
    }
  }

function initSignatures() {
  var canvasIds = ['sigRecibo', 'sigEntrega', 'sigRecibe', 'sigProfesional', 'sigPaciente', 'sigFamiliar'];
  canvasIds.forEach(function(id) {
    var canvas = document.getElementById(id);
    if (!canvas) return;
    
    var savedData = sessionStorage.getItem('firma_' + id);
    
    var width = canvas.offsetWidth || canvas.clientWidth || 300;
    var height = canvas.offsetHeight || canvas.clientHeight || 120;
    canvas.width = width;
    canvas.height = height;
    
    var ctx = canvas.getContext('2d');
    
    if (savedData) {
      var img = new Image();
      img.onload = function() {
        ctx.drawImage(img, 0, 0);
      };
      img.src = savedData;
    } else {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#94a3b8';
      ctx.font = '16px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
    }
    
    if (canvas.dataset.initialized === 'true') return;
    
    var drawing = false;
    ctx.strokeStyle = '#0f172a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      var clientX, clientY;
      if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
      else { clientX = e.clientX; clientY = e.clientY; }
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }
    
    var startDraw = function(e) { 
      drawing = true; 
      ctx.beginPath(); 
      var pos = getPos(e); 
      ctx.moveTo(pos.x, pos.y); 
    };
    
    var draw = function(e) {
      if (!drawing) return;
      e.preventDefault();
      var pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    };
    
    var endDraw = function() { 
      drawing = false; 
      guardarFirmaEnSession(id); 
    };
    
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.dataset.initialized = 'true';
  });
}

function guardarFirmaEnSession(canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  try {
    var ctx = canvas.getContext('2d');
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var data = imageData.data;
    var hasDrawing = false;
    for (var i = 0; i < data.length; i += 4) {
      if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) { hasDrawing = true; break; }
    }
    if (hasDrawing) {
      var dataURL = canvas.toDataURL('image/png');
      sessionStorage.setItem('firma_' + canvasId, dataURL);
      var indicador = document.getElementById('ind_' + canvasId);
      if (indicador) indicador.classList.add('visible');
    }
  } catch (e) { console.warn('Error guardando firma:', e); }
}

window.clearCanvas = function(id) {
  var canvas = document.getElementById(id);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
  sessionStorage.removeItem('firma_' + id);
  var indicador = document.getElementById('ind_' + id);
  if (indicador) indicador.classList.remove('visible');
};

function getSignatureData(canvasId) {
  var saved = sessionStorage.getItem('firma_' + canvasId);
  if (saved) return saved;
  var canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  try {
    var ctx = canvas.getContext('2d');
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var data = imageData.data;
    var hasDrawing = false;
    for (var i = 0; i < data.length; i += 4) {
      if (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240) { hasDrawing = true; break; }
    }
    if (!hasDrawing) return null;
    return canvas.toDataURL('image/png');
  } catch (e) { return null; }
}

window.calcularIMC = function() {
  var peso = parseFloat(document.getElementById('pesoNutri') ? document.getElementById('pesoNutri').value : null);
  var tallaCm = parseFloat(document.getElementById('tallaNutri') ? document.getElementById('tallaNutri').value : null);
  var imcDisplay = document.getElementById('imcDisplay');
  if (imcDisplay && peso && tallaCm && tallaCm > 0) {
    var tallaM = tallaCm / 100;
    var imc = peso / (tallaM * tallaM);
    var clasificacion = '', color = '';
    if (imc < 18.5) { clasificacion = 'Bajo peso'; color = '#f97316'; }
    else if (imc < 25) { clasificacion = 'Normal'; color = '#22c55e'; }
    else if (imc < 30) { clasificacion = 'Sobrepeso'; color = '#f97316'; }
    else { clasificacion = 'Obesidad'; color = '#ef4444'; }
    imcDisplay.textContent = 'IMC: ' + imc.toFixed(1) + ' kg/m² - ' + clasificacion;
    imcDisplay.style.color = color;
  } else if (imcDisplay) { imcDisplay.textContent = 'IMC: --'; imcDisplay.style.color = '#94a3b8'; }
};

window.capturarFoto = function() {
  var input = document.getElementById('photoInput');
  if (input && input.files.length > 0) {
    var preview = document.getElementById('photoPreview');
    preview.innerHTML = '';
    var maxFotos = Math.min(input.files.length, 3);
    for (var i = 0; i < maxFotos; i++) {
      var file = input.files[i];
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = document.createElement('img');
        img.src = e.target.result;
        preview.appendChild(img);
      };
      reader.readAsDataURL(file);
    }
    if (input.files.length > 3) showToast('Se tomaron solo las primeras 3 fotos', 'warning');
    else showToast('Fotos capturadas', 'success');
  } else { showToast('Seleccione una imagen', 'error'); }
};
window.agregarActividad = function() {

  if (!hora) { showToast('Ingrese la hora', 'error'); return; }
  var actividad = document.getElementById('tipoActividad').value;
  var observacion = document.getElementById('obsActividad').value;
  var educacionSelect = document.getElementById('educacionTipo');
  var educacionId = educacionSelect ? educacionSelect.value : '';
  var educacionDesc = document.getElementById('educacionDesc').value;
  var novedad = document.getElementById('novedadTipo').value;
  var novedadDesc = document.getElementById('novedadDesc').value;
  var asignacionId = null;
  var educacionTitulo = '';
  if (educacionSelect && educacionId) {
    var selectedOption = educacionSelect.options[educacionSelect.selectedIndex];
    if (selectedOption) {
      asignacionId = selectedOption.getAttribute('data-asignacion');
      educacionTitulo = selectedOption.getAttribute('data-titulo') || '';
    }
  }
  var fotosBase64 = [];
  var preview = document.getElementById('photoPreview');
  if (preview && preview.children.length > 0) {
    for (var i = 0; i < Math.min(preview.children.length, 3); i++) {
      fotosBase64.push(preview.children[i].src);

  }
  var data = {

window.guardarSignos = function() {
  if (!validarPacienteSeleccionado()) return;
  var hora = document.getElementById('horaSignos').value;
  if (!hora) { showToast('Ingrese la hora', 'error'); return; }
  var spo2 = parseInt(document.getElementById('spo2').value) || 0;
  var braden = parseInt(document.getElementById('braden').value) || 0;
  var temp = parseFloat(document.getElementById('temp').value) || 0;
  var glucosa = parseInt(document.getElementById('glucosa').value) || 0;
  var alertas = [];
  var tipoAlerta = 'success';
  if (spo2 > 0 && spo2 < 88) { alertas.push('SpO2 crítica'); tipoAlerta = 'critical'; }
  else if (spo2 > 0 && spo2 < 92) { alertas.push('SpO2 baja'); tipoAlerta = 'warning'; }
  if (temp > 38.5) { alertas.push('FIEBRE'); tipoAlerta = 'warning'; }
  if (glucosa > 180) { alertas.push('HIPERGLUCEMIA'); tipoAlerta = 'warning'; }
  else if (glucosa > 0 && glucosa < 70) { alertas.push('HIPOGLUCEMIA'); tipoAlerta = 'warning'; }
  if (braden > 0 && braden < 12) { alertas.push('ALTO RIESGO úlceras'); tipoAlerta = 'warning'; }
  var alertMsg = alertas.length > 0 ? alertas.join(' | ') : 'Parámetros normales';
  document.getElementById('signosAlert').innerHTML = '<div class="alert-box alert-' + tipoAlerta + '">' + alertMsg + '</div>';
  saveToLocal('signos', {
    spo2: spo2, fc: document.getElementById('fc').value, fr: document.getElementById('fr').value,
    temp: temp, bp: document.getElementById('bp').value, glucosa: glucosa, braden: braden,
    hora: hora, obs: document.getElementById('obsSignos').value, alertas: alertas
  });
  ['spo2','fc','fr','temp','bp','glucosa','braden','obsSignos'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.value = '';
  });
  cargarLista('signos', 'historialSignos');
};

function renderHistorialPaciente() {
  var div = document.getElementById('historialPacienteContent');
  if (!div || !pacienteActual) return;
  var historialKey = 'vital_historial_' + pacienteActual.id;
  var historial;
  try { historial = JSON.parse(localStorage.getItem(historialKey) || '{}'); } catch(e) { historial = {}; }
  var fechas = Object.keys(historial).sort().reverse();
  if (fechas.length === 0) {
    div.innerHTML = '<p class="text-muted">No hay historial registrado para este paciente.</p>';
    return;
  }
  var html = '';
  fechas.forEach(function(fecha) {
    var dia = historial[fecha];
    html += '<div class="historial-item">';
    html += '<div class="fecha">📅 ' + fecha + ' - ' + (dia.archivado_por || 'Desconocido') + ' (' + (dia.tipo_turno || 'TITULAR') + ')</div>';
    if (dia.actividades && dia.actividades.length > 0) {
      html += '<strong>✅ Actividades (' + dia.actividades.length + '):</strong><br>';
      dia.actividades.forEach(function(a) {
        html += '• ' + (a.actividad || '') + ' - ' + (a.hora || '') + '<br>';
        if (a.educacion_realizada) html += '  📚 Educación: ' + a.educacion_realizada + '<br>';
      });
    }
    if (dia.signos && dia.signos.length > 0) {
      html += '<strong>🩺 Signos (' + dia.signos.length + '):</strong><br>';
      var ultimo = dia.signos[dia.signos.length - 1];
      html += '• SpO2: ' + (ultimo.spo2 || '-') + '% | FC: ' + (ultimo.fc || '-') + ' | FR: ' + (ultimo.fr || '-') + '<br>';
    }
    if (dia.medicamentos && dia.medicamentos.length > 0) {
      html += '<strong>💊 Medicamentos (' + dia.medicamentos.length + '):</strong><br>';
      dia.medicamentos.forEach(function(m) {
        html += '• ' + (m.nombre || '') + ' ' + (m.dosis || '') + ' - ' + (m.hora || '') + '<br>';
      });
    }
    if (dia.entregas && dia.entregas.length > 0) {
      var ultima = dia.entregas[dia.entregas.length - 1];
      if (ultima.pendientes) {
        html += '<strong>⚠️ Pendientes:</strong> ' + ultima.pendientes + '<br>';
      }
    }
    if (dia.firmas_entrega && dia.firmas_entrega.sigEntrega) {
      html += '<strong>✍️ Firmas:</strong> Entrega registrada<br>';
    }
    html += '</div>';
  });
  div.innerHTML = html;
}

function generarReportePorRol() {
  var PDFClass = getJsPDF();
  if (!PDFClass) { showToast('Cargando librería PDF...', 'warning'); setTimeout(generarReportePorRol, 1500); return; }
  var pacienteSelect = document.getElementById('reportePaciente');
  var pacienteId = pacienteSelect ? pacienteSelect.value : (pacienteActual ? pacienteActual.id : null);
  if (!pacienteId) { showToast('Seleccione un paciente', 'warning'); return; }
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var paciente = pacientes.find(function(p) { return p.id === pacienteId; });
  if (!paciente) { showToast('Paciente no encontrado', 'error'); return; }
  try {
    switch (currentRole) {
      case 'AUXILIAR': generarReporteAuxiliar(paciente); break;
      case 'ENFERMERO': generarReporteEnfermero(paciente); break;
      case 'MEDICO': generarReporteMedico(paciente); break;
      case 'FISIOTERAPEUTA': generarReporteEspecialista('Fisioterapeuta', paciente); break;
      case 'NUTRICIONISTA': generarReporteEspecialista('Nutricionista', paciente); break;
      case 'PSICOLOGO': generarReporteEspecialista('Psicólogo', paciente); break;
      case 'FONOAUDIOLOGO': generarReporteEspecialista('Fonoaudiólogo', paciente); break;
      case 'TERAPEUTA_OCUPACIONAL': generarReporteEspecialista('Terapeuta Ocupacional', paciente); break;
      case 'TERAPEUTA_RESPIRATORIO': generarReporteEspecialista('Terapeuta Respiratorio', paciente); break;

function addLogoToPDF(doc) {

    doc.setTextColor(0, 0, 0);
  }
}

    checkPage();
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');

    doc.text('Hora: ' + cleanText(ultimoRecibo.timestamp ? new Date(ultimoRecibo.timestamp).toLocaleString() : ''), 25, y); y += 8;

  var turnos = getFromLocalPacienteHoy('turnos', paciente.id);

    doc.setFontSize(11); doc.setFont('helvetica', 'bold');

    doc.text('Salida: ' + cleanText(ultimoTurno.salida ? new Date(ultimoTurno.salida).toLocaleTimeString() : ''), 25, y); y += 5;
    doc.text('Duración: ' + cleanText(ultimoTurno.duracion), 25, y); y += 8;
  }

  var actividades = getFromLocalPacienteHoy('actividades', paciente.id);
  if (actividades && actividades.length > 0) {
    checkPage();
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('3. ACTIVIDADES REALIZADAS', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    actividades.forEach(function(d, i) {
      checkPage();
      doc.text((i+1) + '. ' + cleanText(d.actividad) + ' - ' + cleanText(d.hora), 25, y); y += 5;
      if (d.observacion) { doc.text('   Obs: ' + cleanText(d.observacion).substring(0, 80), 30, y); y += 5; }
      
      // FOTOS DE EDUCACIÓN - CORREGIDO
      if (d.educacion_fotos && d.educacion_fotos.length > 0) {
        doc.setFont('helvetica', 'bold');
        doc.text('   EVIDENCIA FOTOGRAFICA:', 30, y); y += 6;
        doc.setFont('helvetica', 'normal');
        d.educacion_fotos.forEach(function(foto, idx) {
          try {
            if (y > 220) { doc.addPage(); y = 20; }
            doc.addImage(foto, 'JPEG', 40, y, 60, 60);
            y += 65;
          } catch (e) { 
            doc.text('   [Error foto ' + (idx+1) + ']', 40, y); 
            y += 6; 
          }
        });
      }
      
      if (d.educacion_realizada) {
        doc.setFont('helvetica', 'bold');
        doc.text('   EDUCACION: ' + cleanText(d.educacion_realizada), 30, y); y += 5;
        doc.setFont('helvetica', 'normal');
        if (d.educacion_descripcion) { doc.text('   Desc: ' + cleanText(d.educacion_descripcion).substring(0, 80), 35, y); y += 5; }
      }
      if (d.novedad) { doc.text('   Nov: ' + cleanText(d.novedad).substring(0, 80), 30, y); y += 5; }
      y += 3;
    });
    y += 5;
  }

  var signos = getFromLocalPacienteHoy('signos', paciente.id);
  if (signos && signos.length > 0) {
    checkPage();
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('4. SIGNOS VITALES', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    signos.forEach(function(d, i) {
      checkPage();
      doc.text((i+1) + '. SpO2:' + cleanText(d.spo2) + '% FC:' + cleanText(d.fc) + ' FR:' + cleanText(d.fr) + ' T:' + cleanText(d.temp) + 'C', 25, y); y += 5;
      if (d.bp) { doc.text('   TA: ' + cleanText(d.bp), 30, y); y += 5; }
      if (d.glucosa) { doc.text('   Glucosa: ' + cleanText(d.glucosa) + ' mg/dL', 30, y); y += 5; }
      if (d.braden) { doc.text('   Braden: ' + cleanText(d.braden), 30, y); y += 5; }
      y += 3;
    });
    y += 5;
  }

  var medicamentos = getFromLocalPacienteHoy('medicamentos', paciente.id);
  if (medicamentos && medicamentos.length > 0) {
    checkPage();
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('5. MEDICAMENTOS', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    medicamentos.forEach(function(d, i) {
      checkPage();
      doc.text((i+1) + '. ' + cleanText(d.nombre) + ' - ' + cleanText(d.dosis) + ' - ' + cleanText(d.hora), 25, y); y += 5;
      if (d.obs) { doc.text('   Obs: ' + cleanText(d.obs).substring(0, 80), 30, y); y += 5; }
      y += 3;
    });
    y += 5;
  }

  var entregas = getFromLocalPacienteHoy('entregas', paciente.id);
  if (entregas && entregas.length > 0) {
    checkPage();
    doc.setFontSize(11); doc.setFont('helvetica', 'bold');
    doc.text('6. ENTREGA DE TURNO', 20, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    var ultima = entregas[entregas.length - 1];
    if (ultima) {
      doc.text('Hora: ' + cleanText(ultima.horaEntrega), 25, y); y += 5;
      doc.text('Resumen: ' + cleanText(ultima.resumen).substring(0, 80), 25, y); y += 5;
      if (ultima.pendientes) { doc.text('Pendientes: ' + cleanText(ultima.pendientes).substring(0, 80), 25, y); y += 5; }
      y += 5;
    }
  }

  // FIRMAS - CORREGIDO: Ahora se obtienen de sessionStorage y se muestran correctamente
  y += 5;
  checkPage();
  doc.setFontSize(11); doc.setFont('helvetica', 'bold');
  doc.text('7. FIRMAS DEL TURNO', 20, y); y += 10;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  
  var firmado = false;
  
  // Firma de ENTREGA (Auxiliar)
  var firmaEntrega = getSignatureData('sigEntrega');
  if (firmaEntrega) {
    doc.text('Firma Auxiliar (ENTREGA):', 20, y);
    try { 
      doc.addImage(firmaEntrega, 'PNG', 120, y - 5, 60, 20); 
      firmado = true; 
    } catch (e) {
      doc.text('[Firma no disponible]', 120, y);
    }
    y += 25; 
    checkPage();
  } else {
    doc.text('Firma Auxiliar (ENTREGA): NO REGISTRADA', 20, y); y += 8;
  }
  
  // Firma de RECIBE (Familiar/Acudiente)
  var firmaRecibe = getSignatureData('sigRecibe');
  if (firmaRecibe) {
    doc.text('Firma Familiar/Acudiente (RECIBE):', 20, y);
    try { 
      doc.addImage(firmaRecibe, 'PNG', 120, y - 5, 60, 20); 
      firmado = true; 
    } catch (e) {
      doc.text('[Firma no disponible]', 120, y);
    }
    y += 25;
  } else {
    doc.text('Firma Familiar/Acudiente (RECIBE): NO REGISTRADA', 20, y); y += 8;
  }
  
  if (!firmado) doc.text('No se registraron firmas en este turno', 20, y);

  var fechaStr = new Date().toISOString().split('T')[0];
  var nombreArchivo = 'reporte_' + paciente.name.replace(/\s+/g, '') + '_' + fechaStr + '.pdf';
  doc.save(nombreArchivo);
  showToast('Reporte generado: ' + nombreArchivo, 'success');
}

window.crearUsuario = async function() {
  var name = document.getElementById('newUserName').value.trim();

  var password = document.getElementById('newUserPass').value;

  try {
    var response = await apiRequest('/api/users', { method: 'POST', body: JSON.stringify({ name: name, email: email, role: role, password: password }) });
    var data = await response.json();
    if (data.success) {
      ['newUserName','newUserEmail','newUserPass'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
      renderUsuarios(); loadMasterData();

window.eliminarUsuario = async function(id) {

    var data = await response.json();
    if (data.success) { renderUsuarios(); loadMasterData(); showToast('Usuario eliminado', 'success'); }

    '<div class="form-group"><label>Profesional</label><select id="coordProfesional"><option value="">--</option>' + profesionalesOptions + '</select></div>' +
    '<div class="form-group"><label>Fecha</label><input type="date" id="coordFecha"></div>' +
    '<div class="form-group"><label>Turno</label><select id="coordTurno"><option>6h</option><option>8h</option><option>12h</option><option>24h</option></select></div></div>' +
    '<button class="btn btn-primary" onclick="programarTurno()">📅 Programar</button></div>' +
    '<div class="card"><div class="card-title">📋 Turnos</div><div id="listaTurnosCoord"></div></div>';
}
window.programarTurno = function() {
  if (!validarPacienteSeleccionado()) return;
  var paciente = document.getElementById('coordPaciente') ? document.getElementById('coordPaciente').value : '';
  var profesional = document.getElementById('coordProfesional') ? document.getElementById('coordProfesional').value : '';
  var fecha = document.getElementById('coordFecha') ? document.getElementById('coordFecha').value : '';
  var turno = document.getElementById('coordTurno') ? document.getElementById('coordTurno').value : '';
  if (!paciente || !profesional || !fecha) { showToast('Complete todos los campos', 'error'); return; }
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var pacienteObj = pacientes.find(function(p) { return p.id === paciente; });
  var usuarios = JSON.parse(localStorage.getItem('vital_usuarios') || '[]');
  var profesionalObj = usuarios.find(function(u) { return u.id === profesional; });
  saveToLocal('turnosCoord', { paciente: pacienteObj ? pacienteObj.name : 'No especificado', profesional: profesionalObj ? profesionalObj.name : 'No especificado', fecha: fecha, turno: turno, estado: 'PENDIENTE' });
  ['coordPaciente','coordProfesional','coordFecha'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
  cargarLista('turnosCoord', 'listaTurnosCoord');
};

function getEvaluacionEspecialista(rol) {
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var options = pacientes.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
  var campos = '';
  if (rol === 'Fisioterapeuta') {
    campos = '<div class="grid-2">' +
      '<div class="form-group"><label>🦵 Rango movimiento</label><input type="text" id="rangoMovimiento"></div>' +
      '<div class="form-group"><label>💪 Fuerza (1-5)</label><input type="number" id="fuerzaMuscular" min="1" max="5"></div>' +
      '<div class="form-group"><label>⚖️ Equilibrio</label><select id="equilibrio"><option>Normal</option><option>Disminuido</option><option>Alterado</option></select></div>' +
      '<div class="form-group"><label>📝 Plan ejercicios</label><textarea id="planEjercicios" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'planEjercicios\')">🎙️</button></div></div>';
  } else if (rol === 'Psicólogo') {
    campos = '<div class="grid-2">' +
      '<div class="form-group"><label>😔 Depresión</label><select id="depresion"><option>Leve</option><option>Moderada</option><option>Grave</option></select></div>' +
      '<div class="form-group"><label>😰 Ansiedad</label><select id="ansiedad"><option>Leve</option><option>Moderada</option><option>Grave</option></select></div>' +
      '<div class="form-group"><label>🧭 Orientación</label><select id="orientacion"><option>Bien orientado</option><option>Desorientado</option><option>Confuso</option></select></div>' +
      '<div class="form-group"><label>📝 Plan terapéutico</label><textarea id="planTerapeutico" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'planTerapeutico\')">🎙️</button></div></div>';
  } else if (rol === 'Fonoaudiólogo') {
    campos = '<div class="grid-2">' +
      '<div class="form-group"><label>🗣️ Comprensión</label><select id="comprension"><option>Normal</option><option>Disminuida</option><option>Alterada</option></select></div>' +
      '<div class="form-group"><label>🗣️ Expresión</label><select id="expresion"><option>Normal</option><option>Disminuida</option><option>Alterada</option></select></div>' +
      '<div class="form-group"><label>🍽️ Deglución</label><select id="deglucion"><option>Normal</option><option>Disminuida</option><option>Alterada</option></select></div>' +
      '<div class="form-group"><label>📝 Plan terapia</label><textarea id="planTerapia" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'planTerapia\')">🎙️</button></div></div>';
  } else if (rol === 'Terapeuta Ocupacional') {
    campos = '<div class="grid-2">' +
      '<div class="form-group"><label>👕 Vestirse</label><select id="vestirse"><option>Independiente</option><option>Asistido</option><option>Dependiente</option></select></div>' +
      '<div class="form-group"><label>🍽️ Comer</label><select id="comer"><option>Independiente</option><option>Asistido</option><option>Dependiente</option></select></div>' +
      '<div class="form-group"><label>🚿 Bañarse</label><select id="banarse"><option>Independiente</option><option>Asistido</option><option>Dependiente</option></select></div>' +
      '<div class="form-group"><label>🏠 Adaptaciones</label><textarea id="adaptaciones" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'adaptaciones\')">🎙️</button></div></div>';
  } else if (rol === 'Terapeuta Respiratorio') {
    campos = '<div class="grid-2">' +
      '<div class="form-group"><label>💨 Patrón</label><select id="patronRespiratorio"><option>Normal</option><option>Taquipneico</option><option>Bradipneico</option></select></div>' +
      '<div class="form-group"><label>🫁 O2 (lpm)</label><input type="number" id="oxigeno" step="0.5"></div>' +
      '<div class="form-group"><label>🫁 Secreciones</label><select id="secreciones"><option>Ausentes</option><option>Escasas</option><option>Abundantes</option></select></div>' +
      '<div class="form-group"><label>📋 Plan</label><textarea id="planTratamiento" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'planTratamiento\')">🎙️</button></div></div>';
  }
  return '<div class="card"><div class="card-title">📝 Evaluación - ' + rol + '</div>' +
    '<div class="form-group"><label>👤 Paciente</label><select id="pacienteEval"><option value="">-- Seleccionar --</option>' + options + '</select></div>' +
    campos +
    '<div class="form-group" style="margin-top:12px; border-top:1px solid #334155; padding-top:12px;">' +
    '<label>📝 Observaciones</label><textarea id="evalText" rows="3" placeholder="Observaciones..."></textarea><button class="btn-voice" onclick="iniciarDictado(\'evalText\')">🎙️ Dictar</button></div>' +
    '<div class="grid-2" style="margin-top:12px;">' +

    '<div class="card"><div class="card-title">📋 Historial</div><div id="historialEvalEspecialista"></div></div>';
}
window.guardarEvaluacionEspecialista = function(rol) {
  if (!validarPacienteSeleccionado()) return;
  var texto = document.getElementById('evalText') ? document.getElementById('evalText').value : '';
  var paciente = document.getElementById('pacienteEval') ? document.getElementById('pacienteEval').value : '';
  if (!texto) { showToast('Ingrese observaciones', 'error'); return; }
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var pacienteObj = pacientes.find(function(p) { return p.id === paciente; });
  var key = 'eval_' + rol.toLowerCase().replace(/ /g, '_');
  saveToLocal(key, { texto: texto, rol: rol, paciente: pacienteObj ? pacienteObj.name : 'No especificado' });
  document.getElementById('evalText').value = '';
  document.getElementById('pacienteEval').value = '';
  cargarLista(key, 'historialEvalEspecialista');
};

function getEvaluacionNutricionista() {

  return '<div class="card"><div class="card-title">🥗 Evaluación Nutricional</div>' +
    '<div class="form-group"><label>👤 Paciente</label><select id="pacienteEvalNutri"><option value="">-- Seleccionar --</option>' + options + '</select></div>' +

    '<div class="form-group"><label>📏 Talla (cm)</label><input type="number" step="0.1" id="tallaNutri" oninput="calcularIMC()"></div></div>' +
    '<div class="form-group"><label>📊 IMC</label><div id="imcDisplay" class="imc-display">IMC: --</div></div>' +
    '<div class="grid-2">' +
    '<div class="form-group"><label>🥗 Hábitos</label><textarea id="habitosNutri" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'habitosNutri\')">🎙️</button></div>' +
    '<div class="form-group"><label>📋 Plan</label><textarea id="planNutri" rows="2"></textarea><button class="btn-voice" onclick="iniciarDictado(\'planNutri\')">🎙️</button></div></div>' +
    '<div class="form-group" style="margin-top:12px; border-top:1px solid #334155; padding-top:12px;">' +

    '<div><label>✍️ Firma Profesional</label><canvas id="sigProfesional" class="signature-canvas"></canvas><button class="btn-secondary btn-sm" onclick="clearCanvas(\'sigProfesional\')">Borrar</button><div class="firma-guardada" id="ind_sigProfesional">✅ Firma guardada</div></div>' +
    '<div><label>✍️ Firma Paciente</label><canvas id="sigPaciente" class="signature-canvas"></canvas><button class="btn-secondary btn-sm" onclick="clearCanvas(\'sigPaciente\')">Borrar</button><div class="firma-guardada" id="ind_sigPaciente">✅ Firma guardada</div></div></div>' +

    '<div class="card"><div class="card-title">📋 Historial</div><div id="historialEvalNutri"></div></div>';
}
window.guardarEvaluacionNutri = function() {
  if (!validarPacienteSeleccionado()) return;
  var texto = document.getElementById('evalText') ? document.getElementById('evalText').value : '';
  var paciente = document.getElementById('pacienteEvalNutri') ? document.getElementById('pacienteEvalNutri').value : '';
  if (!texto) { showToast('Ingrese observaciones', 'error'); return; }
  var peso = document.getElementById('pesoNutri') ? document.getElementById('pesoNutri').value : '';
  var talla = document.getElementById('tallaNutri') ? document.getElementById('tallaNutri').value : '';
  var imcDisplay = document.getElementById('imcDisplay') ? document.getElementById('imcDisplay').textContent : 'IMC: --';
  var pacientes = JSON.parse(localStorage.getItem('vital_pacientes') || '[]');
  var pacienteObj = pacientes.find(function(p) { return p.id === paciente; });
  saveToLocal('evalNutri', { texto: texto, peso: peso || 'No registrado', talla: talla || 'No registrado', imc: imcDisplay, habitos: document.getElementById('habitosNutri') ? document.getElementById('habitosNutri').value : '', plan: document.getElementById('planNutri') ? document.getElementById('planNutri').value : '', paciente: pacienteObj ? pacienteObj.name : 'No especificado' });
  ['evalText','pacienteEvalNutri','habitosNutri','planNutri','pesoNutri','tallaNutri'].forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
  var imc = document.getElementById('imcDisplay');
  if (imc) { imc.textContent = 'IMC: --'; imc.style.color = '#94a3b8'; }
  cargarLista('evalNutri', 'historialEvalNutri');
};
