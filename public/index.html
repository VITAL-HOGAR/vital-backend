<style>
/* ============================================================
   ESTILOS COMPLETOS - VITAL HOGAR PRO v3.0

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:12px;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:20px;padding:12px 20px;margin-bottom:16px;border:1px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-area img{height:50px;width:auto;object-fit:contain;border-radius:8px}

.user-info{display:flex;align-items:center;gap:10px;background:#0f172a;padding:6px 16px;border-radius:30px;border:1px solid #334155;font-size:.75rem;flex-wrap:wrap}

/* Login */
.login-container{max-width:420px;margin:40px auto}
.login-container .card{padding:30px}
.login-container .card-title{font-size:1.2rem;text-align:center;border-left:none;padding-left:0;justify-content:center}

.tab{font-size:.7rem;padding:6px 12px}

.btn{font-size:.8rem;padding:8px 16px}
}

<script>
// ============================================================
// VITAL HOGAR PRO v3.0 - SISTEMA COMPLETO MEJORADO
// ============================================================

// ---------- CONFIGURACIÓN ----------
const CONFIG = {
    API_URL: 'https://vital-backend-1-y4kt.onrender.com',
    LOGO_URL: 'https://i.imgur.com/nOJS04w.jpeg',
    STORAGE_PREFIX: 'vital_'
};

// ---------- ESTADO GLOBAL ----------
const STATE = {
    user: null,
    role: null,
    token: null,
    pacienteActual: null,
    educationTopics: [],
    firmaGuardada: {}, // { canvasId: dataURL }
    horaEntrada: null
};

// ---------- UTILIDADES ----------
function $(id) { return document.getElementById(id); }
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }
function qsa(sel, ctx) { return (ctx || document).querySelectorAll(sel); }

function cleanText(t) {
    if (t === null || t === undefined) return '';
    return String(t).trim();
}

function getStorageKey() {
    if (!STATE.user) return null;
    return CONFIG.STORAGE_PREFIX + STATE.role.toLowerCase() + '_' + STATE.user.id;
}

function getPacienteId() {
    return STATE.pacienteActual ? STATE.pacienteActual.id : null;
}

function getPacienteNombre() {
    return STATE.pacienteActual ? STATE.pacienteActual.name : 'No especificado';
}

function getTipoTurno() {
    return localStorage.getItem(CONFIG.STORAGE_PREFIX + 'tipo_turno') || 'TITULAR';
}

function getHoy() {
    return new Date().toDateString();
}

function getTimestamp() {
    return new Date().toISOString();
}

function formatFecha(fecha) {
    if (!fecha) return '--';
    return new Date(fecha).toLocaleString();
}

// ---------- TOAST ----------
function showToast(msg, type = 'success') {
    const toast = $('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), 3500);
}

// ---------- VALIDACIÓN PACIENTE ----------
function validarPaciente() {
    if (!STATE.pacienteActual) {
        showToast('⚠️ Seleccione un paciente primero', 'warning');
        const alerta = $('pacienteRequerido');
        if (alerta) {
            alerta.classList.add('visible');
            setTimeout(() => alerta.classList.remove('visible'), 5000);
        }
        return false;
    }
    return true;
}

// ============================================================
// SISTEMA DE FIRMAS - COMPLETAMENTE RENOVADO
// ============================================================

class FirmaManager {
    constructor() {
        this.canvases = {};
        this.inicializado = false;
    }

    /**
     * Inicializa todos los canvas de firma en el DOM
     */
    inicializar() {
        if (this.inicializado) return;
        
        const canvasIds = [
            'sigRecibo', 'sigEntrega', 'sigRecibe', 
            'sigProfesional', 'sigPaciente', 'sigFamiliar'
        ];
        
        canvasIds.forEach(id => {
            const canvas = $(id);
            if (!canvas) return;
            this._inicializarCanvas(canvas);
        });
        
        this.inicializado = true;
        console.log('✅ Sistema de firmas inicializado');
    }

    /**
     * Inicializa un canvas individual
     */
    _inicializarCanvas(canvas) {
        // Configurar tamaño
        const rect = canvas.getBoundingClientRect();
        const width = rect.width || canvas.offsetWidth || 300;
        const height = rect.height || canvas.offsetHeight || 120;
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        
        // Restaurar firma guardada si existe
        const saved = sessionStorage.getItem('firma_' + canvas.id);
        if (saved) {
            this._cargarFirmaGuardada(canvas, saved);
            this._actualizarStatus(canvas.id, true);
        } else {
            this._dibujarPlaceholder(canvas);
            this._actualizarStatus(canvas.id, false);
        }

        // Configurar eventos
        let drawing = false;
        let lastX = 0, lastY = 0;

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        };

        const startDraw = (e) => {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
        };

        const draw = (e) => {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        };

        const endDraw = () => {
            if (drawing) {
                drawing = false;
                this._guardarFirma(canvas.id);
            }
        };

        // Eventos mouse
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        // Eventos touch
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', endDraw);
    }

    /**
     * Dibuja el placeholder en el canvas
     */
    _dibujarPlaceholder(canvas) {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '18px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✍️ Firme aquí', canvas.width / 2, canvas.height / 2);
    }

    /**
     * Carga una firma guardada en el canvas
     */
    _cargarFirmaGuardada(canvas, dataURL) {
        const img = new Image();
        img.onload = () => {
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.onerror = () => {
            this._dibujarPlaceholder(canvas);
        };
        img.src = dataURL;
    }

    /**
     * Guarda la firma en sessionStorage
     */
    _guardarFirma(canvasId) {
        const canvas = $(canvasId);
        if (!canvas) return;

        try {
            const ctx = canvas.getContext('2d');
            // Verificar si hay dibujo (no vacío)
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let hasDrawing = false;
            for (let i = 0; i < data.length; i += 4) {
                // Umbral más bajo para detectar trazos
                if (data[i] < 230 || data[i+1] < 230 || data[i+2] < 230) {
                    hasDrawing = true;
                    break;
                }
            }

            if (hasDrawing) {
                const dataURL = canvas.toDataURL('image/png');
                sessionStorage.setItem('firma_' + canvasId, dataURL);
                this._actualizarStatus(canvasId, true);
                this._mostrarPreview(canvasId, dataURL);
                showToast('✅ Firma guardada', 'success');
            } else {
                // Si está vacío, eliminar guardado
                sessionStorage.removeItem('firma_' + canvasId);
                this._actualizarStatus(canvasId, false);
                this._ocultarPreview(canvasId);
            }
        } catch (e) {
            console.warn('Error guardando firma:', e);
        }
    }

    /**
     * Actualiza el indicador de estado de la firma
     */
    _actualizarStatus(canvasId, guardada) {
        const status = document.getElementById('status_' + canvasId);
        if (!status) return;
        if (guardada) {
            status.textContent = '✅ Firma guardada';
            status.className = 'firma-status guardada';
        } else {
            status.textContent = '⏳ Sin firmar';
            status.className = 'firma-status vacia';
        }
    }

    /**
     * Muestra preview de la firma
     */
    _mostrarPreview(canvasId, dataURL) {
        const preview = document.getElementById('preview_' + canvasId);
        if (!preview) return;
        preview.src = dataURL;
        preview.classList.add('visible');
    }

    /**
     * Oculta preview de la firma
     */
    _ocultarPreview(canvasId) {
        const preview = document.getElementById('preview_' + canvasId);
        if (!preview) return;
        preview.classList.remove('visible');
        preview.src = '';
    }

    /**
     * Obtiene la firma como dataURL
     */
    obtenerFirma(canvasId) {
        return sessionStorage.getItem('firma_' + canvasId) || null;
    }

    /**
     * Limpia una firma
     */
    limpiar(canvasId) {
        const canvas = $(canvasId);
        if (!canvas) return;
        this._dibujarPlaceholder(canvas);
        sessionStorage.removeItem('firma_' + canvasId);
        this._actualizarStatus(canvasId, false);
        this._ocultarPreview(canvasId);
        showToast('Firma borrada', 'warning');
    }

    /**
     * Verifica si una firma está guardada
     */
    estaGuardada(canvasId) {
        return sessionStorage.getItem('firma_' + canvasId) !== null;
    }

    /**
     * Limpia todas las firmas
     */
    limpiarTodas() {
        const canvasIds = [
            'sigRecibo', 'sigEntrega', 'sigRecibe', 
            'sigProfesional', 'sigPaciente', 'sigFamiliar'
        ];
        canvasIds.forEach(id => {
            if ($(id)) this.limpiar(id);
        });
    }
}

// Instancia global del sistema de firmas
const firmaManager = new FirmaManager();

// ============================================================
// FUNCIONES DE FIRMA - EXPUESTAS GLOBALMENTE
// ============================================================

window.limpiarFirma = function(canvasId) {
    firmaManager.limpiar(canvasId);
};

window.obtenerFirma = function(canvasId) {
    return firmaManager.obtenerFirma(canvasId);
};

// ============================================================
// SISTEMA DE DATOS - LOCAL STORAGE MEJORADO
// ============================================================

class DataManager {
    /**
     * Guarda un registro en el localStorage del día actual
     */
    guardar(tipo, data) {
        const key = getStorageKey();
        if (!key) { showToast('No hay sesión activa', 'error'); return false; }
        if (!validarPaciente()) return false;

        let all;
        try {
            all = JSON.parse(localStorage.getItem(key) || '{}');
        } catch (e) {
            all = {};
        }

        all[tipo] = all[tipo] || [];
        
        const registro = {
            ...data,
            timestamp: getTimestamp(),
            user_id: STATE.user ? STATE.user.id : null,
            user_name: STATE.user ? STATE.user.name : 'Anónimo',
            user_role: STATE.role,
            tipo_turno: getTipoTurno(),
            paciente_id: getPacienteId(),
            paciente_nombre: getPacienteNombre()
        };

        all[tipo].push(registro);
        localStorage.setItem(key, JSON.stringify(all));
        showToast(tipo + ' guardado ✅', 'success');
        return true;
    }

    /**
     * Obtiene registros del día de hoy
     */
    obtenerHoy(tipo) {
        const key = getStorageKey();
        if (!key) return [];
        try {
            const all = JSON.parse(localStorage.getItem(key) || '{}');
            const items = all[tipo] || [];
            const hoy = getHoy();
            return items.filter(item => {
                return item.timestamp && new Date(item.timestamp).toDateString() === hoy;
            });
        } catch (e) {
            return [];
        }
    }

    /**
     * Obtiene registros del día de hoy para un paciente específico
     */
    obtenerHoyPaciente(tipo, pacienteId) {
        if (!pacienteId) return [];
        const items = this.obtenerHoy(tipo);
        return items.filter(item => item.paciente_id === pacienteId);
    }

    /**
     * Obtiene el último registro de hoy
     */
    obtenerUltimoHoy(tipo) {
        const items = this.obtenerHoy(tipo);
        return items.length > 0 ? items[items.length - 1] : null;
    }

    /**
     * Obtiene todos los registros de un tipo
     */
    obtenerTodos(tipo) {
        const key = getStorageKey();
        if (!key) return [];
        try {
            const all = JSON.parse(localStorage.getItem(key) || '{}');
            return all[tipo] || [];
        } catch (e) {
            return [];
        }
    }

    /**
     * Limpia los registros del día de hoy
     */
    limpiarHoy(tipo) {
        const key = getStorageKey();
        if (!key) return;
        try {
            const all = JSON.parse(localStorage.getItem(key) || '{}');
            const hoy = getHoy();
            all[tipo] = (all[tipo] || []).filter(item => {
                return !(item.timestamp && new Date(item.timestamp).toDateString() === hoy);
            });
            localStorage.setItem(key, JSON.stringify(all));
        } catch (e) {}
    }
}

function renderizarLista(tipo, elementId, maxItems = 10) {
    const div = $(elementId);

        div.innerHTML = '<p class="text-muted" style="font-size:0.85rem;">No hay registros hoy</p>';

    div.innerHTML = items.slice(-maxItems).reverse().map((item, idx) => {
        const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleString() : '--:--';

        return `<div class="activity-item">

            ${contenido}
            ${item.paciente_nombre ? `<br><span style="color:#94a3b8;font-size:0.7rem;">👤 ${item.paciente_nombre}</span>` : ''}
        </div>`;
    }).join('');

function getJsPDF() {
    if (window.jspdf && window.jspdf.jsPDF) return window.jspdf.jsPDF;
    if (window.jsPDF) return window.jsPDF;
    return null;
}

function addLogoToPDF(doc) {
    try {
        doc.addImage(CONFIG.LOGO_URL, 'JPEG', 15, 10, 35, 12);
    } catch (e) {
        doc.setFontSize(14);
        doc.setTextColor(34, 197, 94);
        doc.text('VITAL HOGAR', 15, 18);
        doc.setTextColor(0, 0, 0);
    }
}

function generarReportePDF(paciente, titulo, secciones) {
    const PDFClass = getJsPDF();
    if (!PDFClass) { showToast('PDF no disponible', 'error'); return; }
    
    const doc = new PDFClass();
    let y = 30;
    
    function checkPage() {
        if (y > 260) {
            doc.addPage();
            y = 20;
        }
    }

    // Encabezado
    addLogoToPDF(doc);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.setTextColor(34, 197, 94);
    doc.text('VITAL HOGAR PRO IPS', 55, 18);
    doc.setTextColor(0, 0, 0);
    y = 30;
    
    doc.setFontSize(12);
    doc.text(titulo || 'REPORTE DEL PACIENTE', 20, y); y += 8;
    doc.setFontSize(14);
    doc.text((paciente?.name || 'Sin paciente').toUpperCase(), 20, y); y += 8;
    doc.setFontSize(9);
    doc.text('Documento: ' + (paciente?.document || 'N/A'), 20, y); y += 5;
    doc.text('Fecha: ' + new Date().toLocaleString(), 20, y); y += 5;
    doc.text('Profesional: ' + (STATE.user?.name || 'Desconocido'), 20, y); y += 5;
    doc.text('Tipo turno: ' + getTipoTurno(), 20, y); y += 10;

    // Secciones
    if (secciones) {
        secciones.forEach(seccion => {
            checkPage();
            doc.setFontSize(11);
            doc.setFont('helvetica', 'bold');
            doc.text(seccion.titulo, 20, y); y += 7;
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            
            if (seccion.items && seccion.items.length > 0) {
                seccion.items.slice(-5).forEach((item, idx) => {
                    checkPage();
                    doc.text(`${idx+1}. ${seccion.render ? seccion.render(item) : JSON.stringify(item).substring(0, 80)}`, 25, y);
                    y += 6;
                });
            } else {
                doc.text('Sin registros', 25, y);
                y += 6;
            }
            y += 5;
        });
    }

    // Firmas
    const firmas = secciones?.firmas || [];
    if (firmas.length > 0) {
        checkPage();
        doc.setFontSize(11);
        doc.setFont('helvetica', 'bold');
        doc.text('FIRMAS', 20, y); y += 10;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        
        firmas.forEach(f => {
            checkPage();
            const data = firmaManager.obtenerFirma(f.id);
            if (data) {
                doc.text(f.label + ':', 20, y);
                try {
                    doc.addImage(data, 'PNG', 120, y - 5, 60, 20);
                } catch (e) {
                    doc.text('[Firma registrada]', 120, y);
                }
                y += 25;
            } else {
                doc.text(f.label + ': NO REGISTRADA', 20, y);
                y += 8;
            }
        });
    }

    const fechaStr = new Date().toISOString().split('T')[0];
    const nombreArchivo = `reporte_${(paciente?.name || 'paciente').replace(/\s+/g, '')}_${fechaStr}.pdf`;
    doc.save(nombreArchivo);
    showToast('Reporte generado ✅', 'success');
}

async function login() {
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value;
    const errorDiv = $('loginError');
    errorDiv.style.display = 'none';

    if (!email || !password) {
        errorDiv.textContent = 'Email y contraseña son requeridos';
        errorDiv.style.display = 'block';
        return;
    }

    const btn = $('loginBtn');
    btn.disabled = true;
    btn.innerHTML = 'Verificando...';

    try {
        const response = await fetch(CONFIG.API_URL + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();

        if (!data.success) {
            errorDiv.textContent = data.message || 'Credenciales inválidas';
            errorDiv.style.display = 'block';
            showToast('Credenciales inválidas', 'error');
            return;
        }

        const user = data.data.user;
        const token = data.data.token;

        localStorage.setItem(CONFIG.STORAGE_PREFIX + 'token', token);
        localStorage.setItem(CONFIG.STORAGE_PREFIX + 'user', JSON.stringify(user));

        STATE.user = user;
        STATE.role = user.role;
        STATE.token = token;

        cargarPacienteActual();
        
        $('loginScreen').classList.add('hidden');
        $('mainScreen').classList.remove('hidden');
        $('userInfo').classList.remove('hidden');
        $('userName').textContent = user.name;
        $('userRoleDisplay').textContent = user.role;
        
        actualizarDisplayPaciente();
        actualizarAlertaPaciente();
        construirTabs();
        showToast('Bienvenido ' + user.name, 'success');

    } catch (error) {
        errorDiv.textContent = 'Error de conexión con el servidor';
        errorDiv.style.display = 'block';
        showToast('Error de conexión', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Ingresar';
    }
}

function logout() {
    localStorage.removeItem(CONFIG.STORAGE_PREFIX + 'token');
    localStorage.removeItem(CONFIG.STORAGE_PREFIX + 'user');
    localStorage.removeItem(CONFIG.STORAGE_PREFIX + 'paciente_actual');
    sessionStorage.clear();
    
    STATE.user = null;
    STATE.role = null;
    STATE.token = null;
    STATE.pacienteActual = null;
    
    $('mainScreen').classList.add('hidden');
    $('loginScreen').classList.remove('hidden');
    $('userInfo').classList.add('hidden');
    $('loginPassword').value = '';
    $('loginEmail').value = '';
    showToast('Sesión cerrada', 'success');
}

function checkSession() {
    const token = localStorage.getItem(CONFIG.STORAGE_PREFIX + 'token');
    const userData = localStorage.getItem(CONFIG.STORAGE_PREFIX + 'user');
    
    if (token && userData) {
        try {
            const user = JSON.parse(userData);
            STATE.user = user;
            STATE.role = user.role;
            STATE.token = token;
            
            cargarPacienteActual();
            
            $('loginScreen').classList.add('hidden');
            $('mainScreen').classList.remove('hidden');
            $('userInfo').classList.remove('hidden');
            $('userName').textContent = user.name;
            $('userRoleDisplay').textContent = user.role;
            
            actualizarDisplayPaciente();
            actualizarAlertaPaciente();
            construirTabs();
            return true;
        } catch (e) {
            localStorage.removeItem(CONFIG.STORAGE_PREFIX + 'token');
            localStorage.removeItem(CONFIG.STORAGE_PREFIX + 'user');
        }
    }
    return false;
}

function cargarPacienteActual() {
    const saved = localStorage.getItem(CONFIG.STORAGE_PREFIX + 'paciente_actual');
    if (saved) {
        try {
            STATE.pacienteActual = JSON.parse(saved);
        } catch (e) {
            STATE.pacienteActual = null;
        }
    }
}

function actualizarDisplayPaciente() {
    const display = $('pacienteBadge');
    if (!display) return;
    if (STATE.pacienteActual) {

function construirTabs() {
    const container = $('tabsContainer');
    let tabs = [];

    switch (STATE.role) {
        case 'AUXILIAR':
            tabs = [
                { id: 'recibo', name: '📋 Recibo' },
                { id: 'turno', name: '📅 Turno' },
                { id: 'actividades', name: '✅ Actividades' },
                { id: 'signos', name: '🩺 Signos' },
                { id: 'medicamentos', name: '💊 Medicamentos' },
                { id: 'entrega', name: '🔄 Entrega' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
            break;
        case 'ADMIN':
            tabs = [
                { id: 'usuarios', name: '👥 Usuarios' },
                { id: 'pacientes', name: '🏥 Pacientes' },
                { id: 'reportes', name: '📄 Reportes' }
            ];
            break;
        default:
            tabs = [{ id: 'reportes', name: '📄 Reportes' }];
    }

    container.innerHTML = tabs.map(t => 
        `<div class="tab" data-tab="${t.id}">${t.name}</div>`
    ).join('');

    qsa('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            qsa('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            cargarTab(this.dataset.tab);
        });
    });

    if (tabs.length > 0) {
        qs('.tab').classList.add('active');
        cargarTab(tabs[0].id);
    }
}

function cargarTab(tabId) {
    const content = $('dynamicContent');

    switch (tabId) {
        case 'recibo': html = renderRecibo(); break;
        case 'turno': html = renderTurno(); break;
        case 'actividades': html = renderActividades(); break;
        case 'signos': html = renderSignos(); break;
        case 'medicamentos': html = renderMedicamentos(); break;
        case 'entrega': html = renderEntrega(); break;
        case 'reportes': html = renderReportes(); break;
        case 'usuarios': html = renderUsuarios(); break;
        case 'pacientes': html = renderPacientesAdmin(); break;
        default: html = '<div class="card"><p>Contenido no disponible</p></div>';
    }

    content.innerHTML = html;

    // Inicializar firmas después de renderizar
    setTimeout(() => {
        firmaManager.inicializar();
    }, 100);

    // Cargar listas
    setTimeout(() => {
        if (tabId === 'signos') renderizarLista('signos', 'historialSignos');
        if (tabId === 'actividades') renderizarLista('actividades', 'listaActividades');
        if (tabId === 'medicamentos') renderizarLista('medicamentos', 'historialMedicamentos');
        if (tabId === 'entrega') renderizarLista('entregas', 'historialEntregas');
        if (tabId === 'recibo') renderizarLista('recibos', 'historialRecibos');
        if (tabId === 'usuarios') renderListaUsuarios();

    }, 200);
}

window.guardarSignos = function() {
    if (!validarPaciente()) return;
    const hora = $('horaSignos').value;
    if (!hora) {
        showToast('Ingrese la hora', 'error');
        return;
    }

    const spo2 = parseInt($('spo2').value) || 0;
    const temp = parseFloat($('temp').value) || 0;
    const glucosa = parseInt($('glucosa').value) || 0;

    let alertas = [];
    let tipoAlerta = 'success';
    if (spo2 > 0 && spo2 < 88) { alertas.push('SpO2 crítica'); tipoAlerta = 'critical'; }
    else if (spo2 > 0 && spo2 < 92) { alertas.push('SpO2 baja'); tipoAlerta = 'warning'; }
    if (temp > 38.5) { alertas.push('FIEBRE'); tipoAlerta = 'warning'; }
    if (glucosa > 180) { alertas.push('HIPERGLUCEMIA'); tipoAlerta = 'warning'; }
    else if (glucosa > 0 && glucosa < 70) { alertas.push('HIPOGLUCEMIA'); tipoAlerta = 'warning'; }

    const alertMsg = alertas.length > 0 ? alertas.join(' | ') : 'Parámetros normales';
    const alertEl = $('signosAlert');
    if (alertEl) {
        alertEl.innerHTML = `<div class="alert-box alert-${tipoAlerta}">${alertMsg}</div>`;
    }

    dataManager.guardar('signos', {
        spo2: spo2,
        fc: $('fc').value,
        fr: $('fr').value,
        temp: temp,
        bp: $('bp').value,
        glucosa: glucosa,
        hora: hora,
        obs: $('obsSignos').value.trim(),
        alertas: alertas
    });

    ['spo2', 'fc', 'fr', 'temp', 'bp', 'glucosa', 'obsSignos'].forEach(id => {
        const el = $(id);
        if (el) el.value = '';
    });

    renderizarLista('signos', 'historialSignos');
};

window.archivarDia = function() {
    if (!validarPaciente()) return;
    if (!confirm('¿Archivar el día? Los datos se guardarán en el historial.')) return;

    const pacienteId = getPacienteId();
    const pacienteNombre = getPacienteNombre();

    // Obtener datos del día
    const actividades = dataManager.obtenerHoy('actividades');
    const signos = dataManager.obtenerHoy('signos');
    const medicamentos = dataManager.obtenerHoy('medicamentos');
    const entregas = dataManager.obtenerHoy('entregas');
    const recibos = dataManager.obtenerHoy('recibos');

    // Guardar en historial
    const historialKey = CONFIG.STORAGE_PREFIX + 'historial_' + pacienteId;
    let historial;
    try {
        historial = JSON.parse(localStorage.getItem(historialKey) || '{}');
    } catch (e) {
        historial = {};
    }

    const fechaHoy = new Date().toISOString().split('T')[0];
    historial[fechaHoy] = {
        fecha: fechaHoy,
        paciente_id: pacienteId,
        paciente_nombre: pacienteNombre,
        actividades: actividades,
        signos: signos,
        medicamentos: medicamentos,
        entregas: entregas,
        recibos: recibos,
        archivado_por: STATE.user?.name || 'Desconocido',
        tipo_turno: getTipoTurno(),
        fecha_archivado: getTimestamp()
    };
    localStorage.setItem(historialKey, JSON.stringify(historial));

    // Limpiar datos del día
    const key = getStorageKey();
    if (key) {
        try {
            const all = JSON.parse(localStorage.getItem(key) || '{}');
            const hoy = getHoy();
            ['actividades', 'signos', 'medicamentos', 'entregas', 'recibos', 'turnos'].forEach(tipo => {
                if (all[tipo]) {
                    all[tipo] = all[tipo].filter(item => {
                        return !(item.timestamp && new Date(item.timestamp).toDateString() === hoy);
                    });
                }
            });
            localStorage.setItem(key, JSON.stringify(all));
        } catch (e) {}
    }

    // Limpiar firmas
    firmaManager.limpiarTodas();
    
    showToast('Día archivado correctamente ✅', 'success');
};

let recognitionActive = false;

window.iniciarDictado = function(targetId) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        showToast('Voz no soportada en este navegador', 'error');
        return;
    }

    if (recognitionActive) {
        showToast('Ya hay una grabación en curso', 'warning');
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        recognitionActive = true;
        showToast('🎙️ Habla ahora...', 'success');
    };

    recognition.onend = () => {
        recognitionActive = false;
    };

    recognition.onresult = (event) => {
        const target = $(targetId);
        if (!target) return;
        const result = event.results[0];
        if (result && result.isFinal) {
            const texto = result[0].transcript.trim();
            if (texto) {
                target.value += (target.value ? ' ' : '') + texto;
                showToast('Dictado completado ✅', 'success');
            }
        }
    };

    recognition.onerror = (event) => {
        recognitionActive = false;
        const mensajes = {
            'not-allowed': 'Permiso denegado',
            'no-speech': 'No se detectó voz',
            'audio-capture': 'Sin micrófono',
            'network': 'Error de red'
        };
        showToast(mensajes[event.error] || 'Error: ' + event.error, 'error');
    };

    try {
        recognition.start();
    } catch (e) {
        recognitionActive = false;
        showToast('Error al iniciar dictado', 'error');
    }
};
